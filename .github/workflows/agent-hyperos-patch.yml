name: Apply HyperOS font coverage patch

on:
  push:
    branches:
      - fix/hyperos-font-coverage-v2.1.2

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'bootstrap: apply HyperOS patch')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/hyperos-font-coverage-v2.1.2
          fetch-depth: 0

      - name: Apply targeted fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, got {count}: {old[:80]!r}")
              write(path, text.replace(old, new, 1))

          # 1) 固定 HyperOS 紧凑控件行框，不再让单个字体的极端轮廓撑大 hhea/typo。
          replace_once(
              "common/font_metrics_normalize.py",
              '''# Keep the line box aligned with stock Roboto (hhea ascent 1900/2048, descent 500/2048).
          # Drifting away from these ratios makes custom faces and stock fallback faces sit at
          # different baselines, which shows up as shifted/raised text in mixed-font screens.
          TYPO_ASCENDER_RATIO = 0.928
          TYPO_DESCENDER_RATIO = 0.244
          # Android TextView defaults to includeFontPadding=true and reads top/bottom from the
          # OS/2 win metrics. CJK fonts often carry huge yMax/yMin extremes; trusting them adds
          # a large blank band above every line ("文字抬高/页面偏移"). Cap win metrics instead.
          WIN_ASCENT_CAP_RATIO = 0.98
          WIN_DESCENT_CAP_RATIO = 0.35
          # hhea additionally encloses real outline extremes for includeFontPadding=false apps, but
          # pathological sources (symbol/emoji mashups) must not blow line boxes up without bound.
          HHEA_ASCENT_CAP_RATIO = 1.60
          HHEA_DESCENT_CAP_RATIO = 0.90
          ''',
              '''# HyperOS/MIUI uses many fixed-height compact controls (QQ reply bars, age chips,
          # Coolapk title rows and manager cards). Expanding hhea/typo from a source font's tallest
          # outline moves the baseline and makes adjacent labels overlap. Keep one stable, slightly
          # roomier-than-Roboto contract for every generated face instead.
          TYPO_ASCENDER_RATIO = 0.98
          TYPO_DESCENDER_RATIO = 0.30
          # includeFontPadding=true reads OS/2 win metrics. Keep a little extra descent room for
          # Latin descenders while preventing malformed source bounds from inflating the control.
          WIN_ASCENT_CAP_RATIO = 0.98
          WIN_DESCENT_CAP_RATIO = 0.35
          # includeFontPadding=false reads hhea/typo. These must stay fixed as well; clipping is less
          # harmful than changing the line box of every fixed-height OEM control.
          HHEA_ASCENT_CAP_RATIO = TYPO_ASCENDER_RATIO
          HHEA_DESCENT_CAP_RATIO = TYPO_DESCENDER_RATIO
          ''',
          )
          replace_once(
              "common/font_metrics_normalize.py",
              '''    head = font["head"]
              y_max = int(getattr(head, "yMax", ascender))
              y_min = int(getattr(head, "yMin", -descender_abs))
              # head.yMax/yMin can be stale (composite builds recalc the box only at save time),
              # so enclose the true outline extremes as well; otherwise hhea/typo stay contracted
              # and ink still overflows the line box (标题压热度 / 标签少一截).
              extremes = _outline_extremes(font)
              if extremes is not None:
                  import math
                  y_min = min(y_min, int(math.floor(extremes[0])))
                  y_max = max(y_max, int(math.ceil(extremes[1])))

              # Apps rendering with includeFontPadding=false lay out (and clip) against the hhea line
              # box. When a CJK face's ink extends past the declared box, the overflow paints into the
              # next line (标题与热度重叠) or is clipped off (标签少一截). Enclose the real outline
              # extremes in hhea — floored at the stable contract so compact faces keep stock spacing —
              # typo mirrors this enclosed box (see below); win stays capped on the contract, leaving
              # includeFontPadding=true spacing unchanged.
          ''',
              '''    head = font["head"]
              y_max = int(getattr(head, "yMax", ascender))
              y_min = int(getattr(head, "yMin", -descender_abs))
              # Do not scan or inherit full-font outline extremes here. Decorative glyphs and stale
              # CJK bounds are unrelated to compact UI text but previously enlarged hhea/typo enough
              # to shift QQ reply rows, crop profile chips and overlap Coolapk title/heat labels.
              # The fixed caps below intentionally collapse every source to the same line-box contract.

              # Apps rendering with includeFontPadding=false lay out against hhea/typo. Keep both
              # values deterministic instead of expanding them from yMax/yMin.
          ''',
          )
          replace_once(
              "common/font_metrics_normalize.py",
              '''    # fsSelection bit 7 (USE_TYPO_METRICS) makes engines lay out with the typo values,
              # so a contract-only typo still lets CJK ink overflow the line box exactly as before
              # (标题压热度 / 标签少一截). Keep typo identical to the enclosed hhea box; compact
              # faces stay on the contract because hhea is floored at it.
          ''',
              '''    # fsSelection bit 7 (USE_TYPO_METRICS) makes engines lay out with typo values.
              # Mirror the fixed hhea contract so every app receives the same baseline and line box.
          ''',
          )

          # 强制直刷字体和复合字体重新生成，避免复用 v2.1.1 的旧度量缓存。
          replace_once("common/rom_adapters.sh", 'LUOSHU_NORMALIZER_VERSION="5"', 'LUOSHU_NORMALIZER_VERSION="6"')
          replace_once(
              "common/font_mix.sh",
              '$(composite_hash_file "$_digit_src")-full-composite-v11"',
              '$(composite_hash_file "$_digit_src")-full-composite-v11-metrics-v6"',
          )
          replace_once(
              "common/font_mix.sh",
              "printf 'isolation=full-composite-v11\\n'",
              "printf 'isolation=full-composite-v11-metrics-v6\\n'",
          )
          multi = read("common/multiweight_mix_task.sh")
          for old, new in (
              ("instance-v3|$_signature|$_role|$_effective", "instance-v4|$_signature|$_role|$_effective"),
              ("instance-v3|$_prepared_key", "instance-v4|$_prepared_key"),
              ("auto-multiweight-v3", "auto-multiweight-v4"),
          ):
              if old not in multi:
                  raise SystemExit(f"multiweight marker missing: {old}")
              multi = multi.replace(old, new)
          write("common/multiweight_mix_task.sh", multi)
          replace_once("common/font_safety.sh", "baseline-v7-mono-v6", "baseline-v8-mono-v7")
          replace_once("common/module_update_state.sh", "baseline-v7-mono-v6", "baseline-v8-mono-v7")

          # 2) HyperOS 3：补齐 mi_ext 分区、时钟/Mitype 物理槽和对应 XML 配置。
          replace_once(
              "common/hyperos_global.sh",
              '''    printf '%s|%s\n' "${LUOSHU_SYSTEM_EXT_FONTS_ROOT:-/system_ext/fonts}" "$_module/system_ext/fonts"
          }
          ''',
              '''    printf '%s|%s\n' "${LUOSHU_SYSTEM_EXT_FONTS_ROOT:-/system_ext/fonts}" "$_module/system_ext/fonts"
              printf '%s|%s\n' "${LUOSHU_MI_EXT_FONTS_ROOT:-/mi_ext/fonts}" "$_module/mi_ext/fonts"
          }

          # HyperOS 3 may move OEM font families/configuration into mi_ext. Override the shared
          # specification function after font_config_runtime.sh is loaded so transactional XML
          # generation, validation and rollback cover that partition as well.
          _luoshu_font_config_specs() {
              _lfc_module="$(_luoshu_hyperos_module_dir)"
              _lfc_system_etc="${LUOSHU_SYSTEM_ETC_ROOT:-/system/etc}"
              _lfc_product_etc="${LUOSHU_PRODUCT_ETC_ROOT:-/product/etc}"
              _lfc_system_ext_etc="${LUOSHU_SYSTEM_EXT_ETC_ROOT:-/system_ext/etc}"
              _lfc_mi_ext_etc="${LUOSHU_MI_EXT_ETC_ROOT:-/mi_ext/etc}"

              printf 'system/fonts.xml|%s/fonts.xml|%s/system/etc/fonts.xml|%s/system/fonts\n' "$_lfc_system_etc" "$_lfc_module" "$_lfc_module"
              printf 'system/font_fallback.xml|%s/font_fallback.xml|%s/system/etc/font_fallback.xml|%s/system/fonts\n' "$_lfc_system_etc" "$_lfc_module" "$_lfc_module"
              printf 'product/fonts.xml|%s/fonts.xml|%s/product/etc/fonts.xml|%s/product/fonts\n' "$_lfc_product_etc" "$_lfc_module" "$_lfc_module"
              printf 'product/font_fallback.xml|%s/font_fallback.xml|%s/product/etc/font_fallback.xml|%s/product/fonts\n' "$_lfc_product_etc" "$_lfc_module" "$_lfc_module"
              printf 'product/fonts_customization.xml|%s/fonts_customization.xml|%s/product/etc/fonts_customization.xml|%s/product/fonts\n' "$_lfc_product_etc" "$_lfc_module" "$_lfc_module"
              printf 'product/font_customization.xml|%s/font_customization.xml|%s/product/etc/font_customization.xml|%s/product/fonts\n' "$_lfc_product_etc" "$_lfc_module" "$_lfc_module"
              printf 'product/mi_fonts_customization.xml|%s/mi_fonts_customization.xml|%s/product/etc/mi_fonts_customization.xml|%s/product/fonts\n' "$_lfc_product_etc" "$_lfc_module" "$_lfc_module"
              printf 'system_ext/fonts.xml|%s/fonts.xml|%s/system_ext/etc/fonts.xml|%s/system_ext/fonts\n' "$_lfc_system_ext_etc" "$_lfc_module" "$_lfc_module"
              printf 'system_ext/font_fallback.xml|%s/font_fallback.xml|%s/system_ext/etc/font_fallback.xml|%s/system_ext/fonts\n' "$_lfc_system_ext_etc" "$_lfc_module" "$_lfc_module"
              printf 'system_ext/fonts_customization.xml|%s/fonts_customization.xml|%s/system_ext/etc/fonts_customization.xml|%s/system_ext/fonts\n' "$_lfc_system_ext_etc" "$_lfc_module" "$_lfc_module"
              printf 'system_ext/font_customization.xml|%s/font_customization.xml|%s/system_ext/etc/font_customization.xml|%s/system_ext/fonts\n' "$_lfc_system_ext_etc" "$_lfc_module" "$_lfc_module"
              printf 'mi_ext/fonts.xml|%s/fonts.xml|%s/mi_ext/etc/fonts.xml|%s/mi_ext/fonts\n' "$_lfc_mi_ext_etc" "$_lfc_module" "$_lfc_module"
              printf 'mi_ext/font_fallback.xml|%s/font_fallback.xml|%s/mi_ext/etc/font_fallback.xml|%s/mi_ext/fonts\n' "$_lfc_mi_ext_etc" "$_lfc_module" "$_lfc_module"
              printf 'mi_ext/fonts_customization.xml|%s/fonts_customization.xml|%s/mi_ext/etc/fonts_customization.xml|%s/mi_ext/fonts\n' "$_lfc_mi_ext_etc" "$_lfc_module" "$_lfc_module"
              printf 'mi_ext/font_customization.xml|%s/font_customization.xml|%s/mi_ext/etc/font_customization.xml|%s/mi_ext/fonts\n' "$_lfc_mi_ext_etc" "$_lfc_module" "$_lfc_module"
          }
          ''',
          )
          replace_once(
              "common/hyperos_global.sh",
              '''    } | awk 'NF && !seen[$0]++'
          }

          # 返回完整清理清单；直立 Roboto/GoogleSans 会在下方按真实分区重新创建。
          ''',
              '''    } | awk 'NF && !seen[$0]++'
          }

          # 小米时钟和部分系统管理页面会直连 Mitype/MiClock 物理文件，不走默认
          # sans-serif family。只替换文字/数字时钟槽，Emoji、图标和斜体仍保持原样。
          _hyperos_clock_ui_files() {
              {
                  printf '%s\n' 'MitypeVF.ttf MitypeMonoVF.ttf MitypeClock.otf MitypeClockMono.otf MiClock.otf MiClockThin.otf MiClockMono.otf MiSansClock.ttf MiSansClockVF.ttf AndroidClock.ttf AndroidClock_Highlight.ttf AndroidClock_Solid.ttf Clockopia.ttf'
                  while IFS='|' read -r _real _overlay; do
                      [ -d "$_real" ] || continue
                      for _path in "$_real"/Mitype*.ttf "$_real"/Mitype*.otf \
                                   "$_real"/MiClock*.ttf "$_real"/MiClock*.otf \
                                   "$_real"/MiSans*Clock*.ttf "$_real"/MiSans*Clock*.otf \
                                   "$_real"/AndroidClock*.ttf "$_real"/Clockopia.ttf; do
                          [ -f "$_path" ] || continue
                          _name=${_path##*/}
                          case "$_name" in *Italic*|*Oblique*|*Emoji*|*Symbol*|*Icon*) continue ;; esac
                          printf '%s\n' "$_name"
                      done
                  done <<EOF_HYPEROS_CLOCK_ROOTS
          $(_luoshu_hyperos_root_pairs)
          EOF_HYPEROS_CLOCK_ROOTS
              } | awk 'NF && !seen[$0]++'
          }

          # 返回完整清理清单；直立 Roboto/GoogleSans 与时钟数字槽会按真实分区重新创建。
          ''',
          )
          replace_once(
              "common/hyperos_global.sh",
              '''    printf '%s %s %s %s\n' "$(_hyperos_core_files)" "$(_hyperos_weight_files)" \
                  "$(_hyperos_metric_shell_files)" "$(_hyperos_upright_ui_files)"
          ''',
              '''    printf '%s %s %s %s %s\n' "$(_hyperos_core_files)" "$(_hyperos_weight_files)" \
                  "$(_hyperos_metric_shell_files)" "$(_hyperos_upright_ui_files)" "$(_hyperos_clock_ui_files)"
          ''',
          )
          replace_once(
              "common/hyperos_global.sh",
              '''    rm -f "$_module/system/fonts/$_file" "$_module/product/fonts/$_file" \
                  "$_module/system_ext/fonts/$_file" 2>/dev/null || true
          ''',
              '''    rm -f "$_module/system/fonts/$_file" "$_module/product/fonts/$_file" \
                  "$_module/system_ext/fonts/$_file" "$_module/mi_ext/fonts/$_file" 2>/dev/null || true
          ''',
          )
          replace_once(
              "common/hyperos_global.sh",
              '''    mkdir -p "$_module/system/fonts" "$_module/product/fonts" "$_module/system_ext/fonts" 2>/dev/null || true
          ''',
              '''    mkdir -p "$_module/system/fonts" "$_module/product/fonts" "$_module/system_ext/fonts" "$_module/mi_ext/fonts" 2>/dev/null || true
          ''',
          )
          replace_once(
              "common/hyperos_global.sh",
              '''    config_count=0
              if [ "$config_weight_count" -eq 9 ] && type font_config_enable_for_payload >/dev/null 2>&1; then
          ''',
              '''    clock_slot_count=0
              for _file in $(_hyperos_clock_ui_files); do
                  _weight=$(_hyperos_file_weight "$_file")
                  _anchor=$(_hyperos_weight_anchor "$regular" "$font_family" "$_weight" "$_module/system/fonts")
                  [ -s "$_anchor" ] || _anchor="$regular_anchor"
                  _added=$(_hyperos_alias_existing_targets "$_anchor" "$_file")
                  case "$_added" in ''|*[!0-9]*) _added=0 ;; esac
                  clock_slot_count=$((clock_slot_count + _added))
              done

              config_count=0
              if [ "$config_weight_count" -eq 9 ] && type font_config_enable_for_payload >/dev/null 2>&1; then
          ''',
          )
          replace_once(
              "common/hyperos_global.sh",
              '''    _log_step "  已覆盖 $core_count 个 MiSans 核心目标、$weight_count 个 ROM 字重目标、$ui_slot_count 个 Google/Roboto UI 目标、$config_weight_count 个配置字重"
          ''',
              '''    _log_step "  已覆盖 $core_count 个 MiSans 核心目标、$weight_count 个 ROM 字重目标、$ui_slot_count 个 Google/Roboto UI 目标、$clock_slot_count 个时钟/Mitype 目标、$config_weight_count 个配置字重"
          ''',
          )

          # 回归测试覆盖 mi_ext 与时钟槽。
          replace_once(
              "scripts/hyperos_global_mapping_test.sh",
              '''LUOSHU_SYSTEM_EXT_FONTS_ROOT="$ROOT/real/system_ext/fonts"
          export MODULE_DIR MODDIR USER_FONTS_DIR LUOSHU_SYSTEM_FONTS_ROOT LUOSHU_PRODUCT_FONTS_ROOT LUOSHU_SYSTEM_EXT_FONTS_ROOT
          ''',
              '''LUOSHU_SYSTEM_EXT_FONTS_ROOT="$ROOT/real/system_ext/fonts"
          LUOSHU_MI_EXT_FONTS_ROOT="$ROOT/real/mi_ext/fonts"
          export MODULE_DIR MODDIR USER_FONTS_DIR LUOSHU_SYSTEM_FONTS_ROOT LUOSHU_PRODUCT_FONTS_ROOT LUOSHU_SYSTEM_EXT_FONTS_ROOT LUOSHU_MI_EXT_FONTS_ROOT
          ''',
          )
          replace_once(
              "scripts/hyperos_global_mapping_test.sh",
              '''mkdir -p "$MODULE_DIR/system/fonts" "$MODULE_DIR/product/fonts" "$MODULE_DIR/system_ext/fonts" \
              "$USER_FONTS_DIR" "$LUOSHU_SYSTEM_FONTS_ROOT" "$LUOSHU_PRODUCT_FONTS_ROOT" "$LUOSHU_SYSTEM_EXT_FONTS_ROOT"
          ''',
              '''mkdir -p "$MODULE_DIR/system/fonts" "$MODULE_DIR/product/fonts" "$MODULE_DIR/system_ext/fonts" "$MODULE_DIR/mi_ext/fonts" \
              "$USER_FONTS_DIR" "$LUOSHU_SYSTEM_FONTS_ROOT" "$LUOSHU_PRODUCT_FONTS_ROOT" "$LUOSHU_SYSTEM_EXT_FONTS_ROOT" "$LUOSHU_MI_EXT_FONTS_ROOT"
          ''',
          )
          replace_once(
              "scripts/hyperos_global_mapping_test.sh",
              '''printf 'stock-google-bold\n' > "$LUOSHU_PRODUCT_FONTS_ROOT/GoogleSansText-Bold.ttf"
          printf 'stale-overlay\n' > "$MODULE_DIR/system/fonts/Roboto-Regular.ttf"
          ''',
              '''printf 'stock-google-bold\n' > "$LUOSHU_PRODUCT_FONTS_ROOT/GoogleSansText-Bold.ttf"
          printf 'stock-clock\n' > "$LUOSHU_MI_EXT_FONTS_ROOT/MiClock.otf"
          printf 'stock-mitype\n' > "$LUOSHU_PRODUCT_FONTS_ROOT/MitypeClock.otf"
          printf 'stale-overlay\n' > "$MODULE_DIR/system/fonts/Roboto-Regular.ttf"
          ''',
          )
          replace_once(
              "scripts/hyperos_global_mapping_test.sh",
              '''test "$(cat "$MODULE_DIR/product/fonts/GoogleSansText-Bold.ttf")" = 'bold-source'
          printf 'HyperOS global mapping tests passed.\n'
          ''',
              '''test "$(cat "$MODULE_DIR/product/fonts/GoogleSansText-Bold.ttf")" = 'bold-source'
          test "$(cat "$MODULE_DIR/mi_ext/fonts/MiClock.otf")" = 'regular-source'
          test "$(cat "$MODULE_DIR/product/fonts/MitypeClock.otf")" = 'regular-source'
          _luoshu_hyperos_root_pairs | grep -q "$LUOSHU_MI_EXT_FONTS_ROOT|$MODULE_DIR/mi_ext/fonts"
          printf 'HyperOS global mapping tests passed.\n'
          ''',
          )

          # 度量断言改为固定 0.98/0.30 em 合同。
          metrics_test = read("scripts/font_metrics_normalization_test.py")
          for old, new in (
              ('assert font["hhea"].ascent == 928', 'assert font["hhea"].ascent == 980'),
              ('assert font["hhea"].descent == -244', 'assert font["hhea"].descent == -300'),
              ('assert font_two["hhea"].ascent == 1040', 'assert font_two["hhea"].ascent == 980'),
              ('assert font_two["hhea"].descent == -244', 'assert font_two["hhea"].descent == -300'),
              ('assert font_two["OS/2"].sTypoAscender == 1040', 'assert font_two["OS/2"].sTypoAscender == 980'),
              ('assert font_two["OS/2"].sTypoDescender == -244', 'assert font_two["OS/2"].sTypoDescender == -300'),
              ('assert font_two["OS/2"].usWinDescent == 244', 'assert font_two["OS/2"].usWinDescent == 300'),
          ):
              if old not in metrics_test:
                  raise SystemExit(f"metrics assertion missing: {old}")
              metrics_test = metrics_test.replace(old, new)
          metrics_test = metrics_test.replace(
              "Glyph extremes must be enclosed by both hhea and typo (USE_TYPO_METRICS makes engines\n    # read typo), while win metrics stay capped so includeFontPadding=true spacing is unchanged.",
              "Extreme source bounds must not change hhea/typo; compact controls always receive the\n    # same 0.98/0.30 em contract while win metrics remain capped.",
          )
          write("scripts/font_metrics_normalization_test.py", metrics_test)

          replace_once(
              "scripts/check.sh",
              '''grep -q 'LUOSHU_PRODUCT_FONTS_ROOT' "$ROOT/common/hyperos_global.sh"
          grep -q 'font_instance.py' "$ROOT/common/hyperos_global.sh"
          ''',
              '''grep -q 'LUOSHU_PRODUCT_FONTS_ROOT' "$ROOT/common/hyperos_global.sh"
          grep -q 'LUOSHU_MI_EXT_FONTS_ROOT' "$ROOT/common/hyperos_global.sh"
          grep -q '_hyperos_clock_ui_files' "$ROOT/common/hyperos_global.sh"
          grep -q 'font_instance.py' "$ROOT/common/hyperos_global.sh"
          ''',
          )

          # 3) 基于最新 v2.1.1 发布树升级为 v2.1.2 预发行版。
          replace_once("module.prop", "version=v2.1.1\nversionCode=20101", "version=v2.1.2\nversionCode=20102")
          replace_once(
              "config/version_notes.conf",
              '''version=v2.1.1
          summary=App 界面美化：选择弹窗与组合页字体真身实时渲染
          notes=v2.1.1 延续界面美化：字体选择弹窗列表项图标块改为用该字体本身实时渲染（中文槽“中”、英文槽“Aa”、数字槽“123”），组合页三槽结构概览与槽位卡片图标块在已选字体后同样用所选字体渲染；Material 风格选择弹窗图标块配色统一为 primary 色系；无效字体保留静态兜底。无字体引擎行为变更。模块 versionCode 20101，正式 App versionCode 2010101。
          ''',
              '''version=v2.1.2
          summary=HyperOS 紧凑控件排版与时钟/管理器字体覆盖修复
          notes=v2.1.2 基于 v2.1.1 修复 HyperOS：统一固定 hhea/typo 行框，处理 QQ 回复栏错位、年龄标签裁切与酷安标题/热度重叠；补齐 mi_ext 分区 XML/字体槽，并覆盖 Mitype、MiClock、AndroidClock 与 Clockopia 等时钟数字英文物理槽；提升缓存与负载架构，强制重建旧度量产物。模块 versionCode 20102，正式 App versionCode 2010201。
          ''',
          )
          replace_once(
              "CHANGELOG.md",
              "## [Unreleased]\n\n",
              "## [Unreleased]\n\n- v2.1.2：修复 HyperOS 紧凑控件行框导致的 QQ 回复栏错位、年龄标签裁切和酷安标题/热度重叠。\n- 补齐 HyperOS 3 `mi_ext` 字体分区，并覆盖 Mitype/MiClock/AndroidClock/Clockopia 时钟与系统管理页面物理槽。\n- 字体度量缓存与负载架构升级，更新后自动重建旧产物。\n\n",
          )
          Path("RELEASE_NOTES_v2.1.2.md").write_text(
              """<!-- prerelease -->

          # 洛书 v2.1.2 预发行版

          本版本基于 v2.1.1，优先修复 HyperOS 真机排版与系统字体覆盖问题。

          ## HyperOS 修复

          - 固定生成字体的 hhea/OS/2 typo 行框，不再根据字体极端轮廓扩大紧凑控件高度，修复 QQ 回复信息栏错位、个人资料年龄标签裁切，以及酷安话题标题和热度叠字。
          - 新增 HyperOS 3 `mi_ext` 分区字体与 XML 事务覆盖，纳入校验、回滚和挂载负载。
          - 覆盖 Mitype、MitypeClock、MiClock、AndroidClock、Clockopia 等直连物理槽，使时钟和部分系统管理页面的英文、数字跟随用户字体。
          - 字体归一化、普通复合与自动多字重缓存键升级；安装更新后会按新架构重建旧字体负载。

          ## 版本信息

          - 模块版本：v2.1.2
          - 模块 versionCode：20102
          - 正式 App versionCode：2010201
          - 发布渠道：GitHub 预发行版

          ## 测试重点

          请在 HyperOS 3 重启后检查：QQ 回复栏、用户年龄标签、酷安话题页标题/热度、系统时钟、Root 管理器及系统管理类页面的英文与数字。
