name: One-shot font consistency migration

on:
  push:
    branches:
      - agent/font-consistency-cleanup
    paths:
      - scripts/font_consistency_followup.py
      - .github/workflows/font-consistency-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/font-consistency-cleanup
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Finish consistency source hygiene
        run: python scripts/font_consistency_followup.py

      - name: Validate generated sources
        shell: bash
        run: |
          set -euo pipefail
          find common scripts -type f -name '*.sh' -print0 | xargs -0 -n1 sh -n
          python -m py_compile common/*.py
          sh scripts/coloros_consistency_mapping_test.sh
          sh scripts/font_config_variable_weight_test.sh
          sh scripts/v2_source_audit.sh

      - name: Commit migrated ordinary sources
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git reset -- .github/workflows/font-consistency-migration.yml scripts/font_consistency_migration.py scripts/font_consistency_followup.py
          git diff --cached --check
          git commit -m 'fix: finish font consistency source hygiene'
          git push origin HEAD:agent/font-consistency-cleanup
