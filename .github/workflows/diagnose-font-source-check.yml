name: Diagnose font source check

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'perf/font-import-refresh-mix-cache'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf/font-import-refresh-mix-cache
          fetch-depth: 0
      - name: Persist failing source gate
        shell: bash
        run: |
          set +e
          sh -x scripts/check.sh > /tmp/luoshu-source-check.log 2>&1
          code=$?
          {
            echo "source_check_exit=$code"
            tail -n 160 /tmp/luoshu-source-check.log
          } > .source-check-tail.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .source-check-tail.log
          git commit -m "test: capture source check failure"
          git push origin HEAD:perf/font-import-refresh-mix-cache
