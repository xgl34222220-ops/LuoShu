name: Embedded runtime size tests
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - common/python/**
      - scripts/prune_python_runtime.sh
      - scripts/python_runtime_prune_test.sh
      - scripts/build.sh
      - .github/workflows/runtime-size.yml
permissions:
  contents: read
jobs:
  runtime:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install audit tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends zip binutils >/dev/null
      - name: Audit pruned runtime
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          sh scripts/python_runtime_prune_test.sh > "$RUNNER_TEMP/runtime-size.log" 2>&1
      - name: Upload runtime audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embedded-runtime-size-log
          path: ${{ runner.temp }}/runtime-size.log
          if-no-files-found: error
          retention-days: 2
      - name: Preserve audit result
        if: steps.audit.outcome == 'failure'
        run: exit 1
