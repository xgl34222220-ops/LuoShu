name: Apply Alpha1.4 native live preview

on:
  push:
    branches:
      - feature/v14.3-alpha1-native-import

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-alpha1-native-import
          fetch-depth: 0

      - name: Apply native live preview and full-axis state
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')

          def replace(path: str, old: str, new: str) -> None:
              file = root / path
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'missing patch anchor in {path}: {old[:120]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          native_preview = r'''package io.github.xgl34222220.luoshu

          import android.graphics.Typeface
          import android.view.Gravity
          import android.widget.TextView
          import androidx.compose.material3.MaterialTheme
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.produceState
          import androidx.compose.runtime.remember
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.toArgb
          import androidx.compose.ui.platform.LocalContext
          import androidx.compose.ui.viewinterop.AndroidView
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext
          import org.json.JSONObject
          import java.io.File
          import java.security.MessageDigest
          import kotlin.math.roundToInt

          private const val APP_BRIDGE = "/data/adb/modules/LuoShu/common/app_bridge.sh"
          private const val PREVIEW_CACHE_MAX_FILES = 12
          private const val PREVIEW_CACHE_MAX_BYTES = 160L * 1024L * 1024L

          internal data class VariableAxisInfo(
              val tag: String,
              val min: Float,
              val default: Float,
              val max: Float,
          )

          internal data class WeightAxisInfo(
              val loading: Boolean = true,
              val hasWeight: Boolean = false,
              val min: Int = 100,
              val default: Int = 400,
              val max: Int = 900,
              val axes: List<VariableAxisInfo> = emptyList(),
              val error: String = "",
          )

          private data class PreviewTypefaceState(
              val typeface: Typeface? = null,
              val file: File? = null,
              val source: String = "",
              val error: String = "",
          )

          @Composable
          internal fun rememberWeightAxisInfo(font: FontItem?): WeightAxisInfo {
              val info by produceState(
                  initialValue = WeightAxisInfo(loading = font?.variable == true),
                  key1 = font?.id,
              ) {
                  value = when {
                      font == null -> WeightAxisInfo(loading = false, error = "未选择字体")
                      !font.variable -> WeightAxisInfo(loading = false, hasWeight = false)
                      else -> runCatching {
                          val command = "sh ${RootShell.quote(APP_BRIDGE)} weight_axis ${RootShell.quote(font.id)}"
                          val result = RootShell.exec(command, timeoutMs = 25_000L)
                          if (result.code != 0) error(result.stderr.ifBlank { bridgeError(result.stdout, "字体轴读取失败") })
                          val jsonLine = result.stdout.lineSequence().firstOrNull { it.trimStart().startsWith("{") }
                              ?: error("未收到字体轴数据")
                          val root = JSONObject(jsonLine.trim())
                          if (root.optString("status") != "ok") error(root.optString("message", "字体轴读取失败"))
                          val rawAxes = root.optJSONArray("axes")
                          val axes = buildList {
                              if (rawAxes != null) {
                                  for (index in 0 until rawAxes.length()) {
                                      val axis = rawAxes.optJSONObject(index) ?: continue
                                      val tag = axis.optString("tag").trim()
                                      val minimum = axis.optDouble("min", Double.NaN).toFloat()
                                      val maximum = axis.optDouble("max", Double.NaN).toFloat()
                                      val defaultValue = axis.optDouble("default", Double.NaN).toFloat()
                                      if (tag.length == 4 && minimum.isFinite() && maximum.isFinite() && defaultValue.isFinite() && maximum >= minimum) {
                                          add(
                                              VariableAxisInfo(
                                                  tag = tag,
                                                  min = minimum,
                                                  default = defaultValue.coerceIn(minimum, maximum),
                                                  max = maximum,
                                              ),
                                          )
                                      }
                                  }
                              }
                          }
                          val weight = axes.firstOrNull { it.tag == "wght" }
                          if (weight == null) {
                              WeightAxisInfo(loading = false, hasWeight = false, axes = axes)
                          } else {
                              WeightAxisInfo(
                                  loading = false,
                                  hasWeight = true,
                                  min = weight.min.roundToInt(),
                                  default = weight.default.roundToInt(),
                                  max = weight.max.roundToInt(),
                                  axes = axes,
                              )
                          }
                      }.getOrElse { error ->
                          WeightAxisInfo(loading = false, hasWeight = false, error = error.message ?: "字体轴读取失败")
                      }
                  }
              }
              return info
          }

          @Composable
          internal fun NativeFontPreview(
              font: FontItem?,
              text: String,
              axes: Map<String, Float> = emptyMap(),
              modifier: Modifier = Modifier,
              textSizeSp: Float = 25f,
              gravity: Int = Gravity.START or Gravity.CENTER_VERTICAL,
              maxLines: Int = 2,
          ) {
              val context = LocalContext.current.applicationContext
              val textColor = MaterialTheme.colorScheme.onSurface.toArgb()
              val errorColor = MaterialTheme.colorScheme.error.toArgb()
              val cleanAxes = normalizePreviewAxes(axes)
              val axisKey = cleanAxes.entries.sortedBy { it.key }.joinToString(",") { "${it.key}=${formatAxisValue(it.value)}" }
              val requestedWeight = (cleanAxes["wght"] ?: 400f).roundToInt().coerceIn(1, 1000)
              val sourceRevision = font?.let {
                  val staticRevision = if (it.variable) "" else "|wght=$requestedWeight"
                  "${it.id}|${it.size}|${it.date}$staticRevision"
              }
              val preview by produceState(initialValue = PreviewTypefaceState(), key1 = sourceRevision) {
                  value = withContext(Dispatchers.IO) {
                      when {
                          font == null -> PreviewTypefaceState(error = "未选择字体")
                          !font.valid -> PreviewTypefaceState(error = font.error.ifBlank { "字体无效" })
                          else -> runCatching {
                              val cacheDir = File(context.cacheDir, "native-font-preview").apply { mkdirs() }
                              val extension = font.format.lowercase().takeIf { it in setOf("ttf", "otf", "ttc") } ?: "ttf"
                              val target = File(cacheDir, "${stableKey(sourceRevision.orEmpty())}.$extension")
                              if (!target.isFile || target.length() == 0L) {
                                  val command = "sh ${RootShell.quote(APP_BRIDGE)} preview_export " +
                                      "${RootShell.quote(font.id)} ${RootShell.quote(target.absolutePath)} $requestedWeight"
                                  val result = RootShell.exec(command, timeoutMs = 25_000L)
                                  val jsonLine = result.stdout.lineSequence().firstOrNull { it.trimStart().startsWith("{") }
                                  val root = jsonLine?.let { JSONObject(it.trim()) }
                                  if (result.code != 0 || root?.optString("status") != "ok") {
                                      error(root?.optString("message").orEmpty().ifBlank {
                                          result.stderr.ifBlank { "预览字体导出失败" }
                                      })
                                  }
                                  if (!target.isFile || target.length() == 0L) error("预览字体文件为空")
                              }
                              val loaded = Typeface.createFromFile(target)
                              target.setLastModified(System.currentTimeMillis())
                              trimPreviewCache(cacheDir, target)
                              PreviewTypefaceState(
                                  typeface = loaded,
                                  file = target,
                                  source = target.name,
                              )
                          }.getOrElse { error ->
                              PreviewTypefaceState(error = error.message ?: "预览字体加载失败")
                          }
                      }
                  }
              }

              val variationResult = remember(preview.file?.absolutePath, axisKey, font?.variable) {
                  if (font?.variable != true || preview.file == null || cleanAxes.isEmpty()) {
                      Result.success(preview.typeface)
                  } else {
                      runCatching {
                          Typeface.Builder(preview.file)
                              .setFontVariationSettings(toAndroidVariationSettings(cleanAxes))
                              .build()
                      }
                  }
              }
              val variationError = variationResult.exceptionOrNull()?.message.orEmpty()
              val renderedTypeface = variationResult.getOrNull() ?: preview.typeface

              AndroidView(
                  modifier = modifier,
                  factory = { viewContext ->
                      TextView(viewContext).apply {
                          includeFontPadding = false
                          setSingleLine(false)
                          this.gravity = gravity
                          this.maxLines = maxLines
                          setTextSize(android.util.TypedValue.COMPLEX_UNIT_SP, textSizeSp)
                      }
                  },
                  update = { view ->
                      val failure = preview.error.ifBlank { variationError }
                      val failed = failure.isNotBlank()
                      view.text = if (failed) "预览失败 · $failure" else text
                      view.typeface = renderedTypeface ?: Typeface.DEFAULT
                      view.gravity = gravity
                      view.maxLines = maxLines
                      view.setTextColor(if (failed) errorColor else textColor)
                      view.setTextSize(
                          android.util.TypedValue.COMPLEX_UNIT_SP,
                          if (failed) minOf(textSizeSp, 12f) else textSizeSp,
                      )
                  },
              )
          }

          private fun normalizePreviewAxes(axes: Map<String, Float>): Map<String, Float> = axes
              .filter { (tag, value) -> tag.length == 4 && value.isFinite() }

          private fun toAndroidVariationSettings(axes: Map<String, Float>): String = axes.entries
              .sortedBy { it.key }
              .joinToString(", ") { (tag, value) -> "'$tag' ${formatAxisValue(value)}" }

          private fun formatAxisValue(value: Float): String = if (value % 1f == 0f) {
              value.roundToInt().toString()
          } else {
              value.toString().trimEnd('0').trimEnd('.')
          }

          private fun bridgeError(raw: String, fallback: String): String {
              val line = raw.lineSequence().firstOrNull { it.trimStart().startsWith("{") } ?: return fallback
              return runCatching { JSONObject(line.trim()).optString("message", fallback) }.getOrDefault(fallback)
          }

          private fun stableKey(value: String): String {
              val bytes = MessageDigest.getInstance("SHA-256").digest(value.toByteArray(Charsets.UTF_8))
              return bytes.take(12).joinToString("") { byte -> "%02x".format(byte) }
          }

          private fun trimPreviewCache(directory: File, keep: File) {
              val files = directory.listFiles()
                  ?.filter { it.isFile }
                  ?.sortedByDescending { it.lastModified() }
                  .orEmpty()
              var keptFiles = 0
              var keptBytes = 0L
              files.forEach { file ->
                  val required = file.absolutePath == keep.absolutePath
                  val fits = keptFiles < PREVIEW_CACHE_MAX_FILES &&
                      keptBytes + file.length() <= PREVIEW_CACHE_MAX_BYTES
                  if (required || fits) {
                      keptFiles += 1
                      keptBytes += file.length()
                  } else {
                      file.delete()
                  }
              }
          }
          '''
          native_preview = '\n'.join(line[10:] if line.startswith('          ') else line for line in native_preview.splitlines()) + '\n'
          (root / 'android-app/app/src/main/java/io/github/xgl34222220/luoshu/NativeFontPreview.kt').write_text(native_preview, encoding='utf-8')

          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuViewModel.kt',
              'import org.json.JSONObject\n',
              'import org.json.JSONObject\nimport kotlin.math.roundToInt\n',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuViewModel.kt',
              '''    val cjkWeight: Int = 400,
              val latinWeight: Int = 400,
              val digitWeight: Int = 400,
              val enabled: Boolean = false,
          ''',
              '''    val cjkWeight: Int = 400,
              val latinWeight: Int = 400,
              val digitWeight: Int = 400,
              val cjkAxes: Map<String, Float> = mapOf("wght" to 400f),
              val latinAxes: Map<String, Float> = mapOf("wght" to 400f),
              val digitAxes: Map<String, Float> = mapOf("wght" to 400f),
              val enabled: Boolean = false,
          ''',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuViewModel.kt',
              '''                mixState = mixState.copy(
                      loading = false,
                      enabled = data.optBoolean("enabled", false),
                      cjk = data.optString("cjk", mixState.cjk),
                      latin = data.optString("latin", mixState.latin),
                      digit = data.optString("digit", mixState.digit),
                      cjkWeight = data.optInt("cjkWeight", mixState.cjkWeight).coerceIn(1, 1000),
                      latinWeight = data.optInt("latinWeight", mixState.latinWeight).coerceIn(1, 1000),
                      digitWeight = data.optInt("digitWeight", mixState.digitWeight).coerceIn(1, 1000),
                      message = if (data.optBoolean("enabled", false)) "当前正在使用复合字体" else "可直接生成新的复合字体",
                      error = "",
                  )
          ''',
              '''                val cjkWeight = data.optInt("cjkWeight", mixState.cjkWeight).coerceIn(1, 1000)
                  val latinWeight = data.optInt("latinWeight", mixState.latinWeight).coerceIn(1, 1000)
                  val digitWeight = data.optInt("digitWeight", mixState.digitWeight).coerceIn(1, 1000)
                  mixState = mixState.copy(
                      loading = false,
                      enabled = data.optBoolean("enabled", false),
                      cjk = data.optString("cjk", mixState.cjk),
                      latin = data.optString("latin", mixState.latin),
                      digit = data.optString("digit", mixState.digit),
                      cjkWeight = cjkWeight,
                      latinWeight = latinWeight,
                      digitWeight = digitWeight,
                      cjkAxes = parseAxes(data.optString("cjkAxes"), cjkWeight),
                      latinAxes = parseAxes(data.optString("latinAxes"), latinWeight),
                      digitAxes = parseAxes(data.optString("digitAxes"), digitWeight),
                      message = if (data.optBoolean("enabled", false)) "当前正在使用复合字体" else "可直接生成新的复合字体",
                      error = "",
                  )
          ''',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuViewModel.kt',
              '''    fun updateMixFont(slot: MixSlot, fontId: String) {
                  mixState = when (slot) {
                      MixSlot.Cjk -> mixState.copy(cjk = fontId)
                      MixSlot.Latin -> mixState.copy(latin = fontId)
                      MixSlot.Digit -> mixState.copy(digit = fontId)
                  }
              }

              fun updateMixWeight(slot: MixSlot, weight: Int) {
                  val safe = weight.coerceIn(1, 1000)
                  mixState = when (slot) {
                      MixSlot.Cjk -> mixState.copy(cjkWeight = safe)
                      MixSlot.Latin -> mixState.copy(latinWeight = safe)
                      MixSlot.Digit -> mixState.copy(digitWeight = safe)
                  }
              }
          ''',
              '''    fun updateMixFont(slot: MixSlot, fontId: String) {
                  mixState = when (slot) {
                      MixSlot.Cjk -> mixState.copy(cjk = fontId, cjkAxes = mapOf("wght" to mixState.cjkWeight.toFloat()))
                      MixSlot.Latin -> mixState.copy(latin = fontId, latinAxes = mapOf("wght" to mixState.latinWeight.toFloat()))
                      MixSlot.Digit -> mixState.copy(digit = fontId, digitAxes = mapOf("wght" to mixState.digitWeight.toFloat()))
                  }
              }

              fun updateMixWeight(slot: MixSlot, weight: Int) {
                  updateMixAxis(slot, "wght", weight.coerceIn(1, 1000).toFloat())
              }

              fun updateMixAxis(slot: MixSlot, tag: String, value: Float) {
                  val cleanTag = tag.trim()
                  if (cleanTag.length != 4 || !value.isFinite()) return
                  val safe = if (cleanTag == "wght") value.coerceIn(1f, 1000f) else value
                  mixState = when (slot) {
                      MixSlot.Cjk -> mixState.copy(
                          cjkWeight = if (cleanTag == "wght") safe.roundToInt() else mixState.cjkWeight,
                          cjkAxes = mixState.cjkAxes + (cleanTag to safe),
                      )
                      MixSlot.Latin -> mixState.copy(
                          latinWeight = if (cleanTag == "wght") safe.roundToInt() else mixState.latinWeight,
                          latinAxes = mixState.latinAxes + (cleanTag to safe),
                      )
                      MixSlot.Digit -> mixState.copy(
                          digitWeight = if (cleanTag == "wght") safe.roundToInt() else mixState.digitWeight,
                          digitAxes = mixState.digitAxes + (cleanTag to safe),
                      )
                  }
              }
          ''',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuViewModel.kt',
              '''        mixState = mixState.copy(
                  busy = true,
                  taskState = "queued",
                  message = "正在提交复合字体任务…",
                  progress = 1,
                  error = "",
              )
              viewModelScope.launch {
          ''',
              '''        val cjkAxes = serializeAxes(mixState.cjkAxes, mixState.cjkWeight)
              val latinAxes = serializeAxes(mixState.latinAxes, mixState.latinWeight)
              val digitAxes = serializeAxes(mixState.digitAxes, mixState.digitWeight)
              mixState = mixState.copy(
                  busy = true,
                  taskState = "queued",
                  message = "正在提交复合字体任务…",
                  progress = 1,
                  error = "",
              )
              viewModelScope.launch {
          ''',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuViewModel.kt',
              '''                    append(RootShell.quote("wght=${mixState.cjkWeight}")).append(' ')
                      append(RootShell.quote("wght=${mixState.latinWeight}")).append(' ')
                      append(RootShell.quote("wght=${mixState.digitWeight}"))
          ''',
              '''                    append(RootShell.quote(cjkAxes)).append(' ')
                      append(RootShell.quote(latinAxes)).append(' ')
                      append(RootShell.quote(digitAxes))
          ''',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuViewModel.kt',
              '''    private fun firstJson(raw: String): JSONObject {
          ''',
              '''    private fun parseAxes(raw: String, fallbackWeight: Int): Map<String, Float> {
                  val axes = linkedMapOf<String, Float>()
                  raw.split(',').forEach { item ->
                      val parts = item.split('=', limit = 2)
                      if (parts.size != 2) return@forEach
                      val tag = parts[0].trim()
                      val value = parts[1].trim().toFloatOrNull()
                      if (tag.length == 4 && value != null && value.isFinite()) axes[tag] = value
                  }
                  if ("wght" !in axes) axes["wght"] = fallbackWeight.toFloat()
                  return axes.toMap()
              }

              private fun serializeAxes(axes: Map<String, Float>, fallbackWeight: Int): String {
                  val normalized = axes.filter { (tag, value) -> tag.length == 4 && value.isFinite() }.toMutableMap()
                  if ("wght" !in normalized) normalized["wght"] = fallbackWeight.toFloat()
                  return normalized.toSortedMap().entries.joinToString(",") { (tag, value) ->
                      val number = if (value % 1f == 0f) value.roundToInt().toString() else value.toString().trimEnd('0').trimEnd('.')
                      "$tag=$number"
                  }
              }

              private fun firstJson(raw: String): JSONObject {
          ''',
          )

          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuApp.kt',
              'import kotlin.math.abs\n',
              'import kotlin.math.abs\nimport kotlin.math.roundToInt\n',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuApp.kt',
              '''                        "可变字体显示连续字重滑块；静态多字重只显示真实存在的档位；单一字体固定字重，不再伪造滑块。",
          ''',
              '''                        "下方预览会随每个真实可变轴或静态字重档位即时变化；只有点击生成并应用后才会写入系统字体。已打开的应用仍需重新启动进程，系统界面通常需要完整重启。",
          ''',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuApp.kt',
              'Text("生成并应用复合字体", fontWeight = FontWeight.Black)',
              'Text("生成并应用到系统", fontWeight = FontWeight.Black)',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuApp.kt',
              '''    val font = viewModel.fonts.firstOrNull { it.id == fontId }
              val weight = selectedWeight(state, slot)
          ''',
              '''    val font = viewModel.fonts.firstOrNull { it.id == fontId }
              val weight = selectedWeight(state, slot)
              val axes = selectedAxes(state, slot)
          ''',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuApp.kt',
              '''                NativeFontPreview(
                      font = font,
                      text = if (slot == MixSlot.Cjk) "洛书中文基底" else if (slot == MixSlot.Latin) "LuoShu Typography" else "0123456789",
          ''',
              '''                NativeFontPreview(
                      font = font,
                      text = if (slot == MixSlot.Cjk) "洛书中文  Aa  0123" else if (slot == MixSlot.Latin) "LuoShu Typography 0123" else "0123456789 Aa",
                      axes = axes,
          ''',
          )
          replace(
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuApp.kt',
              '''                WeightControl(
                      font = font,
                      value = weight,
                      enabled = !state.busy,
                      onValue = { viewModel.updateMixWeight(slot, it) },
                  )
          ''',
              '''                WeightControl(
                      font = font,
                      value = weight,
                      axes = axes,
                      enabled = !state.busy,
                      onValue = { viewModel.updateMixWeight(slot, it) },
                      onAxis = { tag, axisValue -> viewModel.updateMixAxis(slot, tag, axisValue) },
                  )
          ''',
          )

          app_file = root / 'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuApp.kt'
          app_text = app_file.read_text(encoding='utf-8')
          start = app_text.index('@Composable\nprivate fun WeightControl(')
          end = app_text.index('@Composable\nprivate fun FontPickerDialog(', start)
          weight_control = r'''@Composable
          private fun WeightControl(
              font: FontItem,
              value: Int,
              axes: Map<String, Float>,
              enabled: Boolean,
              onValue: (Int) -> Unit,
              onAxis: (String, Float) -> Unit,
          ) {
              val axisInfo = rememberWeightAxisInfo(font)
              when {
                  font.variable && axisInfo.loading -> {
                      Row(verticalAlignment = Alignment.CenterVertically) {
                          CircularProgressIndicator(Modifier.size(18.dp), strokeWidth = 2.dp)
                          Spacer(Modifier.width(9.dp))
                          Text("正在读取真实可变轴…", color = MaterialTheme.colorScheme.onSurfaceVariant, fontSize = 11.sp)
                      }
                  }
                  font.variable && axisInfo.axes.isNotEmpty() -> {
                      Column(verticalArrangement = Arrangement.spacedBy(13.dp)) {
                          Row(verticalAlignment = Alignment.CenterVertically) {
                              Column(Modifier.weight(1f)) {
                                  Text("真实可变轴 · 实时预览", fontWeight = FontWeight.Bold, fontSize = 12.sp)
                                  Text("与 WebUI 工作台使用同一组轴参数", color = MaterialTheme.colorScheme.onSurfaceVariant, fontSize = 10.sp)
                              }
                              CapabilityPill("${axisInfo.axes.size} 个轴", Color(0xFF8A6CE8))
                          }
                          axisInfo.axes.forEach { axis ->
                              val minimum = axis.min.coerceAtMost(axis.max)
                              val maximum = axis.max.coerceAtLeast(axis.min)
                              val current = (axes[axis.tag] ?: axis.default).coerceIn(minimum, maximum)
                              val isWeight = axis.tag == "wght"
                              val stepCount = if (isWeight && maximum > minimum) {
                                  (((maximum - minimum) / 10f).roundToInt() - 1).coerceAtLeast(0)
                              } else {
                                  0
                              }
                              Column {
                                  Row(verticalAlignment = Alignment.CenterVertically) {
                                      Text("${axis.tag} · ${axisDisplayName(axis.tag)}", fontWeight = FontWeight.Bold, fontSize = 11.sp)
                                      Spacer(Modifier.weight(1f))
                                      Text(axisValueLabel(current), color = MaterialTheme.colorScheme.primary, fontWeight = FontWeight.Black)
                                  }
                                  Slider(
                                      value = current,
                                      onValueChange = { raw ->
                                          val next = if (isWeight) ((raw / 10f).roundToInt() * 10).toFloat().coerceIn(minimum, maximum) else raw.coerceIn(minimum, maximum)
