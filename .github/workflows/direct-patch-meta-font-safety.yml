name: Directly patch and verify meta font safety

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/direct-patch-meta-font-safety.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      TARGET_BRANCH: agent/meta-module-font-safety
    steps:
      - name: Apply remaining patches through the GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.TARGET_BRANCH;

            async function read(path) {
              const result = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              return { sha: result.data.sha, text: Buffer.from(result.data.content, 'base64').toString('utf8') };
            }

            async function update(path, message, transform) {
              const current = await read(path);
              const next = transform(current.text);
              if (next === current.text) {
                core.info(`No change required: ${path}`);
                return;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch, message,
                sha: current.sha,
                content: Buffer.from(next, 'utf8').toString('base64')
              });
              core.info(`Updated ${path}`);
            }

            function replaceRequired(text, oldText, newText, label) {
              if (text.includes(newText)) return text;
              if (!text.includes(oldText)) throw new Error(`Missing patch anchor: ${label}`);
              return text.replace(oldText, newText);
            }

            await update('common/font_config_overlay.py', 'fix(font): preserve sans-serif while protecting serif files', text => {
              const oldText = `PROTECTED_FAMILY_TOKENS = (
                "emoji", "symbol", "icon", "material", "dingbat", "mono", "serif",
                "clock", "mitype", "math", "music", "braille", "barcode", "qrcode",
                "fallback", "legacy",
            )
            PROTECTED_FILE_TOKENS = PROTECTED_FAMILY_TOKENS`;
              const newText = `PROTECTED_FAMILY_TOKENS = (
                "emoji", "symbol", "icon", "material", "dingbat", "mono",
                "clock", "mitype", "math", "music", "braille", "barcode", "qrcode",
                "fallback", "legacy",
            )
            # serif is protected at the file level, but the canonical UI family is named sans-serif.
            PROTECTED_FILE_TOKENS = PROTECTED_FAMILY_TOKENS + ("serif",)`;
              return replaceRequired(text, oldText, newText, 'overlay protected family policy');
            });

            await update('common/font_config_targets.py', 'fix(font): discover sans-serif targets without touching serif fonts', text => {
              const oldTokens = `PROTECTED_TOKENS = (
                "emoji", "symbol", "icon", "material", "dingbat", "mono", "serif",
                "clock", "mitype", "math", "music", "braille", "barcode", "qrcode",
                "fallback", "legacy",
            )`;
              const newTokens = `PROTECTED_FAMILY_TOKENS = (
                "emoji", "symbol", "icon", "material", "dingbat", "mono",
                "clock", "mitype", "math", "music", "braille", "barcode", "qrcode",
                "fallback", "legacy",
            )
            PROTECTED_FILE_TOKENS = PROTECTED_FAMILY_TOKENS + ("serif",)`;
              text = replaceRequired(text, oldTokens, newTokens, 'target protected token policy');
              text = replaceRequired(
                text,
                '    if not name or any(token in name for token in PROTECTED_TOKENS):',
                '    if not name or any(token in name for token in PROTECTED_FAMILY_TOKENS):',
                'target family token use'
              );
              text = replaceRequired(
                text,
                '        or any(token in filename for token in PROTECTED_TOKENS)',
                '        or any(token in filename for token in PROTECTED_FILE_TOKENS)',
                'target file token use'
              );
              return text;
            });

            await update('common/font_manager.sh', 'refactor(font): commit single-font payloads transactionally', text => {
              if (text.includes('luoshu_payload_transaction_commit "$_font_id"')) return text;
              const oldText = `    printf '%s\\n' "$_font_id" > "$ACTIVE_FONT_CONF"
                chmod 0644 "$ACTIVE_FONT_CONF" "$SYSTEM_FONTS_DIR"/* 2>/dev/null || true`;
              const newText = `    if ! type luoshu_payload_validate_current >/dev/null 2>&1 || ! luoshu_payload_validate_current "$_font_id"; then
                echo '错误：字体负载覆盖校验失败，已恢复上一个字体' >&2
                return 6
            fi
            printf '%s\\n' "$_font_id" > "$ACTIVE_FONT_CONF" || {
                echo '错误：无法保存当前字体状态' >&2
                return 7
            }
            chmod 0644 "$ACTIVE_FONT_CONF" "$SYSTEM_FONTS_DIR"/* 2>/dev/null || true
            if type luoshu_sync_mount_payload >/dev/null 2>&1 && ! luoshu_sync_mount_payload; then
                echo '错误：元模块真实挂载目录同步失败，已恢复上一个字体' >&2
                return 7
            fi
            if ! luoshu_payload_transaction_commit "$_font_id"; then
                echo '错误：无法提交字体负载事务，已恢复上一个字体' >&2
                return 7
            fi`;
              return replaceRequired(text, oldText, newText, 'single-font transaction commit');
            });

            await update('common/font_mix.sh', 'refactor(font): commit composite payloads transactionally', text => {
              if (!text.includes('luoshu_payload_transaction_abort')) {
                text = replaceRequired(
                  text,
                  `cleanup_mix_process() {
                payload_stage_abort
                payload_stage_rollback
                rm -f "$LOCK_FILE" 2>/dev/null || true
            }`,
                  `cleanup_mix_process() {
                payload_stage_abort
                payload_stage_rollback
                type luoshu_payload_transaction_abort >/dev/null 2>&1 && luoshu_payload_transaction_abort
                rm -f "$LOCK_FILE" 2>/dev/null || true
            }`,
                  'composite cleanup rollback'
                );
              }
              if (!text.includes("set_mix_error '无法创建字体负载安全快照'")) {
                text = replaceRequired(
                  text,
                  `    echo $$ > "$LOCK_FILE"
                trap cleanup_mix_process EXIT INT TERM

                _cjk_src=$(find_family_file "$_cjk")`,
                  `    echo $$ > "$LOCK_FILE"
                trap cleanup_mix_process EXIT INT TERM
                if ! type luoshu_payload_transaction_begin >/dev/null 2>&1 || ! luoshu_payload_transaction_begin; then
                    set_mix_error '无法创建字体负载安全快照'
                    return 4
                fi

                _cjk_src=$(find_family_file "$_cjk")`,
                  'composite transaction begin'
                );
              }
              if (!text.includes('luoshu_payload_transaction_commit mix')) {
                text = replaceRequired(
                  text,
                  `    type luoshu_sync_mount_payload >/dev/null 2>&1 && luoshu_sync_mount_payload 2>/dev/null || true
                rm -f "$LOCK_FILE" 2>/dev/null || true`,
                  `    if ! type luoshu_payload_validate_current >/dev/null 2>&1 || ! luoshu_payload_validate_current mix; then
                    set_mix_error '复合字体负载覆盖校验失败，已恢复旧字体'
                    return 7
                fi
                if type luoshu_sync_mount_payload >/dev/null 2>&1 && ! luoshu_sync_mount_payload; then
                    set_mix_error '元模块真实挂载目录同步失败，已恢复旧字体'
                    return 7
                fi
                if ! luoshu_payload_transaction_commit mix; then
                    set_mix_error '无法提交复合字体负载事务，已恢复旧字体'
                    return 7
                fi
                rm -f "$LOCK_FILE" 2>/dev/null || true`,
                  'composite transaction commit'
                );
              }
              return text;
            });

            await update('service.sh', 'fix(boot): allow slow devices to confirm a safe payload', text =>
              text.replace('"$WAITED" -lt 90', '"$WAITED" -lt 600')
            );

            await update('scripts/font_config_runtime_test.sh', 'test(font): load safety layer in runtime tests', text => {
              if (!text.includes('font_config_targets.py" "$MOD/common/font_config_targets.py')) {
                text = replaceRequired(
                  text,
                  'cp -f "$ROOT/common/font_config_partitions.sh" "$MOD/common/font_config_partitions.sh"',
                  'cp -f "$ROOT/common/font_config_partitions.sh" "$MOD/common/font_config_partitions.sh"\ncp -f "$ROOT/common/font_config_targets.py" "$MOD/common/font_config_targets.py"\ncp -f "$ROOT/common/font_safety.sh" "$MOD/common/font_safety.sh"',
                  'runtime test safety copies'
                );
              }
              if (!text.includes('mkdir -p "$MOD/system/fonts"\nfor weight in 100 200')) {
                text = replaceRequired(
                  text,
                  '# Regeneration repairs every partition alias from the validated system weight set.\nfont_config_generate DemoFamily',
                  '# Regeneration repairs every partition alias from the validated system weight set.\nmkdir -p "$MOD/system/fonts"\nfor weight in 100 200 300 400 500 600 700 800 900; do\n    dd if=/dev/zero of="$MOD/system/fonts/LuoShu-${weight}.ttf" bs=2048 count=1 2>/dev/null\ndone\nfont_config_generate DemoFamily',
                  'runtime test regeneration'
                );
              }
              return text;
            });

            await update('scripts/font_safety_test.sh', 'test(font): verify confirmed boot state', text => {
              if (text.includes('= confirmed ]')) return text;
              return replaceRequired(
                text,
                `font_config_mark_boot_success
            [ ! -e "$MODDIR/config/font-payload-boot.conf" ]
            [ -s "$MODDIR/config/font-last-boot-success.conf" ]`,
                `font_config_mark_boot_success
            [ "$(sed -n 's/^state=//p' "$MODDIR/config/font-payload-boot.conf")" = confirmed ]
            font_config_boot_guard Demo
            [ "$(sed -n 's/^state=//p' "$MODDIR/config/font-payload-boot.conf")" = confirmed ]
            [ -s "$MODDIR/config/font-last-boot-success.conf" ]`,
                'confirmed boot test'
              );
            });

            await update('scripts/no_hook_bootstrap_test.sh', 'test(font): verify expanded partition ordering', text =>
              text.replace('system system_ext product my_product vendor odm oem', 'system system_ext product vendor odm oem my_product')
            );

            await update('.github/workflows/no-hook-font-engine.yml', 'ci(font): cover target, transaction, and meta sync safety', text => {
              if (!text.includes('common/font_config_targets.py')) {
                text = text.replace('      - common/font_config_overlay.py\n', '      - common/font_config_overlay.py\n      - common/font_config_targets.py\n      - common/font_safety.sh\n');
              }
              if (!text.includes('scripts/font_config_targets_test.py')) {
                text = text.replace('      - scripts/font_config_overlay_test.py\n', '      - scripts/font_config_overlay_test.py\n      - scripts/font_config_targets_test.py\n      - scripts/font_safety_test.sh\n      - scripts/meta_module_sync_test.sh\n');
              }
              if (!text.includes('Run dynamic target discovery tests')) {
                text = text.replace(
                  '      - name: Run static font identity tests\n',
                  '      - name: Run dynamic target discovery tests\n        run: python3 scripts/font_config_targets_test.py\n      - name: Run payload transaction and boot guard tests\n        run: sh -x scripts/font_safety_test.sh\n      - name: Run meta-module synchronization tests\n        run: sh -x scripts/meta_module_sync_test.sh\n      - name: Run static font identity tests\n'
                );
              }
              if (!text.includes("grep -q 'font_config_mark_boot_success' service.sh")) {
                text = text.replace(
                  "          grep -q 'font_config_boot_guard' post-fs-data.sh\n",
                  "          grep -q 'font_config_boot_guard' post-fs-data.sh\n          grep -q 'font_config_mark_boot_success' service.sh\n          grep -q 'luoshu_payload_transaction_begin' common/font_manager.sh\n          grep -q 'luoshu_payload_transaction_begin' common/font_mix.sh\n          grep -q 'font_config_targets.py' common/font_safety.sh\n"
                );
              }
              return text;
            });

      - uses: actions/checkout@v4
        with:
          ref: agent/meta-module-font-safety
          fetch-depth: 0

      - name: Run strict safety suite
        id: validation
        continue-on-error: true
        shell: bash
        run: |
          LOG="$RUNNER_TEMP/direct-meta-font-safety.log"
          set +e
          (
            set -euo pipefail
            set -x
            chmod 0755 common/font_safety.sh common/mount_compat.sh scripts/font_safety_test.sh scripts/meta_module_sync_test.sh
            python3 -m py_compile common/font_config_overlay.py common/font_config_targets.py scripts/font_config_targets_test.py
            sh -n common/font_config_runtime.sh common/font_config_partitions.sh common/font_safety.sh common/mount_compat.sh
            sh -n post-fs-data.sh service.sh common/font_manager.sh common/font_mix.sh
            python3 scripts/font_config_overlay_test.py
            python3 scripts/font_config_targets_test.py
            sh -x scripts/font_safety_test.sh
            sh -x scripts/meta_module_sync_test.sh
            sh -x scripts/font_config_runtime_test.sh
            sh -x scripts/no_hook_bootstrap_test.sh
            grep -q 'luoshu_payload_transaction_commit "$_font_id"' common/font_manager.sh
            grep -q 'luoshu_payload_transaction_commit mix' common/font_mix.sh
            grep -q 'luoshu_payload_validate_manifest_fast' common/font_safety.sh
            ! grep -RInE 'IXposedHookLoadPackage|XposedBridge|LSPosed|lspatch' common post-fs-data.sh service.sh 2>/dev/null
          ) >"$LOG" 2>&1
          RC=$?
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          cp "$LOG" "$RUNNER_TEMP/direct-meta-font-safety-preserved.log"
          exit 0

      - name: Record failure report
        if: steps.validation.outputs.rc != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.TARGET_BRANCH;
            const path = 'META_FONT_SAFETY_FAILURE.md';
            const log = fs.readFileSync(process.env.RUNNER_TEMP + '/direct-meta-font-safety-preserved.log', 'utf8');
            const body = '# Direct meta font safety validation failure\n\n```text\n' + log.slice(-30000) + '\n```\n';
            let sha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch, sha,
              message: 'test: record direct meta font safety failure',
              content: Buffer.from(body, 'utf8').toString('base64')
            });

      - name: Remove temporary branch files
        if: steps.validation.outputs.rc == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.TARGET_BRANCH;
            const paths = [
              'META_FONT_SAFETY_FAILURE.md',
              '.github/workflows/agent-meta-font-safety.yml',
              'scripts/apply_meta_font_safety_refactor.py',
              'scripts/finish_meta_font_safety_refactor.py',
              'scripts/finish_meta_font_safety_refactor_v2.py',
              'scripts/finish_meta_font_safety_refactor_v3.py',
              'scripts/finish_meta_font_safety_refactor_v4.py'
            ];
            for (const path of paths) {
              try {
                const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                await github.rest.repos.deleteFile({
                  owner, repo, path, branch, sha: current.data.sha,
                  message: `chore: remove temporary refactor file ${path}`
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

      - name: Remove dispatcher
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.github/workflows/direct-patch-meta-font-safety.yml';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            await github.rest.repos.deleteFile({
              owner, repo, path, branch: 'main', sha: current.data.sha,
              message: 'chore: remove direct meta font safety dispatcher [skip ci]'
            });

      - name: Preserve failure status
        if: steps.validation.outputs.rc != '0'
        run: exit 1
