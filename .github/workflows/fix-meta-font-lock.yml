name: Fix composite transaction lock value

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-meta-font-lock.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Repair lock PID on refactor branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'agent/meta-module-font-safety';
            const path = 'common/font_mix.sh';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            let text = Buffer.from(current.data.content, 'base64').toString('utf8');
            const oldText = '    echo $ > "$LOCK_FILE"';
            const pid = '$' + 'PPID';
            const newText = '    printf \'%s\\n\' "' + pid + '" > "$LOCK_FILE"';
            if (!text.includes(oldText) && !text.includes(newText)) {
              throw new Error('Composite lock anchor is missing');
            }
            if (text.includes(oldText)) {
              text = text.replace(oldText, newText);
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch,
                sha: current.data.sha,
                message: 'fix(font): preserve a valid composite switch lock pid',
                content: Buffer.from(text, 'utf8').toString('base64')
              });
            }

      - name: Remove dispatcher
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.github/workflows/fix-meta-font-lock.yml';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            await github.rest.repos.deleteFile({
              owner, repo, path, branch: 'main', sha: current.data.sha,
              message: 'chore: remove one-shot composite lock fix [skip ci]'
            });
