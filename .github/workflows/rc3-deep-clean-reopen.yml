name: Materialize RC3 deep cleanup
on:
  pull_request_target:
    types: [reopened]
permissions:
  contents: write
jobs:
  materialize:
    if: >-
      github.event.pull_request.number == 14 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'hotfix/v14.1.1-rc3-clean-baseline'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: helper
      - uses: actions/checkout@v4
        with:
          ref: hotfix/v14.1.1-rc3-clean-baseline
          path: target
          fetch-depth: 0
      - name: Apply trusted deep-clean patch
        run: python3 helper/scripts/rc3_deep_clean.py target
      - name: Validate WebUI
        working-directory: target
        run: |
          cp webroot/app.js /tmp/app.mjs
          cp webroot/font_analyzer.js /tmp/font_analyzer.mjs
          cp webroot/v14.js /tmp/v14.mjs
          node --check /tmp/app.mjs
          node --check /tmp/font_analyzer.mjs
          node --check /tmp/v14.mjs
          sh scripts/rc3_audit.sh
          git diff --check
      - name: Commit and push
        working-directory: target
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add webroot/app.js webroot/v14.css webroot/style.css webroot/ui_refine.css webroot/font_analyzer.js
          git diff --cached --quiet && exit 0
          git commit -m 'cleanup: remove dead Emoji and stability WebUI assets'
          git push origin HEAD:hotfix/v14.1.1-rc3-clean-baseline
