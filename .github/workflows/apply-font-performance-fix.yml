name: Apply font performance fix

on:
  push:
    branches:
      - perf/font-import-refresh-mix-cache

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply targeted fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def load(path):
              return Path(path).read_text(encoding='utf-8')

          def save(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'missing patch anchor: {label}')
              return text.replace(old, new, 1)

          # Import probe: inspect cmap in the same FontTools pass used for names/weight.
          p = 'common/font_import_probe.py'
          t = load(p)
          t = replace_once(t,
              'from fontTools.ttLib import TTFont\n',
              'from fontTools.ttLib import TTFont\n\n\nCJK_UI_PROBES = tuple(map(ord, "中文字体系统默认洛书汉字ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"))\n',
              'probe constants')
          t = replace_once(t,
              'def inspect(path: Path) -> tuple[str, str, int, bool, bool]:',
              'def inspect(path: Path) -> tuple[str, str, int, bool, bool, bool]:',
              'probe signature')
          t = replace_once(t,
              '        return best_family(font), subfamily, weight, italic, "fvar" in font\n',
              '        cmap = font.getBestCmap() or {}\n        supports_cjk = all(codepoint in cmap for codepoint in CJK_UI_PROBES)\n        return best_family(font), subfamily, weight, italic, "fvar" in font, supports_cjk\n',
              'probe result')
          t = replace_once(t,
              '    family, subfamily, weight, italic, variable = inspect(Path(args.font))\n    print(f"{family}|{subfamily}|{weight}|{str(italic).lower()}|{str(variable).lower()}")\n',
              '    family, subfamily, weight, italic, variable, supports_cjk = inspect(Path(args.font))\n    print(\n        f"{family}|{subfamily}|{weight}|{str(italic).lower()}|"\n        f"{str(variable).lower()}|{str(supports_cjk).lower()}"\n    )\n',
              'probe output')
          save(p, t)

          # Compatibility layer keeps the sixth metadata field.
          p = 'common/font_import_compat.sh'
          t = load(p)
          t = t.replace(
              'IFS=\'|\' read -r _probe_family _probe_subfamily _probe_weight _probe_italic _probe_variable <<EOF_PROBE',
              'IFS=\'|\' read -r _probe_family _probe_subfamily _probe_weight _probe_italic _probe_variable _probe_supports_cjk <<EOF_PROBE')
          t = replace_once(t,
              '    printf \'%s|%s|%s|%s|%s\\n\' "$_probe_family" "$_probe_subfamily" "$_probe_weight" "$_probe_italic" "$_probe_variable"\n',
              '    printf \'%s|%s|%s|%s|%s|%s\\n\' "$_probe_family" "$_probe_subfamily" "$_probe_weight" "$_probe_italic" "$_probe_variable" "${_probe_supports_cjk:-false}"\n',
              'compat output')
          t = t.replace(
              'IFS=\'|\' read -r _single_family _single_subfamily _single_weight _single_italic _single_variable <<EOF_SINGLE',
              'IFS=\'|\' read -r _single_family _single_subfamily _single_weight _single_italic _single_variable _single_supports_cjk <<EOF_SINGLE')
          save(p, t)

          # ZIP importer: select by actual cmap coverage and return the real imported id.
          p = 'common/font_import.sh'
          t = load(p)
          t = replace_once(t,
              '        _probe_family=""; _probe_subfamily=""; _probe_weight=""; _probe_italic=""; _probe_variable=""\n',
              '        _probe_family=""; _probe_subfamily=""; _probe_weight=""; _probe_italic=""; _probe_variable=""; _probe_supports_cjk=""\n',
              'zip probe vars')
          t = replace_once(t,
              '            IFS=\'|\' read -r _probe_family _probe_subfamily _probe_weight _probe_italic _probe_variable <<EOF_PROBE',
              '            IFS=\'|\' read -r _probe_family _probe_subfamily _probe_weight _probe_italic _probe_variable _probe_supports_cjk <<EOF_PROBE',
              'zip probe read')
          t = replace_once(t,
              '        _italic="${_probe_italic:-false}"\n        printf \'%s|%s|text|%s|%s|%s|%s|%s|%s|%s\n\'             "$_family" "$_variable" "$_size" "$_base" "$_f" "$_class" "$_role" "${_probe_weight:-0}" "$_italic" >> "$_manifest"\n',
              '        _italic="${_probe_italic:-false}"\n        _supports_cjk="${_probe_supports_cjk:-false}"\n        printf \'%s|%s|text|%s|%s|%s|%s|%s|%s|%s|%s\n\'             "$_family" "$_variable" "$_size" "$_base" "$_f" "$_class" "$_role" "${_probe_weight:-0}" "$_italic" "$_supports_cjk" >> "$_manifest"\n',
              'zip manifest')
          t = replace_once(t,
              '_best_score=-999999; _best_path=""; _best_family=""; _best_variable=false; _best_name=""; _best_class=neutral; _best_role=regular; _best_size=0',
              '_best_score=-999999; _best_path=""; _best_family=""; _best_variable=false; _best_name=""; _best_class=neutral; _best_role=regular; _best_size=0; _best_supports_cjk=false',
              'zip best init')
          t = t.replace(
              "while IFS='|' read -r _family _variable _kind _size _base _path _class _role _weight_class _italic; do",
              "while IFS='|' read -r _family _variable _kind _size _base _path _class _role _weight_class _italic _supports_cjk; do")
          t = replace_once(t,
              '        _score=$((_mb * 120 + _family_count * 260))\n',
              '        _score=$((_mb * 120 + _family_count * 260))\n        [ "$_supports_cjk" = true ] && _score=$((_score + 12000))\n',
              'zip cjk score')
          t = replace_once(t,
              '            _best_score=$_score; _best_path=$_path; _best_family=$_family; _best_variable=$_variable; _best_name=$_base; _best_class=$_class; _best_role=$_role; _best_size=$_size\n',
              '            _best_score=$_score; _best_path=$_path; _best_family=$_family; _best_variable=$_variable; _best_name=$_base; _best_class=$_class; _best_role=$_role; _best_size=$_size; _best_supports_cjk=$_supports_cjk\n',
              'zip best cjk')
          t = replace_once(t,
              '        case "$_best_class" in cjk|cjk_traditional|east_asian) _supports_cjk=true ;; *) _supports_cjk=false ;; esac\n        import_write_font_config "$_font_id" "$_display_name" "$_zip_name" "$_module_version" "$_module_author" "$_supports_cjk" "$_best_variable" || true\n',
              '        _supports_cjk="${_best_supports_cjk:-false}"\n        import_write_font_config "$_font_id" "$_display_name" "$_zip_name" "$_module_version" "$_module_author" "$_supports_cjk" "$_best_variable" || true\n',
              'zip config cjk')
          t = replace_once(t,
              '    case "$_best_class" in cjk) _reason="检测到简体中文主字体" ;; cjk_traditional) _reason="检测到繁体中文主字体" ;; east_asian) _reason="检测到东亚文字字体" ;; latin) _reason="未找到明确中文命名，已按覆盖候选规则选择" ;; *) _reason="已按字体族完整度与文件体积选择" ;; esac\n',
              '    if [ "${_best_supports_cjk:-false}" = true ]; then\n        _reason="字体 cmap 已确认完整中文、拉丁与数字覆盖"\n    else\n        case "$_best_class" in cjk) _reason="中文命名字体缺少部分必要字形" ;; cjk_traditional) _reason="繁体命名字体缺少部分必要字形" ;; east_asian) _reason="东亚字体缺少部分必要字形" ;; latin) _reason="该模块主字体仅适合作为拉丁字体" ;; *) _reason="未检测到完整中文覆盖" ;; esac\n    fi\n',
              'zip reason')
          t = replace_once(t,
              '    printf \'{"status":"ok","data":{"package":"%s","displayName":"%s","selected":"%s","source":"%s","family":"%s","mode":"%s","reason":"%s","familyFiles":%d,"importedText":%d,"valid":%d,"invalid":%d,"ignored":%d,"message":"%s"}}\\n\' \\\n        "$(json_escape "$_zip_name")" "$(json_escape "$_display_name")" "$(json_escape "$_target_name")" "$(json_escape "$_best_name")" "$(json_escape "$_best_family")" "$(json_escape "$_mode")" "$(json_escape "$_reason")" \\\n        "$_family_count" "$_imported_text" "$_valid" "$_invalid" "$_ignored" "$(json_escape "$_message")"\n',
              '    printf \'{"status":"ok","data":{"package":"%s","id":"%s","displayName":"%s","selected":"%s","source":"%s","family":"%s","mode":"%s","supportsCjk":%s,"reason":"%s","familyFiles":%d,"importedText":%d,"valid":%d,"invalid":%d,"ignored":%d,"message":"%s"}}\\n\' \\\n        "$(json_escape "$_zip_name")" "$(json_escape "$_font_id")" "$(json_escape "$_display_name")" "$(json_escape "$_target_name")" "$(json_escape "$_best_name")" "$(json_escape "$_best_family")" "$(json_escape "$_mode")" "${_supports_cjk:-false}" "$(json_escape "$_reason")" \\\n        "$_family_count" "$_imported_text" "$_valid" "$_invalid" "$_ignored" "$(json_escape "$_message")"\n',
              'zip json')
          save(p, t)

          # Native raw import: size-filter duplicate checks and persist real CJK metadata.
          p = 'common/native_import.sh'
          t = load(p)
          t = replace_once(t,
              'find_duplicate() {\n    _hash="$1"\n',
              'find_duplicate() {\n    _source="$1"\n    _hash="$2"\n    _source_size=$(stat -c %s "$_source" 2>/dev/null)\n    case "$_source_size" in \'\'|*[!0-9]*) _source_size=0 ;; esac\n',
              'duplicate signature')
          t = replace_once(t,
              '        [ -f "$_file" ] || continue\n        [ "$(file_hash "$_file")" = "$_hash" ] && { printf \'%s\\n\' "$_file"; return 0; }\n',
              '        [ -f "$_file" ] || continue\n        _candidate_size=$(stat -c %s "$_file" 2>/dev/null)\n        [ "$_candidate_size" = "$_source_size" ] || continue\n        [ "$(file_hash "$_file")" = "$_hash" ] && { printf \'%s\\n\' "$_file"; return 0; }\n',
              'duplicate size gate')
          t = replace_once(t,
              '    _duplicate=$(find_duplicate "$_hash")\n',
              '    _duplicate=$(find_duplicate "$_src" "$_hash")\n',
              'duplicate call')
          t = replace_once(t,
              '    _family=$(detect_font_family "$(basename "$_target")")\n    printf \'{"status":"ok","data":{"kind":"font","id":"%s","name":"%s","format":"%s","duplicate":false,"message":"字体已导入"}}\\n\' \\\n        "$(json_escape "$_family")" "$(json_escape "$_stem")" "$_format"\n',
              '    _family=$(detect_font_family "$(basename "$_target")")\n    _supports_cjk=false\n    _probe=$(import_probe_metadata "$_target" 2>/dev/null)\n    if [ -n "$_probe" ]; then\n        IFS=\'|\' read -r _probe_family _probe_subfamily _probe_weight _probe_italic _probe_variable _probe_supports_cjk <<EOF_RAW_PROBE\n$_probe\nEOF_RAW_PROBE\n        [ "$_probe_supports_cjk" = true ] && _supports_cjk=true\n    fi\n    {\n        printf \'name=%s\\n\' "$_stem"\n        printf \'description=直接导入字体文件\\n\'\n        printf \'supports_cjk=%s\\n\' "$_supports_cjk"\n        printf \'is_variable=%s\\n\' "${_probe_variable:-false}"\n    } > "$USER_FONTS_DIR/${_family}.conf" 2>/dev/null || true\n    printf \'{"status":"ok","data":{"kind":"font","id":"%s","name":"%s","format":"%s","supportsCjk":%s,"duplicate":false,"message":"字体已导入"}}\\n\' \\\n        "$(json_escape "$_family")" "$(json_escape "$_stem")" "$_format" "$_supports_cjk"\n',
              'raw cjk metadata')
          save(p, t)

          # Font list: replace repeated whole-directory scans with one lightweight manifest pass.
          p = 'common/font_manager.sh'
          t = load(p)
          new_index = r'''font_index_manifest() {
    _manifest="$1"
    : > "$_manifest" 2>/dev/null || return 1
    for _font_file in "$USER_FONTS_DIR"/*.ttf "$USER_FONTS_DIR"/*.otf "$USER_FONTS_DIR"/*.ttc \
                      "$USER_FONTS_DIR"/*.TTF "$USER_FONTS_DIR"/*.OTF "$USER_FONTS_DIR"/*.TTC; do
        [ -f "$_font_file" ] || continue
        _name=$(basename "$_font_file" 2>/dev/null)
        _family=$(detect_font_family "$_name")
        case "$_family" in ''|SysFont*|SysSans*) continue ;; esac
        case "$_name|$_family" in *'|'*) continue ;; esac
        _weight=$(detect_font_weight "$_name")
        _size=$(stat -c %s "$_font_file" 2>/dev/null)
        _mtime=$(stat -c %Y "$_font_file" 2>/dev/null)
        case "$_size" in ''|*[!0-9]*) _size=0 ;; esac
        case "$_mtime" in ''|*[!0-9]*) _mtime=0 ;; esac
        printf '%s|%s|%s|%s|%s|%s\n' "$_family" "$_weight" "$_font_file" "$_name" "$_size" "$_mtime" >> "$_manifest"
    done
}

build_font_index_json() {
    _refresh="$1"
    _current=$(get_current_font_id)
    _fingerprint=$(font_index_fingerprint)
    _cache_key="native-v3|${_current}|${_fingerprint}"
    _saved_key=$(cat "$FONT_INDEX_KEY" 2>/dev/null)
    if [ "$_refresh" != refresh ] && [ "$_saved_key" = "$_cache_key" ] && [ -s "$FONT_INDEX_JSON" ] && grep -q '"status":"ok"' "$FONT_INDEX_JSON" 2>/dev/null; then
        cat "$FONT_INDEX_JSON"
        return 0
    fi

    _manifest="$CONFIG_DIR/.native-font-manifest.$$"
    _families="$CONFIG_DIR/.native-font-families.$$"
    font_index_manifest "$_manifest" || : > "$_manifest"
    awk -F'|' 'NF >= 6 && !seen[$1]++ {print $1}' "$_manifest" > "$_families" 2>/dev/null || : > "$_families"
    _output="${FONT_INDEX_JSON}.tmp.$$"
    {
        _first=true
        _font_count=$(grep -c . "$_families" 2>/dev/null)
        _total_bytes=$(awk -F'|' '{total += $5} END {print total + 0}' "$_manifest" 2>/dev/null)
        case "$_font_count" in ''|*[!0-9]*) _font_count=0 ;; esac
        case "$_total_bytes" in ''|*[!0-9]*) _total_bytes=0 ;; esac
        printf '{"status":"ok","data":{"current":"%s","scanner":{"primary":"manifest-fast","nativeAvailable":false},"stats":{"count":%s,"totalSize":"%s"},"fonts":[' \
            "$(json_escape "$_current")" "$_font_count" "$(format_filesize "$_total_bytes")"

        while IFS= read -r _family; do
            [ -n "$_family" ] || continue
            _weights=$(awk -F'|' -v wanted="$_family" '
                $1 == wanted {seen[$2] = 1}
                END {
                    count = split("variable thin extralight light regular medium semibold bold extrabold black", order, " ")
                    out = ""
                    for (i = 1; i <= count; i++) if (seen[order[i]]) out = out (out ? "," : "") order[i]
                    print out
                }
            ' "$_manifest")
            [ -n "$_weights" ] || continue
            _record=$(awk -F'|' -v wanted="$_family" '
                BEGIN {
                    priority["regular"]=1; priority["medium"]=2; priority["bold"]=3; priority["semibold"]=4
                    priority["variable"]=5; priority["light"]=6; priority["extralight"]=7; priority["thin"]=8
                    priority["extrabold"]=9; priority["black"]=10; best=999
                }
                $1 == wanted {
                    p = ($2 in priority) ? priority[$2] : 50
                    if (p < best) {best=p; line=$0}
                }
                END {print line}
            ' "$_manifest")
            [ -n "$_record" ] || continue
            IFS='|' read -r _record_family _record_weight _file _record_name _bytes _record_mtime <<EOF_RECORD
$_record
EOF_RECORD
            [ -f "$_file" ] || continue

            _weights_json=''
            _variants_json=''
            _weight_count=0
            _old_ifs="$IFS"
            IFS=','
            for _weight in $_weights; do
                [ -n "$_weight" ] || continue
                [ -n "$_weights_json" ] && _weights_json="$_weights_json,"
                _weights_json="${_weights_json}\"$(json_escape "$_weight")\""
                _weight_count=$((_weight_count + 1))
                _variant_name=$(awk -F'|' -v wanted="$_family" -v role="$_weight" '$1 == wanted && $2 == role {print $4; exit}' "$_manifest")
                if [ -n "$_variant_name" ]; then
                    [ -n "$_variants_json" ] && _variants_json="$_variants_json,"
                    _variants_json="${_variants_json}\"$(json_escape "$_weight")\":\"$(json_escape "$_variant_name")\""
                fi
            done
            IFS="$_old_ifs"

            case "$_bytes" in ''|*[!0-9]*) _bytes=0 ;; esac
            _format=UNKNOWN
            type font_detect_format >/dev/null 2>&1 && _format=$(font_detect_format "$_file" 2>/dev/null)
            _valid=true
            _error=''
            if [ "$_bytes" -lt 4096 ] 2>/dev/null; then
                _valid=false; _error='字体文件过小'
            elif [ -z "$_format" ] || [ "$_format" = UNKNOWN ]; then
                _valid=false; _error='字体格式无法识别'
            fi
            _variable=false
            case ",$_weights," in *,variable,*) _variable=true ;; esac
            _family_type=single
            [ "$_weight_count" -ge 2 ] 2>/dev/null && _family_type=static-family
            [ "$_variable" = true ] && _family_type=variable
            _date=$(stat -c '%y' "$_file" 2>/dev/null | cut -c1-10)
            _display_name="$_family"
            _supports_cjk=true
            _cfg="$USER_FONTS_DIR/${_family}.conf"
            if [ -f "$_cfg" ]; then
                _configured_name=$(sed -n 's/^name=//p' "$_cfg" 2>/dev/null | head -n1 | tr -d '\r\n')
                [ -n "$_configured_name" ] && _display_name="$_configured_name"
                _configured_cjk=$(sed -n 's/^supports_cjk=//p' "$_cfg" 2>/dev/null | head -n1 | tr -d '\r\n')
                case "$_configured_cjk" in true) _supports_cjk=true ;; false) _supports_cjk=false ;; esac
            fi

            [ "$_first" = true ] || printf ','
            printf '{"id":"%s","name":"%s","weights":[%s],"variants":{%s},"familyType":"%s","file":"%s","size":"%s","bytes":%s,"format":"%s","valid":%s,"warning":"","error":"%s","variable":%s,"supportsCjk":%s,"date":"%s"}' \
                "$(json_escape "$_family")" "$(json_escape "$_display_name")" "$_weights_json" "$_variants_json" "$(json_escape "$_family_type")" \
                "$(json_escape "$_record_name")" "$(format_filesize "$_bytes")" "$_bytes" "$(json_escape "$_format")" "$_valid" \
                "$(json_escape "$_error")" "$_variable" "$_supports_cjk" "$(json_escape "$_date")"
            _first=false
        done < "$_families"
        printf ']}}\n'
    } > "$_output" 2>/dev/null
    _result=$?
    rm -f "$_manifest" "$_families" 2>/dev/null || true
    if [ "$_result" -ne 0 ] || [ ! -s "$_output" ]; then
        rm -f "$_output" 2>/dev/null || true
        printf '{"status":"error","message":"字体索引生成失败"}\n'
        return 1
    fi
    mv -f "$_output" "$FONT_INDEX_JSON" 2>/dev/null || {
        rm -f "$_output" 2>/dev/null || true
        printf '{"status":"error","message":"字体索引缓存写入失败"}\n'
        return 1
    }
    printf '%s\n' "$_cache_key" > "$FONT_INDEX_KEY" 2>/dev/null || true
    chmod 0644 "$FONT_INDEX_JSON" "$FONT_INDEX_KEY" 2>/dev/null || true
    cat "$FONT_INDEX_JSON"
}'''
          t, count = re.subn(r'build_font_index_json\(\) \{.*?\n\}\n\nvalidate_font_json\(\) \{', new_index + '\n\nvalidate_font_json() {', t, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('failed to replace font index builder')
          save(p, t)

          # Composite engine: cache source validation/instances and key composites without rehashing huge prepared fonts.
          p = 'common/v143_auto_multiweight_mix.sh'
          t = load(p)
          t = replace_once(t,
              'COMPOSITE_CACHE="$CACHE_ROOT/composites-v1"\n',
              'COMPOSITE_CACHE="$CACHE_ROOT/composites-v2"\nPREPARED_CACHE="$CACHE_ROOT/prepared-v2"\nSOURCE_META_CACHE="$CACHE_ROOT/source-meta-v1"\n',
              'mix cache dirs')
          helper = r'''
source_signature() {
    _source="$1"
    _stat=$(stat -c '%d:%i:%s:%Y:%Z' "$_source" 2>/dev/null)
    [ -n "$_stat" ] || _stat=$(stat -c '%s:%Y' "$_source" 2>/dev/null)
    printf '%s|%s' "$_source" "$_stat" | hash_text
}

source_metadata() {
    _source="$1"
    _signature=$(source_signature "$_source")
    [ -n "$_signature" ] || return 1
    mkdir -p "$SOURCE_META_CACHE" 2>/dev/null || return 1
    _meta="$SOURCE_META_CACHE/${_signature}.conf"
    if [ -s "$_meta" ]; then
        printf '%s\n' "$_signature|$_meta"
        return 0
    fi
    font_validate "$_source" text || return 1
    _tmp="${_meta}.tmp.$$"
    {
        printf 'format=%s\n' "${FONT_CHECK_FORMAT:-UNKNOWN}"
        printf 'variable=%s\n' "${FONT_CHECK_VARIABLE:-false}"
        printf 'size=%s\n' "${FONT_CHECK_SIZE:-0}"
    } > "$_tmp" 2>/dev/null && mv -f "$_tmp" "$_meta" 2>/dev/null || return 1
    chmod 0644 "$_meta" 2>/dev/null || true
    printf '%s\n' "$_signature|$_meta"
}

prune_prepared_cache() {
    _count=0
    for _old in $(ls -1t "$PREPARED_CACHE"/*.font 2>/dev/null); do
        _count=$((_count + 1))
        [ "$_count" -le 72 ] && continue
        rm -f "$_old" 2>/dev/null || true
    done
}
'''
          t = replace_once(t, '\nprepare_source() {\n', helper + '\nprepare_source() {\n', 'mix helpers')
          old_prepare = re.search(r'prepare_source\(\) \{.*?\n\}\n\nhash_file\(\) \{', t, flags=re.S)
          if not old_prepare:
              raise SystemExit('missing prepare_source block')
          new_prepare = r'''prepare_source() {
    _role="$1"
    _family="$2"
    _axes="$3"
    _mode="$4"
    _target="$5"
    _destination="$6"
    _effective="$_axes"
    [ "$_mode" != auto ] || _effective=$(with_weight "$_axes" "$_target")
    _lookup=$(safe_weight "$_effective")
    _source=$(find_best_source "$_family" "$_lookup")
    [ -f "$_source" ] || return 1
    _metadata=$(source_metadata "$_source") || return 1
    _signature=${_metadata%%|*}
    _meta=${_metadata#*|}
    _format=$(sed -n 's/^format=//p' "$_meta" 2>/dev/null | head -n1)
    _variable=$(sed -n 's/^variable=//p' "$_meta" 2>/dev/null | head -n1)
    mkdir -p "${_destination%/*}" "$PREPARED_CACHE" 2>/dev/null || return 1

    if [ "$_variable" = true ] || [ "$_format" = TTC ]; then
        _prepared_key=$(printf '%s' "instance-v2|$_signature|$_role|$_effective" | hash_text)
        [ -n "$_prepared_key" ] || return 1
        _cached="$PREPARED_CACHE/${_prepared_key}.font"
        if [ ! -s "$_cached" ]; then
            _tmp="$PREPARED_CACHE/.${_prepared_key}.$$.tmp.font"
            rm -f "$_tmp" 2>/dev/null || true
            run_instance "$_source" "$_tmp" "$_role" "$_effective" || { rm -f "$_tmp"; return 1; }
            mv -f "$_tmp" "$_cached" 2>/dev/null || return 1
            chmod 0644 "$_cached" 2>/dev/null || true
            prune_prepared_cache
        fi
        link_or_copy "$_cached" "$_destination" || return 1
        _content_key="instance-v2|$_prepared_key"
    else
        link_or_copy "$_source" "$_destination" || return 1
        _content_key="static-v1|$_signature"
    fi
    printf '%s\n' "$_content_key" > "${_destination}.source-key" 2>/dev/null || return 1
    chmod 0644 "$_destination" "${_destination}.source-key" 2>/dev/null || true
}

hash_file() {'''
          t = t[:old_prepare.start()] + new_prepare + t[old_prepare.end():]
          old_key = '''    _key=$(printf '%s|%s|%s|auto-multiweight-v1' \\
        "$(hash_file "$_cjk")" "$(hash_file "$_latin")" "$(hash_file "$_digit")" | hash_text)
'''
          new_key = '''    _cjk_key=$(cat "${_cjk}.source-key" 2>/dev/null)
    _latin_key=$(cat "${_latin}.source-key" 2>/dev/null)
    _digit_key=$(cat "${_digit}.source-key" 2>/dev/null)
    if [ -n "$_cjk_key" ] && [ -n "$_latin_key" ] && [ -n "$_digit_key" ]; then
        _key=$(printf '%s|%s|%s|auto-multiweight-v2' "$_cjk_key" "$_latin_key" "$_digit_key" | hash_text)
    else
        _key=$(printf '%s|%s|%s|auto-multiweight-v2' \\
            "$(hash_file "$_cjk")" "$(hash_file "$_latin")" "$(hash_file "$_digit")" | hash_text)
    fi
'''
          t = replace_once(t, old_key, new_key, 'mix composite key')
          t = replace_once(t,
              '    _tmp="$COMPOSITE_CACHE/.${_key}.$$.tmp.font"\n',
              '    if [ -n "$_cjk_key" ] && [ "$_cjk_key" = "$_latin_key" ] && [ "$_cjk_key" = "$_digit_key" ]; then\n        link_or_copy "$_cjk" "$_cached" || return 1\n        link_or_copy "$_cached" "$_output" || return 1\n        chmod 0644 "$_cached" "$_output" 2>/dev/null || true\n        prune_composite_cache\n        return 0\n    fi\n    _tmp="$COMPOSITE_CACHE/.${_key}.$$.tmp.font"\n',
              'mix same source shortcut')
          t = t.replace('isolation=auto-multiweight-v1', 'isolation=auto-multiweight-v2')
          t = replace_once(t,
              '    mkdir -p "$CONFIG_DIR" "$CACHE_ROOT" "$COMPOSITE_CACHE" "$MODDIR/logs" 2>/dev/null || {\n',
              '    mkdir -p "$CONFIG_DIR" "$CACHE_ROOT" "$COMPOSITE_CACHE" "$PREPARED_CACHE" "$SOURCE_META_CACHE" "$MODDIR/logs" 2>/dev/null || {\n',
              'mix mkdir caches')
          save(p, t)

          # App model/cache/labels: expose actual CJK coverage and show refresh activity.
          p = 'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuViewModel.kt'
          t = load(p)
          t = replace_once(t,
              '    val error: String,\n    val weights: List<String>,\n) {',
              '    val error: String,\n    val weights: List<String>,\n    val supportsCjk: Boolean = true,\n) {',
              'FontItem coverage')
          t = replace_once(t,
              '                    error = item.optString("error", ""),\n                    weights = weights,\n',
              '                    error = item.optString("error", ""),\n                    weights = weights,\n                    supportsCjk = item.optBoolean("supportsCjk", true),\n',
              'parse coverage')
          save(p, t)

          p = 'android-app/app/src/main/java/io/github/xgl34222220/luoshu/FontIndexStore.kt'
          t = load(p)
          t = t.replace('font-index-v2.json', 'font-index-v3.json')
          t = replace_once(t,
              '                            error = item.optString("error", ""),\n                            weights = weights,\n',
              '                            error = item.optString("error", ""),\n                            weights = weights,\n                            supportsCjk = item.optBoolean("supportsCjk", true),\n',
              'cache load coverage')
          t = replace_once(t,
              '                                .put("error", font.error)\n                                .put("weights", JSONArray(font.weights)),\n',
              '                                .put("error", font.error)\n                                .put("weights", JSONArray(font.weights))\n                                .put("supportsCjk", font.supportsCjk),\n',
              'cache save coverage')
          t = t.replace('const val SCHEMA_VERSION = 2', 'const val SCHEMA_VERSION = 3')
          save(p, t)

          p = 'android-app/app/src/main/java/io/github/xgl34222220/luoshu/ui/font/FontUiSupport.kt'
          t = load(p)
          old = '''internal fun fontCapabilityLabel(font: FontItem): String = when {
    font.variable -> "可变字体"
    fontStaticWeights(font).size >= 2 ->
        "多字重 · ${fontStaticWeights(font).joinToString(" / ")}"
    else -> "固定 ${fontWeightName(fontFixedWeight(font))}"
}
'''
          new = '''internal fun fontCapabilityLabel(font: FontItem): String {
    val capability = when {
        font.variable -> "可变字体"
        fontStaticWeights(font).size >= 2 ->
            "多字重 · ${fontStaticWeights(font).joinToString(" / ")}"
        else -> "固定 ${fontWeightName(fontFixedWeight(font))}"
    }
    return if (font.supportsCjk) capability else "仅拉丁 · $capability"
}

internal fun fontPreviewText(font: FontItem, detailed: Boolean = false): String = when {
    font.supportsCjk && detailed -> "洛书字体详情预览\\nHello 0123456789"
    font.supportsCjk -> "洛书字体预览  Hello 0123456789"
    detailed -> "Hello 0123456789\\nLatin font · 中文将回退系统字体"
    else -> "Hello 0123456789  Latin font"
}
'''
          t = replace_once(t, old, new, 'font labels')
          save(p, t)

          for p in [
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/ui/library/FontLibraryScreenMaterial.kt',
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/ui/library/FontLibraryScreenMiuix.kt',
              'android-app/app/src/main/java/io/github/xgl34222220/luoshu/ui/library/FontDetailsDialog.kt',
          ]:
              t = load(p)
              if 'import io.github.xgl34222220.luoshu.ui.font.fontPreviewText' not in t:
                  t = t.replace(
                      'import io.github.xgl34222220.luoshu.ui.font.fontCapabilityLabel\n',
                      'import io.github.xgl34222220.luoshu.ui.font.fontCapabilityLabel\nimport io.github.xgl34222220.luoshu.ui.font.fontPreviewText\n')
              t = t.replace('text = "洛书字体预览\\nHello 0123456789",', 'text = fontPreviewText(font, detailed = true),')
              t = t.replace('text = "洛书字体预览  Hello 0123456789",', 'text = fontPreviewText(font),')
              t = t.replace('text = "洛书字体详情预览\\nHello 0123456789",', 'text = fontPreviewText(font, detailed = true),')
              if p.endswith('FontDetailsDialog.kt'):
                  t = replace_once(t,
                      '                FontDetailLine("字重", font.weightLabel, primaryText, secondaryText)\n',
                      '                FontDetailLine("字重", font.weightLabel, primaryText, secondaryText)\n                FontDetailLine("中文覆盖", if (font.supportsCjk) "完整" else "不完整，仅建议作为英文字体", primaryText, secondaryText)\n',
                      'detail coverage')
              save(p, t)

          p = 'android-app/app/src/main/java/io/github/xgl34222220/luoshu/ui/library/FontLibraryContract.kt'
          t = load(p)
          t = replace_once(t,
              '        loading = fontLoading,\n',
              '        loading = fontLoading || fontRefreshing,\n',
              'refresh indicator')
          save(p, t)

          p = 'android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuAppShell.kt'
          t = load(p)
          t = replace_once(t,
              '                message = "直接应用「${font.name}」。准备完成后需要完整重启手机。",\n',
              '                message = if (font.supportsCjk) {\n                    "直接应用「${font.name}」。准备完成后需要完整重启手机。"\n                } else {\n                    "「${font.name}」不包含完整中文字形。直接应用后中文会继续使用系统默认字体，看起来可能没有变化；建议在组合页把它作为英文字体使用。"\n                },\n',
              'apply coverage warning')
          save(p, t)

          # Regression contracts.
          p = 'scripts/native_zip_import_test.sh'
          t = load(p)
          t = replace_once(t,
              'test "$(PYTHONPATH="$ROOT/common/python/lib/python3.14/site-packages" python3 -S "$ROOT/common/font_import_probe.py" "$TMP/pkg/Mystery-B.ttf" | cut -d\'|\' -f3)" = 800\n',
              'test "$(PYTHONPATH="$ROOT/common/python/lib/python3.14/site-packages" python3 -S "$ROOT/common/font_import_probe.py" "$TMP/pkg/Mystery-B.ttf" | cut -d\'|\' -f3)" = 800\ntest "$(PYTHONPATH="$ROOT/common/python/lib/python3.14/site-packages" python3 -S "$ROOT/common/font_import_probe.py" "$TMP/pkg/Mystery-B.ttf" | cut -d\'|\' -f6)" = false\n',
              'probe coverage test')
          t = replace_once(t,
              "printf '%s\\n' \"$STYLE_OUTPUT\" | grep -q '\"importedText\":2'\n",
              "printf '%s\\n' \"$STYLE_OUTPUT\" | grep -q '\"importedText\":2'\nprintf '%s\\n' \"$STYLE_OUTPUT\" | grep -q '\"id\":\"超级花轮丸\"'\nprintf '%s\\n' \"$STYLE_OUTPUT\" | grep -q '\"supportsCjk\":false'\n",
              'zip coverage output')
          t = replace_once(t,
              "test \"$FAMILY_RESULT\" = '超级花轮丸|thin,black'\n",
              "test \"$FAMILY_RESULT\" = '超级花轮丸|thin,black'\ngrep -q '^supports_cjk=false$' \"$TMP/public/fonts/超级花轮丸.conf\"\ngrep -q '_candidate_size.*_source_size' \"$ROOT/common/native_import.sh\"\n",
              'zip config coverage')
          save(p, t)

          p = 'scripts/auto_multiweight_engine_test.sh'
          t = load(p)
          t = replace_once(t,
              "grep -q 'build_composite_cached' \"$ENGINE\"\n",
              "grep -q 'build_composite_cached' \"$ENGINE\"\ngrep -q 'source_metadata' \"$ENGINE\"\ngrep -q 'prepared-v2' \"$ENGINE\"\ngrep -q '\\.source-key' \"$ENGINE\"\ngrep -q '_cjk_key.*_latin_key.*_digit_key' \"$ENGINE\"\n",
              'mix cache contracts')
          save(p, t)

          p = 'android-app/app/src/test/java/io/github/xgl34222220/luoshu/ui/font/FontUiSupportTest.kt'
          t = load(p)
          t = replace_once(t,
              'import org.junit.Assert.assertFalse\n',
              'import org.junit.Assert.assertFalse\nimport org.junit.Assert.assertTrue\n',
              'ui assert import')
          t = replace_once(t,
              '    @Test\n    fun regularRemainsThePreferredStaticPreview() {\n',
              '    @Test\n    fun latinOnlyFontExplainsWhyChineseLooksLikeSystemDefault() {\n        val font = font(weights = listOf("regular"), supportsCjk = false)\n\n        assertTrue(fontCapabilityLabel(font).startsWith("仅拉丁"))\n        assertTrue(fontPreviewText(font).startsWith("Hello"))\n        assertTrue(fontPreviewText(font, detailed = true).contains("中文将回退系统字体"))\n    }\n\n    @Test\n    fun regularRemainsThePreferredStaticPreview() {\n',
              'ui coverage test')
          t = replace_once(t,
              '    private fun font(weights: List<String>) = FontItem(\n',
