name: Phase3 compile debug

on:
  push:
    branches:
      - feature/v14.3-alpha1-native-import
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile and test App
        shell: bash
        run: |
          set +e
          gradle -p android-app :app:compileDebugKotlin :app:testDebugUnitTest --stacktrace --no-daemon > phase3-compile.log 2>&1
          status=$?
          echo "gradle_exit=$status" >> phase3-compile.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase3-compile-log
          path: phase3-compile.log
          retention-days: 1
          if-no-files-found: error
