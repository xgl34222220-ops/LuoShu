name: Publish release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - module.prop
      - update.json
      - common/**
      - config/**
      - fonts/**
      - system/**
      - webroot/**
      - scripts/**
      - customize.sh
      - post-fs-data.sh
      - post-mount.sh
      - service.sh
      - uninstall.sh
      - 兼容与目录说明.txt
      - README.md
      - CHANGELOG.md
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build module
        run: sh ./scripts/build.sh
      - name: Read release version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^version=//p' module.prop | head -n 1)"
          tag="$(printf '%s' "$version" | sed 's#[ /]#-#g')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          awk -v target="## $version" '
            $0 == target { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md || printf '洛书 %s 自动构建发布。\n' "$version" > release-notes.md
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          asset="$(find dist -maxdepth 1 -type f -name '*.zip' -print -quit)"
          checksum="${asset}.sha256"
          flags=()
          case "$VERSION" in *Beta*|*RC*) flags+=(--prerelease) ;; esac
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1 || gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG 已存在。请提升 version/versionCode，不允许覆盖旧版本。" >&2
            exit 1
          fi
          gh release create "$TAG" "$asset" "$checksum" \
            --target "$GITHUB_SHA" \
            --title "洛书 $VERSION" \
            --notes-file release-notes.md \
            "${flags[@]}"
