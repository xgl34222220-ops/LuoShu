name: Publish signed release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - module.prop
      - 'RELEASE_NOTES_*.md'
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      tag:
        description: Existing immutable tag to publish (for example v2.0.0)
        required: true
        type: string
      prerelease:
        description: Publish as a GitHub pre-release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: luoshu-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Read and verify release version
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          . ./scripts/version.sh
          expected_tag="$LUOSHU_ARTIFACT_VERSION"
          tag="${GITHUB_REF_NAME}"
          mode="tag"
          source_sha="$GITHUB_SHA"
          git fetch --force --tags origin

          if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]]; then
            tag="$INPUT_TAG"
            mode="existing-tag"
            tag_sha="$(git rev-list -n1 "$tag" 2>/dev/null || true)"
            [[ -n "$tag_sha" ]] || { echo "Tag does not exist: $tag" >&2; exit 2; }
            [[ "$tag_sha" == "$GITHUB_SHA" ]] || { echo "Run this workflow from the existing tag $tag" >&2; exit 2; }
            source_sha="$tag_sha"
          elif [[ "${GITHUB_REF_TYPE}" == 'branch' ]]; then
            [[ "${GITHUB_REF_NAME}" == 'main' ]] || { echo "Stable branch publishing only supports main" >&2; exit 2; }
            tag="$expected_tag"
            tag_sha="$(git rev-list -n1 "$tag" 2>/dev/null || true)"
            if [[ -z "$tag_sha" ]]; then
              mode="create-tag"
            else
              git merge-base --is-ancestor "$tag_sha" "$GITHUB_SHA" || {
                echo "Existing tag is not an ancestor of main: $tag -> $tag_sha" >&2
                exit 2
              }
              disallowed_changes="$(git diff --name-only "$tag_sha" "$GITHUB_SHA" -- | grep -Ev '^(RELEASE_NOTES_.*\.md|\.github/workflows/release\.yml)$' || true)"
              [[ -z "$disallowed_changes" ]] || {
                echo "Existing tag differs from main by non-release files:" >&2
                printf '%s\n' "$disallowed_changes" >&2
                exit 2
              }
              mode="existing-tag"
              source_sha="$tag_sha"
            fi
          else
            tag_sha="$(git rev-list -n1 "$tag" 2>/dev/null || true)"
            [[ -n "$tag_sha" && "$tag_sha" == "$GITHUB_SHA" ]] || {
              echo "Tag checkout does not match GITHUB_SHA: $tag" >&2
              exit 2
            }
            source_sha="$tag_sha"
          fi

          [[ "$tag" == "$expected_tag" ]] || {
            echo "Tag $tag does not match module.prop ($expected_tag)" >&2
            exit 2
          }
          notes_file="RELEASE_NOTES_${LUOSHU_VERSION// /_}.md"
          [[ -s "$notes_file" ]] || { echo "Missing release notes: $notes_file" >&2; exit 2; }
          notes_temp="$RUNNER_TEMP/$notes_file"
          cp -f "$notes_file" "$notes_temp"
          prerelease="${INPUT_PRERELEASE:-false}"
          if grep -q '<!-- prerelease -->' "$notes_file"; then
            prerelease="true"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "version=$LUOSHU_VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$LUOSHU_ARTIFACT_VERSION" >> "$GITHUB_OUTPUT"
          echo "notes_file=$notes_temp" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

          if [[ "$source_sha" != "$GITHUB_SHA" ]]; then
            git checkout --detach "$source_sha"
          fi

      - name: Require signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.LUOSHU_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.LUOSHU_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LUOSHU_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LUOSHU_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            [[ -n "${!value}" ]] || { echo "Missing repository secret: LUOSHU_${value}" >&2; exit 3; }
          done
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/luoshu-release.jks"
          keytool -list -keystore "$RUNNER_TEMP/luoshu-release.jks" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null

      - name: Install module build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null

      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}

      - name: Prepare ARM64 composite runtime
        shell: bash
        run: |
          if [[ ! -x common/python/bin/luoshu-python ]]; then
            sh ./scripts/prepare_composite_runtime.sh
          fi

      - name: Run complete source and module checks
        shell: bash
        run: sh ./scripts/check.sh

      - name: Lint, test and build signed release App
        working-directory: android-app
        env:
          LUOSHU_KEYSTORE_FILE: ${{ runner.temp }}/luoshu-release.jks
          LUOSHU_KEYSTORE_PASSWORD: ${{ secrets.LUOSHU_KEYSTORE_PASSWORD }}
          LUOSHU_KEY_ALIAS: ${{ secrets.LUOSHU_KEY_ALIAS }}
          LUOSHU_KEY_PASSWORD: ${{ secrets.LUOSHU_KEY_PASSWORD }}
        run: gradle --no-daemon --stacktrace :app:lintRelease :app:testDebugUnitTest :app:assembleRelease

      - name: Verify APK signature certificate
        shell: bash
        run: |
          set -euo pipefail
          apk='android-app/app/build/outputs/apk/release/app-release.apk'
          test -s "$apk"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n1)"
          test -x "$apksigner"
          "$apksigner" verify --verbose --print-certs "$apk" | tee "$RUNNER_TEMP/apk-signature.txt"
          grep -Eq '^Verified using v(2|3|3\.1|3\.2) scheme.*: true$' "$RUNNER_TEMP/apk-signature.txt"
          grep -Eq '^Number of signers: [1-9][0-9]*$' "$RUNNER_TEMP/apk-signature.txt"
          grep -Eq 'certificate SHA-256 digest:' "$RUNNER_TEMP/apk-signature.txt"

      - name: Build App and single module package
        shell: bash
        run: |
          set -euo pipefail
          . ./scripts/version.sh
          apk='android-app/app/build/outputs/apk/release/app-release.apk'
          test -s "$apk"
          mkdir -p dist
          app="dist/LuoShu-App-${LUOSHU_ARTIFACT_VERSION}.apk"
          cp -f "$apk" "$app"
          (cd dist && sha256sum "$(basename "$app")" > "$(basename "$app").sha256")
          LUOSHU_APP_APK="$apk" sh ./scripts/build.sh
          module="dist/LuoShu-${LUOSHU_ARTIFACT_VERSION}.zip"
          test -s "$module"
          unzip -t "$module" >/dev/null
          unzip -Z1 "$module" | grep -qx 'bundled/LuoShu-App.apk'
          ! unzip -Z1 "$module" | grep -qE '(^|/)webroot(/|$)'
          unzip -p "$module" bundled/LuoShu-App.apk > "$RUNNER_TEMP/embedded.apk"
          cmp -s "$apk" "$RUNNER_TEMP/embedded.apk"
          (cd dist && sha256sum -c "$(basename "$module").sha256")
          (cd dist && sha256sum -c "$(basename "$app").sha256")

      - name: Preserve verified release candidate
        uses: actions/upload-artifact@v4
        with:
          name: LuoShu-${{ steps.version.outputs.artifact_version }}-verified-release
          path: |
            dist/LuoShu-${{ steps.version.outputs.artifact_version }}.zip
            dist/LuoShu-${{ steps.version.outputs.artifact_version }}.zip.sha256
            dist/LuoShu-App-${{ steps.version.outputs.artifact_version }}.apk
            dist/LuoShu-App-${{ steps.version.outputs.artifact_version }}.apk.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          MODE: ${{ steps.version.outputs.mode }}
          VERSION: ${{ steps.version.outputs.version }}
          ARTIFACT_VERSION: ${{ steps.version.outputs.artifact_version }}
          NOTES_FILE: ${{ steps.version.outputs.notes_file }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          if [[ "$MODE" == 'create-tag' ]]; then
            git fetch origin main
            main_sha="$(git rev-parse origin/main)"
            [[ "$main_sha" == "$GITHUB_SHA" ]] || {
              echo "main moved after validation: $main_sha != $GITHUB_SHA" >&2
              exit 4
            }
            [[ -z "$(git rev-list -n1 "$TAG" 2>/dev/null || true)" ]] || {
              echo "Tag appeared during validation: $TAG" >&2
              exit 4
            }
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; immutable releases are never overwritten." >&2
            exit 4
          fi

          module="dist/LuoShu-${ARTIFACT_VERSION}.zip"
          module_sha="${module}.sha256"
          app="dist/LuoShu-App-${ARTIFACT_VERSION}.apk"
          app_sha="${app}.sha256"
          for file in "$module" "$module_sha" "$app" "$app_sha"; do test -s "$file"; done

          prerelease=()
          case "$VERSION" in *Alpha*|*Beta*|*RC*) prerelease=(--prerelease) ;; esac
          if [[ "$PRERELEASE" == 'true' ]]; then
            prerelease=(--prerelease)
          fi
          tag_mode=(--verify-tag)
          if [[ "$MODE" == 'create-tag' ]]; then
            tag_mode=(--target "$GITHUB_SHA")
          fi
          gh release create "$TAG" "$module" "$module_sha" "$app" "$app_sha" \
            "${tag_mode[@]}" \
            --title "洛书 $VERSION" \
            --notes-file "$NOTES_FILE" \
            "${prerelease[@]}"
