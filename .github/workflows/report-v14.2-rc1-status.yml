name: Verify uploaded v14.2 RC1 assets

on:
  pull_request_target:
    types: [ready_for_review]

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  verify-uploaded-assets:
    if: github.event.pull_request.number == 17
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Download and verify published release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v14.2-RC1
          PR_NUMBER: '17'
          TARGET_SHA: 511e527a8298e5dea1916b68dd848f3645c91243
        shell: bash
        run: |
          set -uo pipefail
          log="$RUNNER_TEMP/rc1-uploaded-assets-verification.log"
          if (
            set -euo pipefail
            run="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow release.yml --limit 10 --json databaseId,status,conclusion,event,headBranch,headSha,url,createdAt --jq "map(select(.headSha == \"$TARGET_SHA\" or .headBranch == \"$TAG\")) | first")"
            [[ "$(jq -r .status <<<"$run")" == completed ]]
            [[ "$(jq -r .conclusion <<<"$run")" == success ]]
            [[ "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq .isPrerelease)" == true ]]
            expected=(
              "LuoShu-App-v14.2-RC1.apk"
              "LuoShu-App-v14.2-RC1.apk.sha256"
              "LuoShu-v14.2-RC1-Full.zip"
              "LuoShu-v14.2-RC1-Full.zip.sha256"
              "LuoShu-v14.2-RC1-Lite.zip"
              "LuoShu-v14.2-RC1-Lite.zip.sha256"
            )
            mapfile -t actual < <(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort)
            diff -u <(printf '%s\n' "${expected[@]}" | sort) <(printf '%s\n' "${actual[@]}")
            asset_dir="$RUNNER_TEMP/release-assets"
            mkdir -p "$asset_dir"
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir "$asset_dir"
            cd "$asset_dir"
            sha256sum -c LuoShu-App-v14.2-RC1.apk.sha256
            sha256sum -c LuoShu-v14.2-RC1-Full.zip.sha256
            sha256sum -c LuoShu-v14.2-RC1-Lite.zip.sha256
            unzip -t LuoShu-v14.2-RC1-Full.zip >/dev/null
            unzip -t LuoShu-v14.2-RC1-Lite.zip >/dev/null
            unzip -Z1 LuoShu-v14.2-RC1-Full.zip | grep -qx 'bundled/LuoShu-App.apk'
            ! unzip -Z1 LuoShu-v14.2-RC1-Lite.zip | grep -qx 'bundled/LuoShu-App.apk'
            unzip -p LuoShu-v14.2-RC1-Full.zip bundled/LuoShu-App.apk > embedded.apk
            cmp -s LuoShu-App-v14.2-RC1.apk embedded.apk
            build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
            test -x "$build_tools/apksigner"
            "$build_tools/apksigner" verify --verbose --print-certs LuoShu-App-v14.2-RC1.apk
            "$build_tools/apksigner" verify --verbose --print-certs embedded.apk
            printf 'release_run=%s\n' "$(jq -r .url <<<"$run")"
            printf 'assets=%s\n' "${#actual[@]}"
            printf 'result=success\n'
          ) >"$log" 2>&1; then
            result=success
          else
            result=failure
          fi
          cat "$log"
          excerpt="$(tail -n 80 "$log")"
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "RC1_UPLOADED_ASSET_VERIFICATION: **$result**\n\n\`\`\`text\n$excerpt\n\`\`\`"
          [[ "$result" == success ]]
