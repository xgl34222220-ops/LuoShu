name: Apply switch performance stage one

on:
  push:
    branches:
      - fix/v2.2.1-switch-timeout-status
    paths:
      - .github/workflows/apply-switch-performance-stage1.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v2.2.1-switch-timeout-status
          fetch-depth: 0

      - name: Patch hot path
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY' 2> /tmp/perf-stage1-error.log
          from pathlib import Path
          import re

          def sub_once(text: str, pattern: str, replacement: str, name: str, flags: int = 0) -> str:
              result, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise RuntimeError(f"{name}: expected one match, got {count}")
              return result

          rom = Path('common/rom_adapters.sh')
          text = rom.read_text()
          verify = '''_font_file_size_fast() {
              _ffsf_file="$1"
              if command -v stat >/dev/null 2>&1; then
                  stat -c '%s' "$_ffsf_file" 2>/dev/null && return 0
              fi
              if command -v toybox >/dev/null 2>&1; then
                  toybox stat -c '%s' "$_ffsf_file" 2>/dev/null && return 0
              fi
              wc -c < "$_ffsf_file" 2>/dev/null | tr -d '[:space:]'
          }

          _verify_font_copy() {
              f="$1"
              if [ ! -s "$f" ]; then
                  _log_step "  警告：$(basename "$f") 复制后为空或不存在，可能导致相关文字渲染异常"
                  return 1
              fi
              fsize="$(_font_file_size_fast "$f")"
              case "$fsize" in ''|*[!0-9]*) fsize=0 ;; esac
              if [ "$fsize" -lt 1024 ]; then
                  _log_step "  警告：$(basename "$f") 只有 ${fsize} 字节，明显小于正常字体文件，可能已损坏"
                  return 1
              fi
              return 0
          }
          '''
          verify = '\n'.join(line[10:] if line.startswith('          ') else line for line in verify.splitlines()) + '\n'
          text = sub_once(
              text,
              r'_verify_font_copy\(\) \{.*?\n\}\n\n# 为同一份字体',
              verify + '\n# 为同一份字体',
              'rom_adapters verify',
              re.S,
          )
          rom.write_text(text)

          safety = Path('common/font_safety.sh')
          text = safety.read_text()
          patterns = [
              (r'_ldt_size=\$\(wc -c < "\$_ldt_dest" 2>/dev/null \| tr -d \'\[:space:\]\'\)', '_ldt_size=$(_luoshu_filesize "$_ldt_dest")', 'dynamic target size'),
              (r'_lpv_size=\$\(wc -c < "\$_lpv_file" 2>/dev/null \| tr -d \'\[:space:\]\'\)', '_lpv_size=$(_luoshu_filesize "$_lpv_file")', 'payload size'),
          ]
          for pattern, replacement, name in patterns:
              text = sub_once(text, pattern, replacement, name)
          safety.write_text(text)

          switch = Path('common/font_switch_task.sh')
          text = switch.read_text()
          text = re.sub(
              r'# 首次处理大型 CJK 字体时，度量归一化和本机清单映射可能合理超过 45 秒。\n# 保留硬超时保护，但给真实准备流程留出足够时间；App 观察窗口仍为 120 秒。\n',
              '# 单字体切换继续以 45 秒作为硬性能与安全门槛；正常目标为约 10–20 秒。\n# 超时仍会终止任务，并由事务层恢复上一套有效字体。\n',
              text,
              count=1,
          )
          if text.count('TIMEOUT_SECONDS="${LUOSHU_SWITCH_TIMEOUT_SECONDS:-105}"') != 1:
              raise RuntimeError('switch timeout default marker missing')
          text = text.replace('TIMEOUT_SECONDS="${LUOSHU_SWITCH_TIMEOUT_SECONDS:-105}"', 'TIMEOUT_SECONDS="${LUOSHU_SWITCH_TIMEOUT_SECONDS:-45}"', 1)
          text = text.replace('case "$TIMEOUT_SECONDS" in \'\'|*[!0-9]*) TIMEOUT_SECONDS=105 ;; esac', 'case "$TIMEOUT_SECONDS" in \'\'|*[!0-9]*) TIMEOUT_SECONDS=45 ;; esac', 1)
          text = text.replace('正在校准并映射系统字体槽，首次应用可能较慢', '正在验证并快速映射系统字体槽')
          switch.write_text(text)

          manager = Path('common/font_manager.sh')
          text = manager.read_text()
          perf = '''luoshu_switch_perf_begin() {
              LUOSHU_SWITCH_PERF_START="$(date +%s 2>/dev/null || echo 0)"
              LUOSHU_SWITCH_PERF_MARK="$LUOSHU_SWITCH_PERF_START"
          }

          luoshu_switch_perf_mark() {
              _lsp_stage="$1"
              _lsp_now="$(date +%s 2>/dev/null || echo 0)"
              case "$LUOSHU_SWITCH_PERF_START:$LUOSHU_SWITCH_PERF_MARK:$_lsp_now" in
                  *[!0-9:]*|'') return 0 ;;
              esac
              _lsp_stage_seconds=$((_lsp_now - LUOSHU_SWITCH_PERF_MARK))
              _lsp_total_seconds=$((_lsp_now - LUOSHU_SWITCH_PERF_START))
              printf '[PERF] switch stage=%s stageSeconds=%s totalSeconds=%s\n' \
                  "$_lsp_stage" "$_lsp_stage_seconds" "$_lsp_total_seconds"
              LUOSHU_SWITCH_PERF_MARK="$_lsp_now"
          }

          '''
          perf = '\n'.join(line[10:] if line.startswith('          ') else line for line in perf.splitlines()) + '\n'
          if 'luoshu_switch_perf_begin()' not in text:
              text = sub_once(text, r'\nformat_filesize\(\) \{', '\n' + perf + 'format_filesize() {', 'perf functions')
          text = sub_once(
              text,
              r'(trap \'type luoshu_payload_transaction_abort.*?EXIT HUP INT TERM\n)',
              r'\1    luoshu_switch_perf_begin\n',
              'perf begin',
          )
          text = sub_once(
              text,
              r'(        elif type font_validate >/dev/null 2>&1; then\n            font_validate "\$_source" text \|\| \{ echo "错误：\$FONT_CHECK_ERROR" >&2; return 4; \}\n        fi\n    fi\n)',
              r'\1    luoshu_switch_perf_mark validation\n',
              'validation timing',
          )
          marks = [
              ('    clear_managed_text_fonts\n', '    luoshu_switch_perf_mark transaction_snapshot\n    clear_managed_text_fonts\n', 'snapshot timing'),
              ('    if ! type luoshu_payload_validate_current >/dev/null 2>&1 || ! luoshu_payload_validate_current "$_font_id"; then\n', '    luoshu_switch_perf_mark map_slots\n    if ! type luoshu_payload_validate_current >/dev/null 2>&1 || ! luoshu_payload_validate_current "$_font_id"; then\n', 'map timing'),
              ('fi\nprintf \'%s\\n\' "$_font_id" > "$ACTIVE_FONT_CONF" || {\n', 'fi\nluoshu_switch_perf_mark payload_validate\nprintf \'%s\\n\' "$_font_id" > "$ACTIVE_FONT_CONF" || {\n', 'validate timing'),
              ('if ! luoshu_payload_transaction_commit "$_font_id"; then\n', 'luoshu_switch_perf_mark mount_sync\nif ! luoshu_payload_transaction_commit "$_font_id"; then\n', 'mount timing'),
              ('fi\n# Downloadable Fonts', 'fi\nluoshu_switch_perf_mark transaction_commit\n# Downloadable Fonts', 'commit timing'),
              ('    invalidate_font_index_cache\n    return 0\n}\n\nwrite_switch_task()', '    invalidate_font_index_cache\n    luoshu_switch_perf_mark complete\n    return 0\n}\n\nwrite_switch_task()', 'complete timing'),
          ]
          for old, new, name in marks:
              if text.count(old) != 1:
                  raise RuntimeError(f'{name}: expected one match, got {text.count(old)}')
              text = text.replace(old, new, 1)
          manager.write_text(text)

          test = Path('scripts/font_switch_performance_test.sh')
          test.write_text('''#!/bin/sh
          set -eu
          ROOT="$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)"

          verify_body="$(awk '/^_verify_font_copy\\(\\)/,/^}/' "$ROOT/common/rom_adapters.sh")"
          printf '%s\n' "$verify_body" | grep -q '_font_file_size_fast'
          ! printf '%s\n' "$verify_body" | grep -q 'wc -c'

          payload_body="$(awk '/^luoshu_payload_validate_current\\(\\)/,/^}/' "$ROOT/common/font_safety.sh")"
          ! printf '%s\n' "$payload_body" | grep -q 'wc -c'
          dynamic_body="$(awk '/^luoshu_dynamic_targets_apply\\(\\)/,/^}/' "$ROOT/common/font_safety.sh")"
          ! printf '%s\n' "$dynamic_body" | grep -q 'wc -c'

          grep -q 'LUOSHU_SWITCH_TIMEOUT_SECONDS:-45' "$ROOT/common/font_switch_task.sh"
          grep -q 'luoshu_switch_perf_mark complete' "$ROOT/common/font_manager.sh"
          echo 'font_switch_performance_test: PASS'
          '''.replace('          ', ''))

          check = Path('scripts/check.sh')
          text = check.read_text()
          if 'sh "$ROOT/scripts/font_switch_performance_test.sh"' not in text:
              text = text.replace('sh "$ROOT/scripts/mix_finalize_performance_test.sh"\n', 'sh "$ROOT/scripts/mix_finalize_performance_test.sh"\nsh "$ROOT/scripts/font_switch_performance_test.sh"\n', 1)
          check.write_text(text)
          PY

          chmod 0755 scripts/font_switch_performance_test.sh
          sh -n common/rom_adapters.sh
          sh -n common/font_safety.sh
          sh -n common/font_switch_task.sh
          sh -n common/font_manager.sh
          sh scripts/font_switch_performance_test.sh
          sh scripts/font_switch_task_test.sh

      - name: Commit patch or diagnostic
        if: always()
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          mkdir -p docs
          if [ "${{ steps.patch.outcome }}" != success ]; then
            {
              echo 'stage1 patch failed'
              echo
              cat /tmp/perf-stage1-error.log 2>/dev/null || true
            } > docs/switch-performance-stage1-error.log
            git add docs/switch-performance-stage1-error.log
            git commit -m 'chore: record switch performance stage-one error'
          else
            rm -f docs/switch-performance-stage1-error.log
            git add common/rom_adapters.sh common/font_safety.sh common/font_switch_task.sh common/font_manager.sh \
              scripts/font_switch_performance_test.sh scripts/check.sh docs/switch-performance-stage1-error.log
            git commit -m 'perf: remove repeated full-font reads from switch path'
          fi
          git push origin HEAD:fix/v2.2.1-switch-timeout-status
