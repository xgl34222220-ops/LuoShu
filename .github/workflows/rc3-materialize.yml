name: Materialize RC3 clean baseline
on:
  pull_request_target:
    types: [synchronize]
permissions:
  contents: write
jobs:
  materialize:
    if: >-
      github.event.pull_request.number == 14 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'hotfix/v14.1.1-rc3-clean-baseline'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/v14.1.1-rc3-clean-baseline
          fetch-depth: 0
      - name: Apply deterministic RC3 cleanup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_once(path, old, new):
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one exact match, got {count}: {old[:80]!r}')
              write(path, text.replace(old, new, 1))

          def sub_once(path, pattern, replacement, flags=re.S):
              text = read(path)
              new, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f'{path}: expected one regex match, got {count}: {pattern[:100]!r}')
              write(path, new)

          # Public storage: text fonts, imports and reports only.
          replace_once('common/util_functions.sh', 'USER_EMOJI_DIR="$LUOSHU_PUBLIC_DIR/emoji"\n', '')
          replace_once('common/util_functions.sh', 'mkdir -p "$USER_FONTS_DIR" "$USER_EMOJI_DIR" "$USER_REPORT_DIR" "$USER_IMPORT_DIR" 2>/dev/null || true', 'mkdir -p "$USER_FONTS_DIR" "$USER_REPORT_DIR" "$USER_IMPORT_DIR" 2>/dev/null || true')
          replace_once('common/util_functions.sh', 'chmod 0775 "$LUOSHU_PUBLIC_DIR" "$USER_FONTS_DIR" "$USER_EMOJI_DIR" "$USER_REPORT_DIR" "$USER_IMPORT_DIR" 2>/dev/null || true', 'chmod 0775 "$LUOSHU_PUBLIC_DIR" "$USER_FONTS_DIR" "$USER_REPORT_DIR" "$USER_IMPORT_DIR" 2>/dev/null || true')

          # ZIP import: colored/icon/symbol fonts are ignored, never imported or mounted.
          replace_once('common/font_import.sh', 'import_is_emoji_name() {', 'import_is_color_font_name() {')
          replace_once('common/font_import.sh', 'mkdir -p "$_tmp" "$USER_FONTS_DIR" "$USER_EMOJI_DIR" 2>/dev/null ||', 'mkdir -p "$_tmp" "$USER_FONTS_DIR" 2>/dev/null ||')
          sub_once('common/font_import.sh', r'''        if import_is_icon_name "\$_base"; then _ignored=\$\(\(_ignored \+ 1\)\); continue; fi\n        if ! font_validate "\$_f" text 2>/dev/null; then _invalid=\$\(\(_invalid \+ 1\)\); continue; fi\n        _valid=\$\(\(_valid \+ 1\)\)\n        _family=\$\(import_detect_family "\$_base"\)\n        _variable="\$FONT_CHECK_VARIABLE"; _kind=text\n        if import_is_emoji_name "\$_base" \|\| \[ "\$FONT_CHECK_COLOR" = true \]; then _kind=emoji; fi\n        _size=.*?        printf '%s\|%s\|%s\|%s\|%s\|%s\|%s\|%s\\n' "\$_family" "\$_variable" "\$_kind" "\$_size" "\$_base" "\$_f" "\$_class" "\$_role" >> "\$_manifest"\n''', '''        if import_is_icon_name "$_base"; then _ignored=$((_ignored + 1)); continue; fi
        if ! font_validate "$_f" text 2>/dev/null; then _invalid=$((_invalid + 1)); continue; fi
        if import_is_color_font_name "$_base" || [ "$FONT_CHECK_COLOR" = true ]; then _ignored=$((_ignored + 1)); continue; fi
        _valid=$((_valid + 1))
        _family=$(import_detect_family "$_base")
        _variable="$FONT_CHECK_VARIABLE"
        _size=$(wc -c < "$_f" 2>/dev/null | tr -d '[:space:]'); case "$_size" in ''|*[!0-9]*) _size=0 ;; esac
        _class=$(import_name_class "$_base"); _role=$(import_weight_role "$_base")
        printf '%s|%s|text|%s|%s|%s|%s|%s\n' "$_family" "$_variable" "$_size" "$_base" "$_f" "$_class" "$_role" >> "$_manifest"
''')
          replace_once('common/font_import.sh', '字体包中只有 Emoji 或图标字体，没有可用文字字体', '字体包中没有可用文字字体；彩色、图标和符号字体已忽略')
          replace_once('common/font_import.sh', '_imported_text=0; _imported_emoji=0; _mode=single; _target_name=""', '_imported_text=0; _mode=single; _target_name=""')
          sub_once('common/font_import.sh', r'''\n    _emoji_best=""; _emoji_size=0; _emoji_name=""\n.*?\n    if \[ "\$_imported_text" -gt 0 \]; then''', '\n    if [ "$_imported_text" -gt 0 ]; then')
          replace_once('common/font_import.sh', '"importedText":%d,"importedEmoji":%d,"valid":%d', '"importedText":%d,"valid":%d')
          replace_once('common/font_import.sh', '"$_family_count" "$_imported_text" "$_imported_emoji" "$_valid"', '"$_family_count" "$_imported_text" "$_valid"')

          # Backend: remove every Emoji state, action, task and preview path.
          for old in [
              'USER_EMOJI_DIR="$LUOSHU_PUBLIC_DIR/emoji"\n',
              'ACTIVE_EMOJI_CONF="$CONFIG_DIR/active_emoji.conf"\n',
              'EMOJI_REBOOT_REQUIRED="$CONFIG_DIR/emoji_reboot_required.conf"\n',
              'EMOJI_TASK_FILE="$CONFIG_DIR/emoji_task.conf"\n',
          ]:
              replace_once('common/font_manager.sh', old, '')
          replace_once('common/font_manager.sh', '# ---------- 安全覆盖范围 / 重启保护 / Emoji ----------', '# ---------- 安全覆盖范围 / 重启保护 ----------')
          sub_once('common/font_manager.sh', r'''\nget_current_emoji_id\(\) \{.*?\n\}\n\nfind_text_font_file\(\)''', '\nfind_text_font_file()')
          replace_once('common/font_manager.sh', '# 只删除洛书管理的文字目标，Emoji、符号与 ROM fallback 永远保留。', '# 只删除洛书管理的文字目标，ROM fallback、彩色字体与符号字体永远保留。')
          replace_once('common/font_manager.sh', 'echo "  [洛书] 已恢复 ROM 原始文字字体（Emoji 保持独立设置）"', 'echo "  [洛书] 已恢复 ROM 原始文字字体"')
          sub_once('common/font_manager.sh', r'''\nsync_emoji_preview_fonts\(\) \{.*?\n\}\n\nwrite_emoji_task\(\) \{.*?\n\}\n\n# ---------- 异步切换任务状态 ----------''', '\n# ---------- 异步切换任务状态 ----------')
          replace_once('common/font_manager.sh', '    sync_emoji_preview_fonts 2>/dev/null || true\n', '')
          sub_once('common/font_manager.sh', r'''        reboot_required\)\n.*?\n            ;;\n        reboot_device\)''', '''        reboot_required)
            _text=false
            [ -f "$TEXT_REBOOT_REQUIRED" ] && _text=true
            rm -f "$FONT_WEIGHT_REBOOT_REQUIRED" 2>/dev/null || true
            printf '{"status":"ok","data":{"required":%s,"text":%s,"weight":false}}\n' "$_text" "$_text"
            ;;
        reboot_device)''')
          sub_once('common/font_manager.sh', r'''        emoji_list\)\n.*?\n        delete\)''', '        delete)')
          replace_once('common/font_manager.sh', '# 洛书 v13.4 Beta2 Hotfix6 - 字体管理核心（静态多字重调节 + 即时字重刷新）', '# 洛书 v14.1.1 RC3 - 字体管理核心')

          # WebUI markup: delete hidden Emoji UI instead of hiding it.
          sub_once('webroot/index.html', r'''\n    <section class="emoji-section" id="emojiSection".*?</section>\n''', '\n')
          sub_once('webroot/index.html', r'''\n                    <button class="setting-row" id="moreOpenEmojiFolderBtn".*?</button>''', '')
          replace_once('webroot/index.html', '自动识别可变字体、常规字重与 Emoji', '自动识别可变字体与常规字重，忽略彩色、图标和符号字体')
          replace_once('webroot/index.html', '文字和 Emoji 可分别选择', '中文、英文和数字可分别选择')

          # WebUI logic: keep only text/composite state.
          app = read('webroot/app.js')
          for line in [
              '    emojis: [],\n', '    currentEmoji: \'default\',\n', '    emojiRebootRequired: false,\n',
              '    pendingEmoji: null,\n', '    isEmojiSwitching: false,\n'
          ]:
              if app.count(line) != 1: raise SystemExit(f'app.js property mismatch: {line!r}')
              app = app.replace(line, '', 1)
          app = app.replace('        await Promise.all([this.loadEmojis(), this.loadRebootStatus()]);', '        await this.loadRebootStatus();', 1)
          app = app.replace('                this.emojiRebootRequired = Boolean(res.data?.emoji);\n', '', 1)
          app = app.replace('        const pending = this.textRebootRequired || this.emojiRebootRequired || this.weightRebootRequired;', '        const pending = this.textRebootRequired || this.weightRebootRequired;', 1)
          app = app.replace("            if (this.emojiRebootRequired) pendingItems.push('Emoji');\n", '', 1)
          app, n = re.subn(r'''\n    async loadEmojis\(\) \{.*?\n    async requestFontSwitch''', '\n    async requestFontSwitch', app, count=1, flags=re.S)
          if n != 1: raise SystemExit(f'app.js Emoji method block mismatch: {n}')
          app = app.replace("${Number(data.importedEmoji) ? ` · Emoji ${Number(data.importedEmoji)} 个` : ''}", '', 1)
          app = app.replace('            await Promise.all([this.loadData({ background: true, force: true }), this.loadEmojis()]);', '            await this.loadData({ background: true, force: true });', 1)
          app = app.replace("        document.getElementById('openEmojiFolderBtn')?.addEventListener('click', () => this.openPublicFolder('emoji'));\n", '', 1)
          app = app.replace("        document.getElementById('moreOpenEmojiFolderBtn')?.addEventListener('click', () => this.openPublicFolder('emoji'));\n", '', 1)
          old = "        document.getElementById('confirmRiskBtn')?.addEventListener('click', () => { const id = this.pendingRiskFont; const emoji = this.pendingEmoji; this.pendingRiskFont = null; this.pendingEmoji = null; modalClose('riskModal'); if (id) this.switchFont(id); else if (emoji) this.switchEmoji(emoji, true); });"
          new = "        document.getElementById('confirmRiskBtn')?.addEventListener('click', () => { const id = this.pendingRiskFont; this.pendingRiskFont = null; modalClose('riskModal'); if (id) this.switchFont(id); });"
          if app.count(old) != 1: raise SystemExit('app.js risk confirm mismatch')
          app = app.replace(old, new, 1)
          app = app.replace("        document.getElementById('cancelRiskBtn')?.addEventListener('click', () => { this.pendingRiskFont = null; this.pendingEmoji = null; modalClose('riskModal'); });", "        document.getElementById('cancelRiskBtn')?.addEventListener('click', () => { this.pendingRiskFont = null; modalClose('riskModal'); });", 1)
          write('webroot/app.js', app)

          # v14 layer no longer needs compatibility shims for deleted UI.
          v14 = read('webroot/v14.js')
          v14 = v14.replace("    document.querySelectorAll('#stabilityRescueButton,#stabilityModal,#openStabilityBtn').forEach(node => node.remove());\n", '', 1)
          block = "    // v14 不再提供 Emoji 前端入口，启动时也不扫描 Emoji 目录。\n    app.loadEmojis = async function() { this.currentEmoji = 'default'; this.emojis = []; };\n    app.renderEmojis = function() {};\n\n"
          if v14.count(block) != 1: raise SystemExit('v14.js Emoji shim mismatch')
          v14 = v14.replace(block, '', 1)
          v14, n = re.subn(r'''\nfunction removeLateStabilityUi\(\) \{.*?\n\}\n''', '\n', v14, count=1, flags=re.S)
          if n != 1: raise SystemExit(f'v14.js stability observer mismatch: {n}')
          v14 = v14.replace('\nremoveLateStabilityUi();\n', '\n', 1)
          write('webroot/v14.js', v14)

          # Remove the old CSS-only hiding shim; physical nodes are gone.
          css = read('webroot/v14.css')
          css, n = re.subn(r'^#emojiSection,#openEmojiFolderBtn,#moreOpenEmojiFolderBtn,#stabilityRescueButton,#stabilityModal,#openStabilityBtn\{display:none!important\}\n?', '', css, count=1, flags=re.M)
          if n != 1: raise SystemExit(f'v14.css legacy shim mismatch: {n}')
          write('webroot/v14.css', css)

          # Deleted JS is no longer part of syntax checks.
          replace_once('scripts/check.sh', 'for file in app.js font_analyzer.js kernelsu.js stability.js environment.js v14.js; do', 'for file in app.js font_analyzer.js kernelsu.js environment.js v14.js; do')
          PY
      - name: Verify deterministic cleanup
        shell: bash
        run: |
          sh -n common/util_functions.sh
          sh -n common/font_import.sh
          sh -n common/font_manager.sh
          cp webroot/app.js /tmp/app.mjs
          cp webroot/v14.js /tmp/v14.mjs
          node --check /tmp/app.mjs
          node --check /tmp/v14.mjs
          git diff --check
      - name: Commit and push RC3 cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add common/util_functions.sh common/font_import.sh common/font_manager.sh webroot/index.html webroot/app.js webroot/v14.js webroot/v14.css scripts/check.sh
          git diff --cached --quiet && exit 0
          git commit -m 'cleanup: remove legacy Emoji execution and WebUI paths'
          git push origin HEAD:hotfix/v14.1.1-rc3-clean-baseline
