name: v14.3.2 Release Diagnose

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/v1432-release-diagnose.yml
      - android-app/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Run release tasks separately
        working-directory: android-app
        shell: bash
        run: |
          result="$RUNNER_TEMP/release-diagnostic.txt"
          : > "$result"
          set +e
          gradle --no-daemon --stacktrace :app:lintRelease > "$RUNNER_TEMP/lint.log" 2>&1
          lint_rc=$?
          gradle --no-daemon --stacktrace :app:testDebugUnitTest > "$RUNNER_TEMP/test.log" 2>&1
          test_rc=$?
          gradle --no-daemon --stacktrace :app:assembleRelease > "$RUNNER_TEMP/assemble.log" 2>&1
          assemble_rc=$?
          set -e

          echo "lint=$lint_rc" >> "$result"
          echo "test=$test_rc" >> "$result"
          echo "assemble=$assemble_rc" >> "$result"

          python3 - "$result" <<'PY'
          from pathlib import Path
          import sys
          import xml.etree.ElementTree as ET
          result = Path(sys.argv[1])
          report = Path('app/build/reports/lint-results-release.xml')
          lines = []
          if report.is_file():
              root = ET.parse(report).getroot()
              blocking = [i for i in root.findall('issue') if i.get('severity') in {'Error', 'Fatal'}]
              lines.append(f'blocking_lint={len(blocking)}')
              for issue in blocking:
                  loc = issue.find('location')
                  file = (loc.get('file') if loc is not None else '') or ''
                  line = (loc.get('line') if loc is not None else '') or ''
                  lines.append(f"lint|{issue.get('id','Lint')}|{file}|{line}|{issue.get('message','')}")
          else:
              lines.append('blocking_lint=report-missing')
          result.write_text(result.read_text() + '\n'.join(lines) + '\n', encoding='utf-8')
          PY

          for pair in "lint:$RUNNER_TEMP/lint.log" "test:$RUNNER_TEMP/test.log" "assemble:$RUNNER_TEMP/assemble.log"; do
            name="${pair%%:*}"
            file="${pair#*:}"
            echo "--- $name summary ---" >> "$result"
            grep -E '(^|> )Task .* FAILED|FAILURE:|Execution failed for task|Lint found|error:|w: ' "$file" | tail -n 160 >> "$result" || true
            echo "--- $name tail ---" >> "$result"
            tail -n 220 "$file" >> "$result" || true
          done
          cat "$result"
      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1432-release-diagnostic
          path: ${{ runner.temp }}/release-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
