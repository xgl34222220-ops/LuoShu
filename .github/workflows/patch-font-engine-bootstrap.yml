name: Patch font engine bootstrap
on:
  push:
    branches:
      - refactor/v14.5-no-hook-font-engine
    paths:
      - .github/workflows/patch-font-engine-bootstrap.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/v14.5-no-hook-font-engine
          fetch-depth: 0
      - name: Connect all payload entry points
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          mix = Path('common/font_mix.sh')
          text = mix.read_text(encoding='utf-8')
          anchor = '[ -f "$MODDIR/common/mount_compat.sh" ] && . "$MODDIR/common/mount_compat.sh"\n'
          addition = (
              anchor
              + '[ -f "$MODDIR/common/hyperos_global.sh" ] && . "$MODDIR/common/hyperos_global.sh"\n'
              + '[ -f "$MODDIR/common/font_config_runtime.sh" ] && . "$MODDIR/common/font_config_runtime.sh"\n'
              + '[ -f "$MODDIR/common/font_config_weights.sh" ] && . "$MODDIR/common/font_config_weights.sh"\n'
          )
          if 'common/font_config_weights.sh' not in text:
              if anchor not in text:
                  raise SystemExit('font_mix bootstrap anchor missing')
              text = text.replace(anchor, addition, 1)
          mix.write_text(text, encoding='utf-8')

          manager = Path('common/font_manager.sh')
          text = manager.read_text(encoding='utf-8')
          anchor = '''        if [ "${IS_COLOROS:-false}" = true ]; then
            mkdir -p "$MODULE_DIR/system_ext/fonts" "$MODULE_DIR/product/fonts" 2>/dev/null || true
            for _name in $(get_all_coloros_names); do
                _mapped="$SYSTEM_FONTS_DIR/${_name}.ttf"
                [ -f "$_mapped" ] || continue
                [ -e "/system_ext/fonts/${_name}.ttf" ] && link_or_copy_font "$_mapped" "$MODULE_DIR/system_ext/fonts/${_name}.ttf" 2>/dev/null || true
                [ -e "/product/fonts/${_name}.ttf" ] && link_or_copy_font "$_mapped" "$MODULE_DIR/product/fonts/${_name}.ttf" 2>/dev/null || true
            done
        fi
'''
          addition = anchor + '''        if [ "${IS_HYPEROS:-false}" != true ] && type font_config_enable_for_payload >/dev/null 2>&1; then
            if ! font_config_enable_for_payload "$_font_id"; then
                echo '警告：无 Hook XML 未安全启用，已保留 ROM 文件槽映射' >&2
            fi
        fi
'''
          if 'font_config_enable_for_payload "$_font_id"' not in text:
              if anchor not in text:
                  raise SystemExit('font_manager payload anchor missing')
              text = text.replace(anchor, addition, 1)
          manager.write_text(text, encoding='utf-8')
          PY
          sh -n common/font_mix.sh
          sh -n common/font_manager.sh
          python3 scripts/font_config_overlay_test.py
          sh scripts/font_config_runtime_test.sh
      - name: Commit verified bootstrap
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add common/font_mix.sh common/font_manager.sh
          git commit -m 'fix(font): activate no-Hook XML from every payload path'
          git push origin HEAD:refactor/v14.5-no-hook-font-engine
