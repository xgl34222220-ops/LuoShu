name: Alpha1.5 one-line import fix
on:
  push:
    branches:
      - feature/v14.3-alpha1-native-import
    paths:
      - .github/workflows/alpha15-import-fix.yml
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-alpha1-native-import
      - name: Remove invalid explicit Compose weight import
        shell: bash
        run: |
          set -euo pipefail
          target='android-app/app/src/main/java/io/github/xgl34222220/luoshu/Alpha15App.kt'
          grep -qx 'import androidx.compose.foundation.layout.weight' "$target"
          sed -i '/^import androidx\.compose\.foundation\.layout\.weight$/d' "$target"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$target"
          git commit -m 'fix(alpha1.5): remove invalid Compose weight import'
          git push origin HEAD:feature/v14.3-alpha1-native-import
