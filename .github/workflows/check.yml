name: Validate source
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - module.prop
      - common/**
      - config/**
      - fonts/**
      - system/**
      - webroot/**
      - scripts/**
      - licenses/**
      - customize.sh
      - post-fs-data.sh
      - service.sh
      - uninstall.sh
      - magic
      - 兼容与目录说明.txt
      - README.md
      - CHANGELOG.md
      - RELEASE_NOTES_v14.1.md
      - .github/workflows/check.yml
      - .github/workflows/release.yml
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null
      - name: Prepare ARM64 composite runtime
        run: sh ./scripts/prepare_composite_runtime.sh
      - name: Run source checks
        run: sh ./scripts/check.sh
      - name: Build test package
        run: sh ./scripts/build.sh
      - name: Inspect package
        shell: bash
        run: |
          asset="$(find dist -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -s "$asset"
          unzip -t "$asset" >/dev/null
          test "$(unzip -p "$asset" module.prop | sed -n 's/^version=//p')" = 'v14.1'
          test "$(unzip -p "$asset" module.prop | sed -n 's/^versionCode=//p')" = '14120'
          unzip -l "$asset" | grep -q 'common/composite_font.py'
          unzip -l "$asset" | grep -q 'common/luoshu_composite.sh'
          unzip -l "$asset" | grep -q 'common/python/bin/luoshu-python'
          unzip -l "$asset" | grep -q 'licenses/CPython-LICENSE.txt'
          unzip -l "$asset" | grep -q 'licenses/FontTools-LICENSE.txt'
          unzip -p "$asset" webroot/index.html | grep -q 'v14.js?v=14120'
          unzip -p "$asset" common/font_mix.sh | grep -q 'full-composite-v5'
          unzip -p "$asset" post-fs-data.sh | grep -q 'font_mix.sh.*recover'
          ! unzip -p "$asset" service.sh | grep -q 'cmd font system --update'
          ! unzip -p "$asset" service.sh | grep -q 'oplus-font refresh'
          ! unzip -l "$asset" | grep -qE 'system/etc/(fonts.xml|font_fallback.xml)'
          ! unzip -l "$asset" | grep -qE '(^|/)skip_mount(ify)?$'
      - uses: actions/upload-artifact@v4
        with:
          name: LuoShu-v14.1-validation
          path: dist/*.zip*
          if-no-files-found: error
