name: Validate source
on:
  workflow_dispatch:
  push:
    branches:
      - fix/v14.2-rc2-stabilization
  pull_request:
    branches:
      - main
      - baseline/v14.2-rc1-rebuild
    paths:
      - module.prop
      - common/**
      - config/**
      - fonts/**
      - system/**
      - webroot/**
      - scripts/**
      - licenses/**
      - docs/**
      - customize.sh
      - post-fs-data.sh
      - service.sh
      - uninstall.sh
      - action.sh
      - android-app/**
      - magic
      - 兼容与目录说明.txt
      - README.md
      - README.txt
      - LICENSE
      - NOTICE.md
      - THIRD_PARTY_NOTICES.md
      - CONTRIBUTING.md
      - CHANGELOG.md
      - RELEASE_NOTES_*.md
      - .github/workflows/check.yml
      - .github/workflows/release.yml
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Collect legacy inventory
        shell: bash
        run: |
          set +e
          sh ./scripts/rc3_audit.sh > legacy-inventory.txt 2>&1
          echo $? > legacy-inventory.exit
          cat legacy-inventory.txt
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: LuoShu-legacy-inventory
          path: |
            legacy-inventory.txt
            legacy-inventory.exit
          if-no-files-found: error

      - name: Enforce legacy inventory
        run: test "$(cat legacy-inventory.exit)" = 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null

      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}

      - name: Prepare ARM64 composite runtime
        run: |
          if [ ! -x common/python/bin/luoshu-python ]; then
            sh ./scripts/prepare_composite_runtime.sh
          fi

      - name: Run source checks
        run: sh ./scripts/check.sh

      - name: Compile and test native App
        working-directory: android-app
        run: gradle --no-daemon --stacktrace :app:compileDebugKotlin :app:testDebugUnitTest

      - name: Build test package
        run: LUOSHU_VARIANT=lite sh ./scripts/build.sh

      - name: Inspect package
        shell: bash
        run: |
          set -euo pipefail
          . ./scripts/version.sh
          asset="$(find dist -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -s "$asset"
          unzip -t "$asset" >/dev/null
          unzip -Z1 "$asset" > /tmp/luoshu-package-list.txt
          test "$(unzip -p "$asset" module.prop | sed -n 's/^version=//p')" = "$LUOSHU_VERSION"
          test "$(unzip -p "$asset" module.prop | sed -n 's/^versionCode=//p')" = "$LUOSHU_VERSION_CODE"
          grep -qx 'action.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/composite_font.py' /tmp/luoshu-package-list.txt
          grep -qx 'common/font_instance.py' /tmp/luoshu-package-list.txt
          grep -qx 'common/font_coverage.py' /tmp/luoshu-package-list.txt
          grep -qx 'common/v142_weighted_mix.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/luoshu_composite.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/python/bin/luoshu-python' /tmp/luoshu-package-list.txt
          grep -qx 'webroot/workbench.js' /tmp/luoshu-package-list.txt
          grep -qx 'webroot/mix_state_guard.js' /tmp/luoshu-package-list.txt
          grep -qx 'webroot/workbench_bridge.js' /tmp/luoshu-package-list.txt
          grep -qx 'webroot/workbench.css' /tmp/luoshu-package-list.txt
          grep -qx 'webroot/workbench_weight_extension.js' /tmp/luoshu-package-list.txt
          grep -qx 'webroot/workbench_weight_extension.css' /tmp/luoshu-package-list.txt
          grep -qx 'licenses/CPython-LICENSE.txt' /tmp/luoshu-package-list.txt
          grep -qx 'licenses/FontTools-LICENSE.txt' /tmp/luoshu-package-list.txt
          grep -qx 'licenses/LuoShu-MIT-HISTORICAL.txt' /tmp/luoshu-package-list.txt
          grep -qx 'LICENSE' /tmp/luoshu-package-list.txt
          grep -qx 'NOTICE.md' /tmp/luoshu-package-list.txt
          grep -qx 'THIRD_PARTY_NOTICES.md' /tmp/luoshu-package-list.txt
          grep -qx 'README.txt' /tmp/luoshu-package-list.txt
          unzip -p "$asset" LICENSE | grep -q 'GNU GENERAL PUBLIC LICENSE'
          unzip -p "$asset" LICENSE | grep -q 'Version 3, 29 June 2007'
          unzip -p "$asset" NOTICE.md | grep -q 'GPL-3.0-only'
          unzip -p "$asset" webroot/index.html | grep -q "v14.js?v=$LUOSHU_VERSION_CODE"
          unzip -p "$asset" webroot/environment.js | grep -q "UI_VERSION = '$LUOSHU_VERSION_CODE'"
          unzip -p "$asset" common/font_mix.sh | grep -q 'full-composite-v5'
          unzip -p "$asset" common/v14_mix.sh | grep -q 'v142_weighted_mix.sh'
          unzip -p "$asset" common/font_instance.py | grep -q 'instantiateVariableFont'
          unzip -p "$asset" common/font_instance.py | grep -q -- '--axes'
          unzip -p "$asset" common/v142_weighted_mix.sh | grep -q 'axes_task.conf'
          unzip -p "$asset" common/app_bridge.sh | grep -q 'rebootRequired'
          unzip -p "$asset" post-fs-data.sh | grep -q 'v14_mix.sh.*recover'
          ! unzip -p "$asset" common/v142_weighted_mix.sh | grep -q 'v143_axes'
          ! unzip -p "$asset" common/app_bridge.sh | grep -q 'v143_axes'
          ! unzip -p "$asset" service.sh | grep -q 'cmd font system --update'
          ! unzip -p "$asset" service.sh | grep -q 'oplus-font refresh'
          ! grep -qE '^system/etc/(fonts.xml|font_fallback.xml)$' /tmp/luoshu-package-list.txt
          ! grep -qE '(^|/)skip_mount(ify)?$' /tmp/luoshu-package-list.txt
          ! grep -qEi '(^|/)(emoji|__pycache__)(/|$)|\.pyc$|NotoColorEmoji|active_emoji|emoji_task|stability\.(js|css)|common/stability\.sh|fonts_xml_template|play_font_bridge\.sh|wechat_xweb_bridge\.sh' /tmp/luoshu-package-list.txt

      - uses: actions/upload-artifact@v4
        with:
          name: LuoShu-RC2-Lite-validation
          path: dist/*.zip*
          if-no-files-found: error
