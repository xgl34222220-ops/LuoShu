name: Validate App-only source
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - module.prop
      - common/**
      - config/**
      - fonts/**
      - system/**
      - scripts/**
      - licenses/**
      - docs/**
      - customize.sh
      - post-fs-data.sh
      - service.sh
      - uninstall.sh
      - action.sh
      - android-app/**
      - magic
      - 兼容与目录说明.txt
      - README.md
      - README.txt
      - LICENSE
      - NOTICE.md
      - THIRD_PARTY_NOTICES.md
      - CONTRIBUTING.md
      - CHANGELOG.md
      - RELEASE_NOTES_*.md
      - .github/workflows/check.yml
      - .github/workflows/build.yml
      - .github/workflows/release.yml
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v4

      - name: Enforce App-only inventory
        run: sh ./scripts/v2_source_audit.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null

      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}

      - name: Prepare ARM64 composite runtime
        run: |
          if [ ! -x common/python/bin/luoshu-python ]; then
            sh ./scripts/prepare_composite_runtime.sh
          fi

      - name: Run source checks
        run: sh ./scripts/check.sh

      - name: Check composite role coverage
        shell: bash
        run: |
          set -euo pipefail
          CJK="$(find /usr/share/fonts -type f \( -iname 'NotoSansCJK-Regular.ttc' -o -iname 'NotoSansCJK-Regular.otf' \) -print -quit)"
          LATIN="$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit)"
          test -s "$CJK"
          test -s "$LATIN"
          export PYTHONPATH="$PWD/common/python/lib/python3.14/site-packages"
          python3 common/font_role_check.py "$CJK" cjk
          python3 common/font_role_check.py "$LATIN" latin
          python3 common/font_role_check.py "$LATIN" digit
          if python3 common/font_role_check.py "$LATIN" cjk; then
            echo 'Latin-only font unexpectedly passed the CJK role gate' >&2
            exit 1
          fi
          python3 - <<'PY'
          import sys
          sys.path.insert(0, 'common')
          import font_role_check as gate

          optional_punctuation = set(map(ord, ' .,!?;:()[]+-/%'))
          for role in ('cjk', 'latin', 'digit'):
              assert not (optional_punctuation & set(gate.required(role))), role
          assert set(gate.LATIN) <= set(gate.required('cjk'))
          assert set(gate.DIGITS) <= set(gate.required('cjk'))
          PY

      - name: Lint, test and build native App
        working-directory: android-app
        run: gradle --no-daemon --stacktrace :app:lintDebug :app:testDebugUnitTest :app:assembleDebug

      - name: Build App and single module candidate
        shell: bash
        run: |
          set -euo pipefail
          . ./scripts/version.sh
          apk='android-app/app/build/outputs/apk/debug/app-debug.apk'
          test -s "$apk"
          rm -rf dist
          mkdir -p dist
          app="dist/LuoShu-App-${LUOSHU_ARTIFACT_VERSION}-Debug.apk"
          cp -f "$apk" "$app"
          (cd dist && sha256sum "$(basename "$app")" > "$(basename "$app").sha256")
          LUOSHU_APP_APK="$apk" LUOSHU_ALLOW_DEBUG_APP=1 sh ./scripts/build.sh

      - name: Inspect candidate artifacts
        shell: bash
        run: |
          set -euo pipefail
          . ./scripts/version.sh
          module="dist/LuoShu-${LUOSHU_ARTIFACT_VERSION}.zip"
          app="dist/LuoShu-App-${LUOSHU_ARTIFACT_VERSION}-Debug.apk"
          test -s "$module"; test -s "$app"
          unzip -t "$module" >/dev/null
          unzip -Z1 "$module" > /tmp/luoshu-package-list.txt
          grep -qx 'bundled/LuoShu-App.apk' /tmp/luoshu-package-list.txt
          ! grep -qE '(^|/)webroot(/|$)' /tmp/luoshu-package-list.txt
          ! unzip -p "$module" module.prop | grep -q '^webroot='
          unzip -p "$module" bundled/LuoShu-App.apk > "$RUNNER_TEMP/embedded.apk"
          cmp -s "$app" "$RUNNER_TEMP/embedded.apk"
          (cd dist && sha256sum -c "$(basename "$module").sha256")
          (cd dist && sha256sum -c "$(basename "$app").sha256")

          test "$(unzip -p "$module" module.prop | sed -n 's/^version=//p')" = "$LUOSHU_VERSION"
          test "$(unzip -p "$module" module.prop | sed -n 's/^versionCode=//p')" = "$LUOSHU_VERSION_CODE"
          test "$(unzip -p "$module" bundled/app.prop | sed -n 's/^package=//p')" = 'io.github.xgl34222220.luoshu.debug'
          test "$(unzip -p "$module" bundled/app.prop | sed -n 's/^versionCode=//p')" = "$((LUOSHU_VERSION_CODE * 100 + 1))"
          grep -qx 'action.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/composite_font.py' /tmp/luoshu-package-list.txt
          grep -qx 'common/font_instance.py' /tmp/luoshu-package-list.txt
          grep -qx 'common/font_metrics_normalize.py' /tmp/luoshu-package-list.txt
          grep -qx 'common/font_coverage.py' /tmp/luoshu-package-list.txt
          grep -qx 'common/font_role_check.py' /tmp/luoshu-package-list.txt
          grep -qx 'common/font_role_check.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/native_import.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/luoshu_cli.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/weighted_mix_task.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/luoshu_composite.sh' /tmp/luoshu-package-list.txt
          grep -qx 'common/python/bin/luoshu-python' /tmp/luoshu-package-list.txt
          grep -qx 'licenses/CPython-LICENSE.txt' /tmp/luoshu-package-list.txt
          grep -qx 'licenses/FontTools-LICENSE.txt' /tmp/luoshu-package-list.txt
          grep -qx 'licenses/LuoShu-MIT-HISTORICAL.txt' /tmp/luoshu-package-list.txt
          grep -qx 'LICENSE' /tmp/luoshu-package-list.txt
          grep -qx 'NOTICE.md' /tmp/luoshu-package-list.txt
          grep -qx 'THIRD_PARTY_NOTICES.md' /tmp/luoshu-package-list.txt
          grep -qx 'README.txt' /tmp/luoshu-package-list.txt
          unzip -p "$module" LICENSE | grep -q 'GNU GENERAL PUBLIC LICENSE'
          unzip -p "$module" LICENSE | grep -q 'Version 3, 29 June 2007'
          unzip -p "$module" NOTICE.md | grep -q 'GPL-3.0-only'
          unzip -p "$module" common/font_mix.sh | grep -q 'full-composite-v6'
          unzip -p "$module" common/font_mix_controller.sh | grep -q 'font_role_check.sh'
          unzip -p "$module" common/app_bridge.sh | grep -q 'common/font_mix_controller.sh'
          unzip -p "$module" common/app_bridge.sh | grep -q 'native_import.sh'
          unzip -p "$module" common/native_import.sh | grep -q 'trusted_source'
          unzip -p "$module" common/font_instance.py | grep -q 'instantiateVariableFont'
          unzip -p "$module" common/font_instance.py | grep -q -- '--axes'
          unzip -p "$module" common/font_instance.py | grep -q 'normalize_font_metrics'
          unzip -p "$module" common/font_config_overlay.py | grep -q 'LuoShuMono'
          unzip -p "$module" common/weighted_mix_task.sh | grep -q 'axes_task.conf'
          unzip -p "$module" common/app_bridge.sh | grep -q 'rebootRequired'
          unzip -p "$module" customize.sh | grep -q 'luoshu_cli.sh.*system/bin/洛书'
          unzip -p "$module" post-fs-data.sh | grep -q 'font_mix_controller.sh.*recover'
          ! unzip -p "$module" common/weighted_mix_task.sh | grep -q 'v143_axes'
          ! unzip -p "$module" common/app_bridge.sh | grep -q 'v143_axes'
          ! unzip -p "$module" customize.sh | grep -q 'pm install'
          ! unzip -p "$module" common/luoshu_cli.sh | grep -qE '回滚|重启界面|刷新字体缓存'
          ! unzip -p "$module" common/font_manager.sh | grep -qE 'webroot|restart_ui|previous_font|action refresh'
          ! unzip -p "$module" service.sh | grep -q 'cmd font system --update'
          ! unzip -p "$module" service.sh | grep -q 'oplus-font refresh'
          ! grep -qE '^system/etc/(fonts.xml|font_fallback.xml)$' /tmp/luoshu-package-list.txt
          ! grep -qE '(^|/)skip_mount(ify)?$' /tmp/luoshu-package-list.txt
          ! grep -qEi '(^|/)(emoji|__pycache__)(/|$)|\.pyc$|NotoColorEmoji|active_emoji|emoji_task|stability\.(js|css)|common/stability\.sh|fonts_xml_template|play_font_bridge|wechat_xweb_bridge|legacy_data_fonts_cleanup|volume_key\.sh' /tmp/luoshu-package-list.txt

      - uses: actions/upload-artifact@v4
        with:
          name: EXTRACT-FIRST-LuoShu-App-Only-Debug
          path: dist/*
          if-no-files-found: error
          retention-days: 14
