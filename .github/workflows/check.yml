name: Validate source

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - module.prop
      - update.json
      - common/**
      - config/**
      - fonts/**
      - system/**
      - webroot/**
      - scripts/**
      - customize.sh
      - post-fs-data.sh
      - post-mount.sh
      - service.sh
      - uninstall.sh
      - README.md
      - CHANGELOG.md
      - .github/workflows/check.yml
      - .github/workflows/build.yml

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run source and behavior checks
        shell: bash
        run: |
          if ! sh -x ./scripts/check.sh > /tmp/luoshu-check.log 2>&1; then
            tail -n 120 /tmp/luoshu-check.log
            exit 1
          fi
      - name: Build Test3 package
        run: sh ./scripts/build.sh
      - name: Inspect Test3 package
        shell: bash
        run: |
          asset="$(find dist -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -n "$asset"
          unzip -t "$asset"
          test "$(unzip -p "$asset" module.prop | sed -n 's/^version=//p')" = "v14.1 Test3"
          test "$(unzip -p "$asset" module.prop | sed -n 's/^versionCode=//p')" = "14103"
          test "$(unzip -p "$asset" module.prop | sed -n 's/^webroot=//p')" = "webroot_v14103"
          unzip -l "$asset" | grep -q 'common/preview_cache.sh'
          unzip -p "$asset" common/font_mix.sh | grep -q 'resolve_slot_file'
          unzip -p "$asset" common/font_mix.sh | grep -q 'cjk_sha256'
          unzip -p "$asset" common/font_manager.sh | grep -q 'preview_prepare'
          unzip -p "$asset" webroot_v14103/index.html | grep -q 'app.js?v=14103'
          unzip -p "$asset" webroot_v14103/index.html | grep -q 'v14.js?v=14103'
          unzip -p "$asset" webroot_v14103/v14.js | grep -q '模块实际占用'
          unzip -p "$asset" webroot_v14103/v14.js | grep -q '字体角色检测'
          ! unzip -l "$asset" | grep -qE '(^|/)webroot/'
          ! unzip -l "$asset" | grep -qE '(^|/)webroot_v141/'
          ! unzip -l "$asset" | grep -qE '(^|/)webroot_v14103/emoji/'
          ! unzip -l "$asset" | grep -qE '(^|/)(magic|remove|disable|skip_mount|skip_mountify)$'
          ! unzip -p "$asset" customize.sh | grep -q '^exit 0$'
      - uses: actions/upload-artifact@v4
        with:
          name: LuoShu-v14.1-test3
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
