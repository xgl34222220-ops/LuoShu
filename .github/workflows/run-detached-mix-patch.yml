name: Run detached mix patch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/background-mix-worker'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/background-mix-worker
          fetch-depth: 0
      - name: Extract branch patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-detached-mix-worker.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/apply_detached_mix_patch.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/apply_detached_mix_patch.py
      - name: Validate patch
        shell: bash
        run: |
          chmod 0755 common/background_task.sh scripts/background_mix_worker_test.sh
          sh -n common/background_task.sh
          sh -n common/v142_weighted_mix.sh
          sh -n common/v143_auto_multiweight_mix.sh
          sh -n common/font_mix.sh
          sh -n common/font_role_check.sh
          sh scripts/background_mix_worker_test.sh
          sh scripts/auto_multiweight_engine_test.sh
      - name: Commit validated patch
        shell: bash
        run: |
          rm -f .github/workflows/apply-detached-mix-worker.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: keep font synthesis running after app exit"
          git push origin HEAD:fix/background-mix-worker
