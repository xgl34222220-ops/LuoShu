name: No-Hook font engine tests
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - common/composite_font.py
      - common/device_font_template.py
      - common/device_font_template.sh
      - common/device_font_slot_plan.py
      - common/device_font_slot_plan.sh
      - common/device_font_slot_build.py
      - common/device_font_payload_build.py
      - common/device_font_payload_overlay.py
      - common/device_font_payload_runtime.sh
      - common/device_font_payload_bridge.sh
      - common/font_provider_cache.sh
      - common/origin_flyme_global.sh
      - common/font_instance.py
      - common/font_metrics_normalize.py
      - common/font_config_overlay.py
      - common/font_config_targets.py
      - common/font_config_runtime.sh
      - common/font_config_partitions.sh
      - common/font_config_weights.sh
      - common/font_name_normalize.py
      - common/font_safety.sh
      - common/font_manager.sh
      - common/font_library_cache.sh
      - common/hyperos_global.sh
      - common/mount_compat.sh
      - common/rom_adapters.sh
      - common/font_mix.sh
      - common/python/**
      - post-fs-data.sh
      - service.sh
      - scripts/build.sh
      - scripts/prepare_composite_runtime.sh
      - scripts/device_font_template_test.py
      - scripts/device_font_slot_plan_test.py
      - scripts/device_font_slot_plan_runtime_test.sh
      - scripts/device_font_slot_build_test.py
      - scripts/device_font_payload_build_test.py
      - scripts/device_font_payload_overlay_test.py
      - scripts/device_font_payload_runtime_test.sh
      - scripts/device_font_payload_bridge_test.sh
      - scripts/font_config_overlay_test.py
      - scripts/font_config_monospace_test.py
      - scripts/font_metrics_normalization_test.py
      - scripts/font_config_targets_test.py
      - scripts/font_config_runtime_test.sh
      - scripts/font_config_weights_test.sh
      - scripts/font_name_normalize_test.py
      - scripts/font_safety_test.sh
      - scripts/meta_module_sync_test.sh
      - scripts/no_hook_bootstrap_test.sh
      - scripts/prune_python_runtime.sh
      - scripts/python_runtime_prune_test.sh
      - .github/workflows/no-hook-font-engine.yml
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install font test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv python3-fonttools fonts-dejavu-core binutils >/dev/null
      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}
      - name: Prepare ARM64 font runtime
        run: |
          if [ ! -x common/python/bin/luoshu-python ]; then
            sh ./scripts/prepare_composite_runtime.sh
          fi
      - name: Run device template and payload tests
        run: |
          python3 scripts/device_font_template_test.py
          python3 scripts/device_font_slot_plan_test.py
          sh scripts/device_font_slot_plan_runtime_test.sh
          FONT="$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit)"
          test -s "$FONT"
          python3 scripts/device_font_slot_build_test.py --font "$FONT"
          python3 scripts/device_font_payload_build_test.py --font "$FONT"
          python3 scripts/device_font_payload_overlay_test.py
          sh scripts/device_font_payload_runtime_test.sh
          sh scripts/device_font_payload_bridge_test.sh
      - name: Run XML structure tests
        run: python3 scripts/font_config_overlay_test.py
      - name: Run mixed-script metrics tests
        run: |
          python3 scripts/font_metrics_normalization_test.py
          python3 scripts/font_config_monospace_test.py
      - name: Run dynamic target discovery tests
        run: python3 scripts/font_config_targets_test.py
      - name: Run payload transaction and boot guard tests
        run: sh -x scripts/font_safety_test.sh
      - name: Run meta-module synchronization tests
        run: sh -x scripts/meta_module_sync_test.sh
      - name: Run static font identity tests
        shell: bash
        run: |
          set -euo pipefail
          FONT="$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit)"
          test -s "$FONT"
          python3 scripts/font_name_normalize_test.py --font "$FONT"
      - name: Run deterministic weight safety tests
        run: sh -x scripts/font_config_weights_test.sh
      - name: Run transactional runtime tests
        run: sh -x scripts/font_config_runtime_test.sh
      - name: Verify every payload bootstrap chain
        run: sh -x scripts/no_hook_bootstrap_test.sh
      - name: Verify pruned ARM64 Python runtime
        run: sh scripts/python_runtime_prune_test.sh
      - name: Enforce no-Hook source boundary
        shell: bash
        run: |
          set -euo pipefail
          ! find android-app/app/src -type f \( -name 'xposed_init' -o -name 'scope.list' \) -print -quit | grep -q .
          ! grep -RInE 'IXposedHookLoadPackage|XposedBridge|LSPosed|lspatch' android-app/app/src common system 2>/dev/null
          ! grep -RInE '(^|[[:space:]])(cp|ln|rm)[[:space:]].*/data/fonts|_dest="/data/fonts/' post-fs-data.sh common 2>/dev/null
          grep -q 'font_config_boot_guard' post-fs-data.sh
          grep -q 'device_font_dynamic_mount_apply' post-fs-data.sh
          grep -q 'mount -o bind' common/device_font_payload_runtime.sh
          grep -q 'targetSha256' common/device_font_payload_runtime.sh
          grep -q 'device_font_payload_bridge.sh' common/font_config_partitions.sh
          grep -q 'copy_as_originos' common/device_font_payload_bridge.sh
          grep -q 'copy_as_flyme' common/device_font_payload_bridge.sh
          grep -q '_luoshu_flyme_prepare_data_restore' common/device_font_payload_bridge.sh
          grep -q 'font_config_mark_boot_success' service.sh
          grep -q 'font_config_partitions.sh' post-fs-data.sh
          grep -q 'font_config_enable_for_payload' common/hyperos_global.sh
          grep -q 'font_config_enable_for_payload' common/font_mix.sh
          grep -q 'luoshu_payload_transaction_begin' common/font_manager.sh
          grep -q 'luoshu_payload_transaction_begin' common/font_mix.sh
          grep -q 'luoshu_payload_transaction_commit' common/font_manager.sh
          grep -q 'luoshu_payload_transaction_commit' common/font_mix.sh
          grep -q 'font_config_targets.py' common/font_safety.sh
          grep -q 'font_config_disable' common/font_manager.sh
          grep -q 'mi_fonts_customization.xml' common/font_config_partitions.sh
          grep -q 'my_product' common/font_config_partitions.sh
          grep -q 'prune_python_runtime.sh' scripts/build.sh
