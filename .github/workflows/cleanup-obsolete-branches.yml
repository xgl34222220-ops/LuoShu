name: Cleanup obsolete branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-obsolete-branches.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - name: Delete obsolete branches and write report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const keep = new Set([
              'main',
              'fix/v14.3.4-release-transaction'
            ]);

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            const deleted = [];
            const failed = [];
            const preserved = [];

            for (const branch of branches) {
              const name = branch.name;
              if (keep.has(name)) {
                preserved.push(name);
                core.info(`Keep ${name}`);
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${name}`
                });
                deleted.push(name);
                core.info(`Deleted ${name}`);
              } catch (error) {
                failed.push(`${name}: ${error.message}`);
                core.warning(`Failed to delete ${name}: ${error.message}`);
              }
            }

            const report = [
              '# LuoShu branch cleanup result',
              '',
              `Commit: ${context.sha}`,
              '',
              '## Preserved',
              '',
              ...(preserved.length ? preserved.map(name => `- ${name}`) : ['- (none)']),
              '',
              '## Deleted',
              '',
              ...(deleted.length ? deleted.map(name => `- ${name}`) : ['- (none)']),
              '',
              '## Failed',
              '',
              ...(failed.length ? failed.map(item => `- ${item}`) : ['- (none)']),
              ''
            ].join('\n');

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'BRANCH_CLEANUP_RESULT.md',
              message: 'chore: record obsolete branch cleanup result',
              content: Buffer.from(report, 'utf8').toString('base64'),
              branch: 'main'
            });

            if (failed.length > 0) {
              core.setFailed(failed.join('\n'));
            }
