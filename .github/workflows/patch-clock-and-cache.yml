name: Apply Clock isolation patch
on:
  push:
    branches:
      - fix/v14.4.1-hyperos-app-fonts
    paths:
      - .github/workflows/patch-clock-and-cache.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v14.4.1-hyperos-app-fonts
      - name: Apply deterministic source patches
        run: |
          python3 - <<'PY'
          from pathlib import Path

          hook = Path('android-app/app/src/main/java/io/github/xgl34222220/luoshu/hook/AppBundledFontHook.kt')
          text = hook.read_text(encoding='utf-8')
          old = '''        if (packageName.startsWith("io.github.xgl34222220.luoshu")) return

        // QQ/TIM has a dedicated conservative compatibility entry. Installing this generic asset
        // hook in the same process would create two independent replacement policies and reproduce
        // the mixed font/baseline problem we are trying to remove.
        if (packageName in QQ_PACKAGES) return

        // Alarm receivers, ringtone playback and full-screen alert services often run in clock child
        // processes. Font customization has no value there, so do not install any generic factory,
        // asset or rendering hook in those functional processes.
        if (packageName in CLOCK_PACKAGES && !shouldInstallClockUiFontHooks(packageName, processName)) {
            XposedBridge.log("LuoShu AppFontHook skipped clock runtime process: $processName")
            return
        }
'''
          new = '''        if (packageName.startsWith("io.github.xgl34222220.luoshu")) return

        // Clock uses ClockUiDrawFontHook exclusively. Do not even register the generic Typeface,
        // Font.Builder, Resources or Paint hooks in Clock's main/alarm processes.
        if (packageName in CLOCK_PACKAGES) {
            XposedBridge.log("LuoShu AppFontHook delegated Clock to UI draw-only policy: $processName")
            return
        }

        // QQ/TIM has a dedicated conservative compatibility entry. Installing this generic asset
        // hook in the same process would create two independent replacement policies and reproduce
        // the mixed font/baseline problem we are trying to remove.
        if (packageName in QQ_PACKAGES) return
'''
          if text.count(old) != 1:
              raise SystemExit('AppBundledFontHook expected block not found exactly once')
          hook.write_text(text.replace(old, new), encoding='utf-8')

          mix = Path('common/v143_auto_multiweight_mix.sh')
          text = mix.read_text(encoding='utf-8')
          if text.count('auto-multiweight-v1') < 2:
              raise SystemExit('auto-multiweight-v1 markers not found')
          mix.write_text(text.replace('auto-multiweight-v1', 'auto-multiweight-v2'), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add android-app/app/src/main/java/io/github/xgl34222220/luoshu/hook/AppBundledFontHook.kt common/v143_auto_multiweight_mix.sh
          git commit -m 'fix(clock): exclude Clock from generic hooks and refresh composite cache'
          git push origin HEAD:fix/v14.4.1-hyperos-app-fonts
