name: Apply font inventory implementation
on:
  push:
    branches:
      - refactor/device-font-template-engine-v2.2.0
    paths:
      - .font-inventory-implementation.tar.gz
      - .github/workflows/apply-font-inventory-implementation.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply atomic source archive
        shell: bash
        run: |
          set -euo pipefail
          test -s .font-inventory-implementation.tar.gz
          tar -xzf .font-inventory-implementation.tar.gz -C .
          rm -f \
            .font-inventory-implementation.tar.gz \
            .github/workflows/font-inventory-source-snapshot.yml \
            .github/workflows/font-inventory-tree-sha.yml \
            .github/workflows/apply-font-inventory-implementation.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git diff --cached --quiet && exit 0
          git commit -m 'refactor: discover device font inventory before overlay'
          git push origin "HEAD:${GITHUB_REF_NAME}"
