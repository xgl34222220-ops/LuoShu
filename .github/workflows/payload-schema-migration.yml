name: Payload schema migration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'agent/font-baseline-consistency-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply payload schema migration
        id: migrate
        shell: bash
        run: |
          set +e
          {
            python3 scripts/payload_schema_migration.py
            python3 scripts/payload_schema_tests_migration.py
          } > /tmp/payload-schema-migration.log 2>&1
          code=$?
          cat /tmp/payload-schema-migration.log
          exit "$code"

      - name: Validate migrated sources
        id: validate
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            sh -n common/font_safety.sh
            sh -n common/module_update_state.sh
            sh -n common/multiweight_mix_task.sh
            sh -n customize.sh
            sh scripts/font_safety_test.sh
            sh scripts/module_update_state_test.sh
            grep -q 'baseline-v6-mono-v1' common/font_safety.sh
            grep -q 'composites-v3' common/multiweight_mix_task.sh
            grep -q 'prepared-v3' common/multiweight_mix_task.sh
            ! grep -q '等宽字体默认保持系统原样' customize.sh
          } > /tmp/payload-schema-validation.log 2>&1
          code=$?
          cat /tmp/payload-schema-validation.log
          exit "$code"

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: payload-schema-diagnostics-${{ github.run_id }}
          path: |
            /tmp/payload-schema-migration.log
            /tmp/payload-schema-validation.log
          if-no-files-found: warn
          retention-days: 2

      - name: Commit permanent source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            common/font_safety.sh \
            common/module_update_state.sh \
            common/multiweight_mix_task.sh \
            customize.sh \
            scripts/auto_multiweight_engine_test.sh \
            scripts/check.sh \
            scripts/stability_test.sh \
            scripts/font_safety_test.sh \
            scripts/module_update_state_test.sh
          git diff --cached --check
          git commit -m 'fix: rebuild stale font payloads across engine schemas'
          git push origin HEAD:${{ github.head_ref }}
