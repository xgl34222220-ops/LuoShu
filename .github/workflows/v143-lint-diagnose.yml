name: v14.3 Release Lint Diagnose

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/v143-lint-diagnose.yml
      - android-app/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Diagnose release lint, tests and assemble
        working-directory: android-app
        shell: bash
        run: |
          set +e
          gradle --no-daemon --stacktrace :app:lintRelease > "$RUNNER_TEMP/lint.log" 2>&1
          lint_rc=$?
          gradle --no-daemon --stacktrace :app:testReleaseUnitTest > "$RUNNER_TEMP/test.log" 2>&1
          test_rc=$?
          gradle --no-daemon --stacktrace :app:assembleRelease > "$RUNNER_TEMP/assemble.log" 2>&1
          assemble_rc=$?
          set -e

          echo "DIAGNOSTIC_STATUS lint=$lint_rc test=$test_rc assemble=$assemble_rc"

          if [[ "$lint_rc" -ne 0 ]]; then
            python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          report = Path('app/build/reports/lint-results-release.xml')
          if report.is_file():
              root = ET.parse(report).getroot()
              for issue in root.findall('issue'):
                  if issue.get('severity') not in {'Error', 'Fatal'}:
                      continue
                  loc = issue.find('location')
                  file = (loc.get('file') if loc is not None else '') or ''
                  line = (loc.get('line') if loc is not None else '1') or '1'
                  ident = issue.get('id', 'Lint')
                  msg = issue.get('message', '').replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
                  print(f'::error file={file},line={line}::[{ident}] {msg}')
          else:
              print('::error::lintRelease failed without an XML report')
          PY
            tail -n 120 "$RUNNER_TEMP/lint.log" || true
          fi

          if [[ "$test_rc" -ne 0 ]]; then
            echo '::error::testReleaseUnitTest failed'
            tail -n 120 "$RUNNER_TEMP/test.log" || true
          fi

          if [[ "$assemble_rc" -ne 0 ]]; then
            echo '::error::assembleRelease failed'
            tail -n 180 "$RUNNER_TEMP/assemble.log" || true
          fi

          echo "::error::RELEASE_DIAGNOSTIC_DONE lint=$lint_rc test=$test_rc assemble=$assemble_rc"
          exit 1
