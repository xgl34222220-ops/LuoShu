name: v14.3 Release Lint Diagnose

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/v143-lint-diagnose.yml
      - android-app/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Diagnose release tasks
        working-directory: android-app
        shell: bash
        run: |
          result="$RUNNER_TEMP/release-diagnostic.txt"
          : > "$result"
          set +e
          gradle --no-daemon --continue --stacktrace :app:lintRelease :app:testReleaseUnitTest :app:assembleRelease > "$RUNNER_TEMP/release-gradle.log" 2>&1
          overall_rc=$?
          set -e

          echo "overall=$overall_rc" >> "$result"
          for output in \
            app/build/outputs/apk/release/app-release.apk \
            app/build/test-results/testReleaseUnitTest; do
            if [[ -e "$output" ]]; then
              echo "exists=$output" >> "$result"
            else
              echo "missing=$output" >> "$result"
            fi
          done

          python3 - "$result" <<'PY'
          from pathlib import Path
          import sys
          import xml.etree.ElementTree as ET

          result = Path(sys.argv[1])
          report = Path('app/build/reports/lint-results-release.xml')
          lines = []
          if report.is_file():
              root = ET.parse(report).getroot()
              blocking = [i for i in root.findall('issue') if i.get('severity') in {'Error', 'Fatal'}]
              lines.append(f'blocking_lint={len(blocking)}')
              for issue in blocking:
                  loc = issue.find('location')
                  file = (loc.get('file') if loc is not None else '') or ''
                  line = (loc.get('line') if loc is not None else '') or ''
                  lines.append(f"lint|{issue.get('id','Lint')}|{file}|{line}|{issue.get('message','')}")
          else:
              lines.append('blocking_lint=report-missing')
          result.write_text(result.read_text() + '\n'.join(lines) + '\n', encoding='utf-8')
          PY

          echo '--- gradle failure summary ---' >> "$result"
          grep -E '(^|> )Task .* FAILED|FAILURE:|Execution failed for task|Lint found|error:' "$RUNNER_TEMP/release-gradle.log" | tail -n 120 >> "$result" || true
          echo '--- gradle log tail ---' >> "$result"
          tail -n 320 "$RUNNER_TEMP/release-gradle.log" >> "$result" || true
          cat "$result"
      - name: Upload concise diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v143-release-diagnostic
          path: ${{ runner.temp }}/release-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
