name: Purge obsolete repository history

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-obsolete-history.yml

permissions:
  contents: write

env:
  KEEP_BRANCH: main
  KEEP_TAG: v2.0.0

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - name: Delete obsolete branches, releases, and tags
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepBranch = process.env.KEEP_BRANCH;
            const keepTag = process.env.KEEP_TAG;

            const result = {
              preservedBranches: [],
              deletedBranches: [],
              preservedReleases: [],
              deletedReleases: [],
              preservedTags: [],
              deletedTags: [],
              failed: []
            };

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );

            for (const branch of branches) {
              const name = branch.name;
              if (name === keepBranch) {
                result.preservedBranches.push(name);
                continue;
              }
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${name}` });
                result.deletedBranches.push(name);
              } catch (error) {
                result.failed.push(`branch ${name}: ${error.message}`);
              }
            }

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );

            for (const release of releases) {
              const label = `${release.tag_name}${release.name ? ` (${release.name})` : ''}`;
              if (release.tag_name === keepTag) {
                result.preservedReleases.push(label);
                continue;
              }
              try {
                await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
                result.deletedReleases.push(label);
              } catch (error) {
                result.failed.push(`release ${label}: ${error.message}`);
              }
            }

            const refs = await github.paginate(
              github.rest.git.listMatchingRefs,
              { owner, repo, ref: 'tags/', per_page: 100 }
            );

            for (const tagRef of refs) {
              const name = tagRef.ref.replace(/^refs\/tags\//, '');
              if (name === keepTag) {
                result.preservedTags.push(name);
                continue;
              }
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${name}` });
                result.deletedTags.push(name);
              } catch (error) {
                result.failed.push(`tag ${name}: ${error.message}`);
              }
            }

            const section = (title, items) => [
              `## ${title}`,
              '',
              ...(items.length ? items.map(item => `- ${item}`) : ['- (none)']),
              ''
            ];

            const report = [
              '# LuoShu repository cleanup result',
              '',
              `Cleanup commit: ${context.sha}`,
              `Preserved branch: ${keepBranch}`,
              `Preserved release/tag: ${keepTag}`,
              '',
              ...section('Preserved branches', result.preservedBranches),
              ...section('Deleted branches', result.deletedBranches),
              ...section('Preserved releases', result.preservedReleases),
              ...section('Deleted releases', result.deletedReleases),
              ...section('Preserved tags', result.preservedTags),
              ...section('Deleted tags', result.deletedTags),
              ...section('Failures', result.failed)
            ].join('\n');

            let existingReport;
            try {
              existingReport = await github.rest.repos.getContent({
                owner, repo, path: 'REPOSITORY_CLEANUP_RESULT.md', ref: keepBranch
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: 'REPOSITORY_CLEANUP_RESULT.md',
              message: 'chore: record repository cleanup result [skip ci]',
              content: Buffer.from(report, 'utf8').toString('base64'),
              branch: keepBranch,
              ...(existingReport ? { sha: existingReport.data.sha } : {})
            });

            try {
              const workflow = await github.rest.repos.getContent({
                owner, repo, path: '.github/workflows/cleanup-obsolete-history.yml', ref: keepBranch
              });
              await github.rest.repos.deleteFile({
                owner,
                repo,
                path: '.github/workflows/cleanup-obsolete-history.yml',
                message: 'chore: remove one-shot repository cleanup [skip ci]',
                sha: workflow.data.sha,
                branch: keepBranch
              });
            } catch (error) {
              result.failed.push(`self cleanup: ${error.message}`);
              core.warning(`Could not remove cleanup workflow: ${error.message}`);
            }

            if (result.failed.length > 0) {
              core.setFailed(result.failed.join('\n'));
            }
