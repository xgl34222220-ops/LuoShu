name: Build RC3 test package
on:
  pull_request_target:
    types: [reopened]
permissions:
  contents: read
jobs:
  build:
    if: >-
      github.event.pull_request.number == 14 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'hotfix/v14.1.1-rc3-clean-baseline'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/v14.1.1-rc3-clean-baseline
          path: target
          fetch-depth: 1
      - name: Build and validate module
        working-directory: target
        run: |
          sh scripts/build.sh
          unzip -t dist/LuoShu-*.zip
          sha256sum -c dist/LuoShu-*.zip.sha256
      - name: Upload test package
        uses: actions/upload-artifact@v4
        with:
          name: LuoShu-v14.1.1-RC3-clean-baseline-dbbae55
          path: |
            target/dist/LuoShu-*.zip
            target/dist/LuoShu-*.zip.sha256
          if-no-files-found: error
          retention-days: 3
