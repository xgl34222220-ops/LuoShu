name: Materialize Alpha1.3 weight upgrade
on:
  pull_request:
permissions:
  contents: write
jobs:
  materialize:
    if: github.event_name == 'pull_request' && github.head_ref == 'trigger/alpha13-weight-materialize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-alpha1-native-import
          fetch-depth: 0
          show-progress: false
      - name: Generate and commit Alpha1.3 implementation
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/alpha13-weight-import.yml').read_text(encoding='utf-8')
          body = workflow.split("python3 - <<'PY'\n", 1)[1].rsplit("\n          PY\n", 1)[0]
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in body.splitlines())
          exec(compile(body, 'alpha13-weight-import', 'exec'), {'__name__': '__main__'})
          PY

          # GitHub Actions 的 GITHUB_TOKEN 没有 workflows 权限，功能提交不得包含工作流改动。
          # 临时工作流会在功能提交完成后由仓库接口单独恢复和删除。
          git checkout HEAD -- .github/workflows/build.yml .github/workflows/alpha13-weight-import.yml
          rm -f .alpha13-trigger .alpha13-trigger2 .alpha13-error.log
          chmod 0755 common/font_import_probe.py scripts/native_zip_import_test.sh
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git reset .github/workflows/build.yml .github/workflows/alpha13-weight-import.yml
          git commit -m "feat: read real internal weights for multi-weight imports"
          git push origin HEAD:feature/v14.3-alpha1-native-import
