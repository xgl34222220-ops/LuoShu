name: Build module
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null
      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}
      - name: Prepare ARM64 composite runtime
        run: |
          if [ ! -x common/python/bin/luoshu-python ]; then
            sh ./scripts/prepare_composite_runtime.sh
          fi
      - name: Composite smoke tests
        env:
          PYTHONPATH: common/python/lib/python3.14/site-packages
        run: |
          CJK="$(find /usr/share/fonts -type f \( -iname '*NotoSansCJK*Regular*.ttc' -o -iname '*NotoSansCJK*Regular*.otf' \) -print -quit)"
          LATIN="$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit)"
          test -n "$CJK"; test -n "$LATIN"
          python3 common/composite_font.py --cjk "$CJK" --latin "$LATIN" --digit "$LATIN" --output /tmp/luoshu-composite.otf >/tmp/luoshu-composite.json
          python3 - <<'PY'
          import json
          from fontTools.ttLib import TTFont
          report=json.load(open('/tmp/luoshu-composite.json', encoding='utf-8'))
          assert report['status']=='ok', report
          font=TTFont('/tmp/luoshu-composite.otf')
          cmap=font.getBestCmap() or {}
          assert all(ord(ch) in cmap for ch in '中Aa019')
          assert report['replaced']['latin'] >= 52
          assert report['replaced']['digit'] >= 10
          PY
          python3 common/font_coverage.py /tmp/luoshu-composite.otf --brief
          if python3 common/font_coverage.py "$LATIN" --brief; then
            echo 'Latin-only font unexpectedly passed the global coverage gate' >&2
            exit 1
          fi
      - name: Build flashable module
        run: LUOSHU_VARIANT=lite sh ./scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: LuoShu-RC1-Lite-module
          path: dist/*.zip*
          if-no-files-found: error
          retention-days: 30

  app_features:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'ops/v14.3-app-features-trigger-final'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-app-auto-multiweight-import
          fetch-depth: 0
      - name: Apply App-only implementation
        run: |
          set -euo pipefail
          python3 scripts/materialize_app_only_features.py
          chmod 0755 common/app_multiweight_mix.sh scripts/check_app_only_features.sh
          git diff --check
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Verify App-only boundary
        run: |
          set -euo pipefail
          git fetch origin main
          if git diff --name-only origin/main...HEAD | grep -q '^webroot/'; then
            echo 'WebUI files changed even though these features are App-only.' >&2
            exit 1
          fi
          sh scripts/check_app_only_features.sh
      - name: Compile debug APK
        run: gradle -p android-app --no-daemon --stacktrace :app:assembleDebug
      - name: Commit feature implementation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A android-app common scripts
          git commit -m 'feat(app): default multiweight and private font import'
          git push origin HEAD:feature/v14.3-app-auto-multiweight-import
      - name: Report result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RESULT: ${{ job.status }}
        run: |
          body="$(printf 'V14_3_APP_ENABLED_WORKFLOW_RESULT: **%s**\n\nrun=https://github.com/%s/actions/runs/%s' "$RESULT" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$body"
