name: Build module
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: license/gpl-3.0
          fetch-depth: 0
      # GPL_MATERIALIZER_BEGIN
      - name: Correct and verify GPL text
        if: github.event_name == 'pull_request' && github.head_ref == 'license/gpl-3.0'
        run: |
          set -eux
          sed -i 's/clear directions next to the code saying/clear directions next to the object code saying/' LICENSE
          sha256sum LICENSE
      - name: Add WebUI legal notice
        if: github.event_name == 'pull_request' && github.head_ref == 'license/gpl-3.0'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('webroot/index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('<span>惜故里丶</span>\n    </footer>', '<span>惜故里丶</span>\n        <span>·</span>\n        <span>GPL-3.0-only</span>\n    </footer>')
          s=s.replace('<div class="more-meta">洛书 <span data-module-version>v14.1</span> · 开源字体切换模块</div>', '<div class="help-note"><span class="note-icon">L</span><span><strong>开源许可</strong><small>洛书自身源码采用 GPL-3.0-only，按原样提供且不附带担保；第三方组件适用各自许可证。</small></span></div>\n                <div class="more-meta">洛书 <span data-module-version>v14.1</span> · GPL-3.0-only</div>')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Remove GPL materializer from workflow
        if: github.event_name == 'pull_request' && github.head_ref == 'license/gpl-3.0'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('.github/workflows/build.yml')
          s=p.read_text(encoding='utf-8')
          start=s.index('      # GPL_MATERIALIZER_BEGIN\n')
          end=s.index('      # GPL_MATERIALIZER_END\n') + len('      # GPL_MATERIALIZER_END\n')
          s=s[:start]+s[end:]
          s=s.replace('permissions:\n  contents: write', 'permissions:\n  contents: read')
          s=s.replace('        with:\n          ref: license/gpl-3.0\n          fetch-depth: 0\n', '')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit GPL finalization
        if: github.event_name == 'pull_request' && github.head_ref == 'license/gpl-3.0'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add LICENSE webroot/index.html .github/workflows/build.yml
          git diff --cached --check
          git commit -m 'license: finalize verified GPL-3.0-only declaration'
      - name: Push GPL finalization
        if: github.event_name == 'pull_request' && github.head_ref == 'license/gpl-3.0'
        run: git push origin HEAD:license/gpl-3.0
      # GPL_MATERIALIZER_END
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null
      - name: Prepare ARM64 composite runtime
        run: sh ./scripts/prepare_composite_runtime.sh
      - name: Composite smoke tests
        env:
          PYTHONPATH: common/python/lib/python3.14/site-packages
        run: |
          CJK="$(find /usr/share/fonts -type f \( -iname '*NotoSansCJK*Regular*.ttc' -o -iname '*NotoSansCJK*Regular*.otf' \) -print -quit)"
          LATIN="$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit)"
          test -n "$CJK"; test -n "$LATIN"
          python3 common/composite_font.py --cjk "$CJK" --latin "$LATIN" --digit "$LATIN" --output /tmp/luoshu-composite.otf >/tmp/luoshu-composite.json
          python3 - <<'PY'
          import json
          from fontTools.ttLib import TTFont
          report=json.load(open('/tmp/luoshu-composite.json', encoding='utf-8'))
          assert report['status']=='ok', report
          font=TTFont('/tmp/luoshu-composite.otf')
          cmap=font.getBestCmap() or {}
          assert all(ord(ch) in cmap for ch in '中Aa019')
          assert report['replaced']['latin'] >= 52
          assert report['replaced']['digit'] >= 10
          PY
      - name: Build flashable module
        run: sh ./scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: LuoShu-v14.1
          path: dist/*.zip*
          if-no-files-found: error
          retention-days: 30
