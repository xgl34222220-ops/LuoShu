name: Font engine smoke tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  v2-source-consolidation:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/v2-source-consolidation' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply one-shot v2 source migration
        id: migrate
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/v2_source_consolidation.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'for name in ("scripts/v2_source_consolidation.py", ".github/workflows/v2-source-consolidation.yml"):',
              'for name in ("scripts/v2_source_consolidation.py",):',
          )
          path.write_text(text, encoding='utf-8')
          PY
          python scripts/v2_source_consolidation.py >migration-run.log 2>&1
          code=$?
          cat migration-run.log
          exit "$code"

      - name: Persist migration failure
        if: failure() && steps.migrate.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard HEAD
          test -s migration-run.log || printf 'migration failed without output\n' > migration-run.log
          cp migration-run.log MIGRATION_FAILURE.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MIGRATION_FAILURE.txt
          git commit -m 'chore: record v2 migration failure'
          git push origin HEAD:${{ github.head_ref }}

      - name: Validate migrated source tree
        shell: bash
        run: |
          set -euo pipefail
          find . -type f -name '*.sh' -print0 | xargs -0 -n1 sh -n
          python -m py_compile \
            common/composite_font.py \
            common/font_instance.py \
            common/font_config_overlay.py \
            common/font_config_targets.py
          sh scripts/font_library_ui_layout_test.sh
          sh scripts/auto_multiweight_mode_test.sh
          sh scripts/background_mix_worker_test.sh
          sh scripts/nested_mix_task_handoff_test.sh

      - name: Commit migrated source tree
        shell: bash
        run: |
          set +e
          rm -f MIGRATION_FAILURE.txt COMMIT_FAILURE.txt migration-run.log commit-run.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          {
            git diff --cached --check
            git commit -m 'refactor: consolidate v2 runtime source namespace'
            git push origin HEAD:${{ github.head_ref }}
          } >commit-run.log 2>&1
          code=$?
          cat commit-run.log
          if [ "$code" -ne 0 ]; then
            git reset --hard HEAD
            cp commit-run.log COMMIT_FAILURE.txt
            git add COMMIT_FAILURE.txt
            git commit -m 'chore: record v2 migration commit failure'
            git push origin HEAD:${{ github.head_ref }}
          fi
          exit "$code"

  engine:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install font engine dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null

      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}

      - name: Prepare ARM64 composite runtime
        run: |
          if [ ! -x common/python/bin/luoshu-python ]; then
            sh ./scripts/prepare_composite_runtime.sh
          fi

      - name: Composite smoke tests
        env:
          PYTHONPATH: common/python/lib/python3.14/site-packages
        run: |
          CJK="$(find /usr/share/fonts -type f \( -iname '*NotoSansCJK*Regular*.ttc' -o -iname '*NotoSansCJK*Regular*.otf' \) -print -quit)"
          LATIN="$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit)"
          test -n "$CJK"; test -n "$LATIN"
          python3 common/composite_font.py --cjk "$CJK" --latin "$LATIN" --digit "$LATIN" --output /tmp/luoshu-composite.otf >/tmp/luoshu-composite.json
          python3 - <<'PY'
          import json
          from fontTools.ttLib import TTFont

          report = json.load(open('/tmp/luoshu-composite.json', encoding='utf-8'))
          assert report['status'] == 'ok', report
          font = TTFont('/tmp/luoshu-composite.otf')
          cmap = font.getBestCmap() or {}
          assert all(ord(ch) in cmap for ch in '中Aa019')
          assert report['replaced']['latin'] >= 52
          assert report['replaced']['digit'] >= 10
          PY
          python3 common/font_coverage.py /tmp/luoshu-composite.otf --brief
          if python3 common/font_coverage.py "$LATIN" --brief; then
            echo 'Latin-only font unexpectedly passed the global coverage gate' >&2
            exit 1
          fi

      - name: TTC face extraction smoke test
        run: sh ./scripts/ttc_face_test.sh
