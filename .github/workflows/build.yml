name: Build module

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check source
        run: sh ./scripts/check.sh
      - name: Build flashable module
        run: sh ./scripts/build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuoShu-module
          path: dist/*.zip
          if-no-files-found: error
