name: Diagnose Alpha1.4 native App

on:
  pull_request:
    branches:
      - feature/v14.3-alpha1-native-import

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event_name == 'pull_request' && github.head_ref == 'trigger/alpha14-native-preview'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-alpha1-native-import
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Compile Alpha1.4 App
        working-directory: android-app
        shell: bash
        run: |
          set +e
          gradle --no-daemon --stacktrace :app:compileDebugKotlin > ../alpha14-gradle.log 2>&1
          echo "$?" > ../alpha14-gradle.rc
          exit 0
      - name: Upload Alpha1.4 compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha14-app-compiler-diagnostics
          path: |
            alpha14-gradle.log
            alpha14-gradle.rc
          if-no-files-found: error
          retention-days: 2
      - name: Enforce App compilation
        run: test "$(cat alpha14-gradle.rc)" = 0
