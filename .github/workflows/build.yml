name: Build module

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check source
        shell: bash
        run: |
          if ! sh -x ./scripts/check.sh > /tmp/luoshu-check.log 2>&1; then
            tail -n 80 /tmp/luoshu-check.log
            exit 1
          fi
      - name: Upload check diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: LuoShu-check-diagnostics
          path: /tmp/luoshu-check.log
          if-no-files-found: ignore
      - name: Build flashable module
        run: sh ./scripts/build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuoShu-v14.1-module
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
