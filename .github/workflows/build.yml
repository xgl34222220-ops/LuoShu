name: Materialize Alpha1.4 native live preview

on:
  pull_request:
    branches:
      - feature/v14.3-alpha1-native-import

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name == 'pull_request' && github.head_ref == 'trigger/alpha14-native-preview'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-alpha1-native-import
          fetch-depth: 0
      - name: Execute staged Alpha1.4 upgrade
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/alpha14-native-live-preview.yml').read_text(encoding='utf-8')
          body = source.split('        run: |\n', 1)[1]
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in body.splitlines())
          Path('/tmp/apply-alpha14.sh').write_text(body + '\n', encoding='utf-8')
          PY
          set +e
          bash /tmp/apply-alpha14.sh > /tmp/alpha14-materializer.log 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            git reset --hard origin/feature/v14.3-alpha1-native-import
            cp /tmp/alpha14-materializer.log .alpha14-error.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .alpha14-error.log
            git commit -m "chore: record Alpha1.4 materializer error"
            git push origin HEAD:feature/v14.3-alpha1-native-import
            exit "$rc"
          fi
