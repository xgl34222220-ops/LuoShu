name: Build module
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  materialize-real-font-weights:
    if: github.event_name == 'pull_request' && github.head_ref == 'ops/v14.3-realweight-materializer-2'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v14.3-app-auto-multiweight-import
          fetch-depth: 1
          show-progress: false
      - name: Restore corrected files
        shell: bash
        run: |
          set -euo pipefail
          restore() {
            name="$1"; expected="$2"
            payload=".github/realweight-fix/${name}.gz.b64"
            actual="$(wc -c < "$payload" | tr -d ' ')"
            echo "RESTORE ${name}: ${actual}/${expected} bytes"
            test "$actual" = "$expected"
            base64 -d "$payload" > "/tmp/${name}.gz"
            gzip -t "/tmp/${name}.gz"
            gzip -dc "/tmp/${name}.gz" > "common/${name}"
            chmod 0755 "common/${name}"
          }
          restore util_functions.sh 13736
          restore app_multiweight_mix.sh 12076
          restore font_manager.sh 15888
          restore rom_adapters.sh 7384
      - name: Verify corrected implementation
        shell: bash
        run: |
          set -euo pipefail
          sh -n common/util_functions.sh
          sh -n common/app_multiweight_mix.sh
          sh -n common/font_manager.sh
          sh -n common/rom_adapters.sh
          python3 -m py_compile common/font_metadata.py common/font_instance.py
          ! grep -q 'AUTO_SET="300:Light 400:Regular 500:Medium 600:SemiBold 700:Bold"' common/app_multiweight_mix.sh
          grep -q 'font_family_weight_numbers' common/app_multiweight_mix.sh
          grep -q 'font_metadata_conf' common/util_functions.sh
          grep -q 'font_family_has_weight' common/rom_adapters.sh
          sh scripts/check_app_only_features.sh
      - name: Commit corrected implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/realweight-fix
          rm -f .github/workflows/app-realweight-materialize.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add common/util_functions.sh common/app_multiweight_mix.sh common/font_manager.sh common/rom_adapters.sh .github
          git commit -m 'fix(app): map imported fonts by their real weights'
          git push origin HEAD:feature/v14.3-app-auto-multiweight-import
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null
      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}
      - name: Prepare ARM64 composite runtime
        run: |
          if [ ! -x common/python/bin/luoshu-python ]; then
            sh ./scripts/prepare_composite_runtime.sh
          fi
      - name: Composite smoke tests
        env:
          PYTHONPATH: common/python/lib/python3.14/site-packages
        run: |
          CJK="$(find /usr/share/fonts -type f \( -iname '*NotoSansCJK*Regular*.ttc' -o -iname '*NotoSansCJK*Regular*.otf' \) -print -quit)"
          LATIN="$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit)"
          test -n "$CJK"; test -n "$LATIN"
          python3 common/composite_font.py --cjk "$CJK" --latin "$LATIN" --digit "$LATIN" --output /tmp/luoshu-composite.otf >/tmp/luoshu-composite.json
          python3 - <<'PY'
          import json
          from fontTools.ttLib import TTFont
          report=json.load(open('/tmp/luoshu-composite.json', encoding='utf-8'))
          assert report['status']=='ok', report
          font=TTFont('/tmp/luoshu-composite.otf')
          cmap=font.getBestCmap() or {}
          assert all(ord(ch) in cmap for ch in '中Aa019')
          assert report['replaced']['latin'] >= 52
          assert report['replaced']['digit'] >= 10
          PY
          python3 common/font_coverage.py /tmp/luoshu-composite.otf --brief
          if python3 common/font_coverage.py "$LATIN" --brief; then
            echo 'Latin-only font unexpectedly passed the global coverage gate' >&2
            exit 1
          fi
      - name: Build flashable module
        run: LUOSHU_VARIANT=lite sh ./scripts/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: LuoShu-RC1-Lite-module
          path: dist/*.zip*
          if-no-files-found: error
          retention-days: 30
