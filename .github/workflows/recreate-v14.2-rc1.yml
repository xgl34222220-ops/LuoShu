name: Recreate and publish v14.2 RC1

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/recreate-v14.2-rc1.yml

permissions:
  contents: write
  actions: write

jobs:
  recreate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace stale RC1 tag and dispatch signed release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v14.2-RC1
          TARGET_SHA: 511e527a8298e5dea1916b68dd848f3645c91243
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git cat-file -e "${TARGET_SHA}^{commit}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; refusing to replace it." >&2
            exit 4
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git push origin ":refs/tags/$TAG"
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "$TAG" "$TARGET_SHA"
          git push origin "refs/tags/$TAG"
          gh workflow run release.yml --ref "$TAG" -f tag="$TAG"
