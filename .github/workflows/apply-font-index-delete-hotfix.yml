name: Apply font index deletion hotfix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/font-index-delete-collapse'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/font-index-delete-collapse
          fetch-depth: 0

      - name: Patch manifest filter and add regression
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manager = Path('common/font_manager.sh')
          text = manager.read_text(encoding='utf-8')
          old = "        case \"$_name|$_family\" in *'|'*) continue ;; esac\n"
          new = (
              "        case \"$_name\" in *'|'*) continue ;; esac\n"
              "        case \"$_family\" in *'|'*) continue ;; esac\n"
          )
          if old not in text:
              raise SystemExit('combined manifest delimiter guard not found')
          manager.write_text(text.replace(old, new, 1), encoding='utf-8')

          check = Path('scripts/check.sh')
          check_text = check.read_text(encoding='utf-8')
          anchor = 'sh "$ROOT/scripts/native_zip_import_test.sh"\n'
          call = 'sh "$ROOT/scripts/font_index_delete_regression_test.sh"\n'
          if call not in check_text:
              if anchor not in check_text:
                  raise SystemExit('check.sh insertion anchor not found')
              check_text = check_text.replace(anchor, anchor + call, 1)
              check.write_text(check_text, encoding='utf-8')
          PY

          cat > scripts/font_index_delete_regression_test.sh <<'SH'
          #!/bin/sh
          set -eu
          ROOT=$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)
          TMP=$(mktemp -d)
          trap 'rm -rf "$TMP"' EXIT HUP INT TERM

          FONT=$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit 2>/dev/null || true)
          if [ ! -s "$FONT" ]; then
              echo 'Font index deletion regression skipped: DejaVu Sans is unavailable.'
              exit 0
          fi

          MODULE="$TMP/module"
          PUBLIC="$TMP/public"
          mkdir -p "$MODULE/common" "$MODULE/config" "$PUBLIC/fonts"
          cp "$ROOT/common/font_manager.sh" "$MODULE/common/font_manager.sh"
          cp "$ROOT/common/util_functions.sh" "$MODULE/common/util_functions.sh"
          cp "$ROOT/common/font_check.sh" "$MODULE/common/font_check.sh"
          cp "$ROOT/common/font_library_cache.sh" "$MODULE/common/font_library_cache.sh"
          cp "$FONT" "$PUBLIC/fonts/Alpha-Regular.ttf"
          cp "$FONT" "$PUBLIC/fonts/Beta-Regular.ttf"

          BEFORE=$(MODDIR="$MODULE" LUOSHU_PUBLIC_DIR="$PUBLIC" sh "$MODULE/common/font_manager.sh" action list refresh)
          printf '%s\n' "$BEFORE" | grep -q '"count":2'
          printf '%s\n' "$BEFORE" | grep -q '"id":"Alpha"'
          printf '%s\n' "$BEFORE" | grep -q '"id":"Beta"'

          DELETED=$(MODDIR="$MODULE" LUOSHU_PUBLIC_DIR="$PUBLIC" sh "$MODULE/common/font_manager.sh" action delete Alpha)
          printf '%s\n' "$DELETED" | grep -q '"status":"ok"'
          printf '%s\n' "$DELETED" | grep -q '"deleted":1'
          test ! -e "$PUBLIC/fonts/Alpha-Regular.ttf"
          test -s "$PUBLIC/fonts/Beta-Regular.ttf"

          AFTER=$(MODDIR="$MODULE" LUOSHU_PUBLIC_DIR="$PUBLIC" sh "$MODULE/common/font_manager.sh" action list refresh)
          printf '%s\n' "$AFTER" | grep -q '"count":1'
          ! printf '%s\n' "$AFTER" | grep -q '"id":"Alpha"'
          printf '%s\n' "$AFTER" | grep -q '"id":"Beta"'

          ! grep -Fq 'case "$_name|$_family"' "$ROOT/common/font_manager.sh"
          grep -Fq 'case "$_name" in' "$ROOT/common/font_manager.sh"
          grep -Fq 'case "$_family" in' "$ROOT/common/font_manager.sh"
          echo 'Deleting one font preserves every remaining font in the native index.'
          SH
          chmod 0755 scripts/font_index_delete_regression_test.sh

      - name: Validate hotfix
        shell: bash
        run: |
          sh -n common/font_manager.sh
          sh -n scripts/font_index_delete_regression_test.sh
          sh scripts/font_index_delete_regression_test.sh

      - name: Commit validated hotfix
        shell: bash
        run: |
          rm -f .github/workflows/apply-font-index-delete-hotfix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: preserve font index after deleting one family"
          git push origin HEAD:fix/font-index-delete-collapse
