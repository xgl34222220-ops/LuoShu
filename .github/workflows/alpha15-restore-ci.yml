name: Restore Alpha1.5 validation workflow
on:
  push:
    branches:
      - feature/v14.3-alpha1-native-import
    paths:
      - .github/workflows/alpha15-restore-ci.yml
permissions:
  contents: write
jobs:
  restore:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-alpha1-native-import
          fetch-depth: 0
      - name: Restore normal check workflow and remove this helper
        shell: bash
        run: |
          set -euo pipefail
          git show a4ebbcd400d2028ddfcc826098d8c7ddfac16ae1:.github/workflows/check.yml > .github/workflows/check.yml
          git rm .github/workflows/alpha15-restore-ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/check.yml
          git commit -m 'chore(ci): restore normal validation after Alpha1.5 diagnosis'
          git push origin HEAD:feature/v14.3-alpha1-native-import
