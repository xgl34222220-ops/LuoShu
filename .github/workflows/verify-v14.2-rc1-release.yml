name: Verify v14.2 RC1 published assets

on:
  workflow_run:
    workflows: [Publish signed release]
    types: [completed]

permissions:
  contents: write

jobs:
  verify:
    if: >-
      github.event.workflow_run.head_sha == '511e527a8298e5dea1916b68dd848f3645c91243'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Require successful release workflow
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          [[ "$CONCLUSION" == success ]] || {
            echo "Signed release workflow failed: $RUN_URL" >&2
            exit 1
          }

      - name: Verify prerelease and all published files
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v14.2-RC1
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(gh release view "$TAG" --json isPrerelease --jq .isPrerelease)" == true ]]
          expected=(
            "LuoShu-App-v14.2-RC1.apk"
            "LuoShu-App-v14.2-RC1.apk.sha256"
            "LuoShu-v14.2-RC1-Full.zip"
            "LuoShu-v14.2-RC1-Full.zip.sha256"
            "LuoShu-v14.2-RC1-Lite.zip"
            "LuoShu-v14.2-RC1-Lite.zip.sha256"
          )
          mapfile -t actual < <(gh release view "$TAG" --json assets --jq '.assets[].name' | sort)
          diff -u <(printf '%s\n' "${expected[@]}" | sort) <(printf '%s\n' "${actual[@]}")
          asset_dir="$RUNNER_TEMP/release-assets"
          mkdir -p "$asset_dir"
          gh release download "$TAG" --dir "$asset_dir"
          cd "$asset_dir"
          sha256sum -c LuoShu-App-v14.2-RC1.apk.sha256
          sha256sum -c LuoShu-v14.2-RC1-Full.zip.sha256
          sha256sum -c LuoShu-v14.2-RC1-Lite.zip.sha256
          unzip -t LuoShu-v14.2-RC1-Full.zip >/dev/null
          unzip -t LuoShu-v14.2-RC1-Lite.zip >/dev/null
          unzip -Z1 LuoShu-v14.2-RC1-Full.zip | grep -qx 'bundled/LuoShu-App.apk'
          ! unzip -Z1 LuoShu-v14.2-RC1-Lite.zip | grep -qx 'bundled/LuoShu-App.apk'
          unzip -p LuoShu-v14.2-RC1-Full.zip bundled/LuoShu-App.apk > embedded.apk
          cmp -s LuoShu-App-v14.2-RC1.apk embedded.apk
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          test -x "$build_tools/apksigner"
          "$build_tools/apksigner" verify --verbose --print-certs LuoShu-App-v14.2-RC1.apk
          "$build_tools/apksigner" verify --verbose --print-certs embedded.apk

      - name: Remove one-shot verifier after success
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/verify-v14.2-rc1-release.yml
          git commit -m 'ci: verified v14.2 RC1 release assets'
          git push origin HEAD:main
