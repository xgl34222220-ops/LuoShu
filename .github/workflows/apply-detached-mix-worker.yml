name: Apply detached mix worker fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/background-mix-worker'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/background-mix-worker
          fetch-depth: 0
      - name: Patch detached workers and role cache
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          helper = r'''#!/system/bin/sh
# Root 后台任务启动器：脱离 App 的 su 会话、终端与进程组。

luoshu_pid_value() {
    sed -n '1{s/[^0-9].*$//;p;}' "$1" 2>/dev/null
}

luoshu_task_pid_alive() {
    _pid_file="$1"
    _task="${2:-}"
    _pid=$(luoshu_pid_value "$_pid_file")
    [ -n "$_pid" ] || return 1
    kill -0 "$_pid" 2>/dev/null || return 1
    if [ -n "$_task" ] && [ -s "${_pid_file}.task" ]; then
        [ "$(cat "${_pid_file}.task" 2>/dev/null)" = "$_task" ] || return 1
    fi
    return 0
}

luoshu_clear_task_pid() {
    _pid_file="$1"
    _task="${2:-}"
    if [ -n "$_task" ] && [ -s "${_pid_file}.task" ] && [ "$(cat "${_pid_file}.task" 2>/dev/null)" != "$_task" ]; then
        return 0
    fi
    rm -f "$_pid_file" "${_pid_file}.task" 2>/dev/null || true
}

luoshu_stop_task_pid() {
    _pid_file="$1"
    _pid=$(luoshu_pid_value "$_pid_file")
    [ -z "$_pid" ] || ! kill -0 "$_pid" 2>/dev/null || kill "$_pid" 2>/dev/null || true
    luoshu_clear_task_pid "$_pid_file"
}

luoshu_start_detached() {
    _pid_file="$1"
    _task="$2"
    _log_file="$3"
    shift 3
    [ "$#" -gt 0 ] || return 2
    mkdir -p "${_pid_file%/*}" "${_log_file%/*}" 2>/dev/null || return 1
    if luoshu_task_pid_alive "$_pid_file" "$_task"; then
        return 3
    fi
    luoshu_clear_task_pid "$_pid_file"

    if command -v nohup >/dev/null 2>&1 && command -v setsid >/dev/null 2>&1; then
        MODDIR="${MODDIR:-}" nohup setsid "$@" </dev/null >>"$_log_file" 2>&1 &
    elif command -v toybox >/dev/null 2>&1 && toybox nohup --help >/dev/null 2>&1 && toybox setsid --help >/dev/null 2>&1; then
        MODDIR="${MODDIR:-}" toybox nohup toybox setsid "$@" </dev/null >>"$_log_file" 2>&1 &
    elif command -v nohup >/dev/null 2>&1; then
        MODDIR="${MODDIR:-}" nohup "$@" </dev/null >>"$_log_file" 2>&1 &
    else
        ( trap '' HUP; exec "$@" ) </dev/null >>"$_log_file" 2>&1 &
    fi
    _pid=$!
    case "$_pid" in ''|*[!0-9]*) return 1 ;; esac
    printf '%s\n' "$_pid" >"$_pid_file" 2>/dev/null || return 1
    printf '%s\n' "$_task" >"${_pid_file}.task" 2>/dev/null || true
    chmod 0644 "$_pid_file" "${_pid_file}.task" 2>/dev/null || true
    return 0
}
'''
          Path('common/background_task.sh').write_text(helper, encoding='utf-8')

          p = Path('common/v143_auto_multiweight_mix.sh')
          s = p.read_text(encoding='utf-8')
          s = s.replace('[ -f "$MODE_HELPER" ] && . "$MODE_HELPER"\n', '[ -f "$MODE_HELPER" ] && . "$MODE_HELPER"\n[ -f "$MODDIR/common/background_task.sh" ] && . "$MODDIR/common/background_task.sh"\n')
          s = s.replace('worker() {\n    _wanted="$1"\n', 'worker() {\n    trap \'\' HUP\n    _wanted="$1"\n')
          s = s.replace('    _family=LuoShuAutoMix\n    mkdir -p', '''    _family=LuoShuAutoMix
    precheck_mix "$_cjk" "$_latin" "$_digit"
    _precheck=$?
    case "$_precheck" in
        1) update_task "$_wanted" failed '请选择中文、英文和数字字体' 100 "$(date +%s)"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1 ;;
        2) update_task "$_wanted" failed '中文基底缺少必要字形' 100 "$(date +%s)"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1 ;;
        3) update_task "$_wanted" failed '英文字体缺少必要字形' 100 "$(date +%s)"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1 ;;
        4) update_task "$_wanted" failed '数字字体缺少必要字形' 100 "$(date +%s)"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1 ;;
    esac
    mkdir -p''')
          old_pre = '''    precheck_mix "$_cjk" "$_latin" "$_digit"
    _precheck=$?
    case "$_precheck" in
        1) printf '{"status":"error","message":"请选择中文、英文和数字字体"}\\n'; return ;;
        2) printf '{"status":"error","message":"中文基底缺少必要字形"}\\n'; return ;;
        3) printf '{"status":"error","message":"英文字体缺少必要字形"}\\n'; return ;;
        4) printf '{"status":"error","message":"数字字体缺少必要字形"}\\n'; return ;;
    esac

'''
          if old_pre not in s: raise SystemExit('v143 sync precheck block not found')
          s = s.replace(old_pre, '')
          old_launch = '''    ( MODDIR="$MODDIR" sh "$0" worker "$_task" ) </dev/null >>"$LOG_FILE" 2>&1 &
    printf '%s\\n' "$!" >"$WORKER_PID" 2>/dev/null || true
'''
          new_launch = '''    if type luoshu_start_detached >/dev/null 2>&1; then
        luoshu_start_detached "$WORKER_PID" "$_task" "$LOG_FILE" sh "$0" worker "$_task" || {
            update_task "$_task" failed '无法启动独立后台任务' 100 "$(date +%s)"
            printf '{"status":"error","message":"无法启动独立后台任务"}\\n'
            return
        }
    else
        ( trap '' HUP; MODDIR="$MODDIR" sh "$0" worker "$_task" ) </dev/null >>"$LOG_FILE" 2>&1 &
        printf '%s\\n' "$!" >"$WORKER_PID" 2>/dev/null || true
    fi
'''
          if old_launch not in s: raise SystemExit('v143 launch block not found')
          s = s.replace(old_launch, new_launch)
          s = s.replace('rm -f "$WORKER_PID"; exit 1', 'luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1')
          s = s.replace('rm -f "$WORKER_PID" 2>/dev/null || true\n}', 'luoshu_clear_task_pid "$WORKER_PID" "$_wanted"\n}', 1)
          s = s.replace('''    if [ -s "$WORKER_PID" ]; then
        _old=$(cat "$WORKER_PID" 2>/dev/null)
        [ -z "$_old" ] || ! kill -0 "$_old" 2>/dev/null || {
            printf '{"status":"error","message":"已有自动多字重任务正在运行"}\\n'
            return
        }
    fi
''', '''    if type luoshu_task_pid_alive >/dev/null 2>&1 && luoshu_task_pid_alive "$WORKER_PID"; then
        printf '{"status":"error","message":"已有自动多字重任务正在运行"}\\n'
        return
    fi
    type luoshu_clear_task_pid >/dev/null 2>&1 && luoshu_clear_task_pid "$WORKER_PID"
''')
          s = s.replace('''    if [ -s "$WORKER_PID" ]; then
        _pid=$(cat "$WORKER_PID" 2>/dev/null)
        [ -z "$_pid" ] || ! kill -0 "$_pid" 2>/dev/null || kill "$_pid" 2>/dev/null || true
    fi
    rm -f "$WORKER_PID" 2>/dev/null || true
''', '''    if type luoshu_stop_task_pid >/dev/null 2>&1; then luoshu_stop_task_pid "$WORKER_PID"
    else rm -f "$WORKER_PID" 2>/dev/null || true
    fi
''')
          p.write_text(s, encoding='utf-8')

          p = Path('common/v142_weighted_mix.sh')
          s = p.read_text(encoding='utf-8')
          s = s.replace('LOG_FILE="$MODDIR/logs/fontswitch.log"\n', 'LOG_FILE="$MODDIR/logs/fontswitch.log"\nROLE_CHECK="$MODDIR/common/font_role_check.sh"\n')
          s = s.replace('[ -f "$MODDIR/common/font_check.sh" ] && . "$MODDIR/common/font_check.sh"\n', '[ -f "$MODDIR/common/font_check.sh" ] && . "$MODDIR/common/font_check.sh"\n[ -f "$MODDIR/common/background_task.sh" ] && . "$MODDIR/common/background_task.sh"\n')
          s = s.replace('worker() {\n    _wanted="$1"\n', 'worker() {\n    trap \'\' HUP\n    _wanted="$1"\n')
          s = s.replace('''    _root=$(read_value "$TASK_FILE" root)

    update_task''', '''    _root=$(read_value "$TASK_FILE" root)

    if [ -f "$ROLE_CHECK" ]; then
        MODDIR="$MODDIR" sh "$ROLE_CHECK" "$_cjk" cjk >/dev/null 2>&1 || { update_task "$_wanted" failed '中文基底缺少必要字形' 100 '' "$(date +%s)"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1; }
        MODDIR="$MODDIR" sh "$ROLE_CHECK" "$_latin" latin >/dev/null 2>&1 || { update_task "$_wanted" failed '英文字体缺少必要字形' 100 '' "$(date +%s)"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1; }
        MODDIR="$MODDIR" sh "$ROLE_CHECK" "$_digit" digit >/dev/null 2>&1 || { update_task "$_wanted" failed '数字字体缺少必要字形' 100 '' "$(date +%s)"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1; }
    fi

    update_task''')
          old = '''    ( MODDIR="$MODDIR" sh "$0" worker "$_request" ) </dev/null >>"$LOG_FILE" 2>&1 &
    _pid=$!
    printf '%s\\n' "$_pid" >"$WORKER_PID" 2>/dev/null || true
'''
          new = '''    if type luoshu_start_detached >/dev/null 2>&1; then
        luoshu_start_detached "$WORKER_PID" "$_request" "$LOG_FILE" sh "$0" worker "$_request" || {
            update_task "$_request" failed '无法启动独立后台任务' 100 '' "$(date +%s)"
            printf '{"status":"error","message":"无法启动独立后台任务"}\\n'
            return
        }
    else
        ( trap '' HUP; MODDIR="$MODDIR" sh "$0" worker "$_request" ) </dev/null >>"$LOG_FILE" 2>&1 &
        printf '%s\\n' "$!" >"$WORKER_PID" 2>/dev/null || true
    fi
'''
          if old not in s: raise SystemExit('v142 launch block not found')
          s = s.replace(old, new)
          s = s.replace('rm -f "$WORKER_PID"; exit 1', 'luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 1')
          s = s.replace('rm -rf "$_root"; rm -f "$WORKER_PID"; exit 0', 'rm -rf "$_root"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"; exit 0')
          s = s.replace('rm -rf "$_root"; rm -f "$WORKER_PID"\n', 'rm -rf "$_root"; luoshu_clear_task_pid "$WORKER_PID" "$_wanted"\n')
          s = s.replace('''    if [ -s "$WORKER_PID" ]; then
        _old=$(cat "$WORKER_PID" 2>/dev/null)
        [ -z "$_old" ] || ! kill -0 "$_old" 2>/dev/null || {
            printf '{"status":"error","message":"已有字体组合任务正在运行"}\\n'; return
        }
    fi
''', '''    if type luoshu_task_pid_alive >/dev/null 2>&1 && luoshu_task_pid_alive "$WORKER_PID"; then
        printf '{"status":"error","message":"已有字体组合任务正在运行"}\\n'; return
    fi
    type luoshu_clear_task_pid >/dev/null 2>&1 && luoshu_clear_task_pid "$WORKER_PID"
''')
          p.write_text(s, encoding='utf-8')

          p = Path('common/font_mix.sh')
          s = p.read_text(encoding='utf-8')
          s = s.replace('[ -f "$MODDIR/common/mount_compat.sh" ] && . "$MODDIR/common/mount_compat.sh"\n', '[ -f "$MODDIR/common/mount_compat.sh" ] && . "$MODDIR/common/mount_compat.sh"\n[ -f "$MODDIR/common/background_task.sh" ] && . "$MODDIR/common/background_task.sh"\n')
          marker = 'status_json() {'
          worker_fn = r'''mix_worker() {
    trap '' HUP
    _task="$1"; _cjk="$2"; _latin="$3"; _digit="$4"; _started="$5"
    echo "[$(date '+%Y-%m-%d %H:%M:%S')] mix start: cjk=$_cjk latin=$_latin digit=$_digit task=$_task"
    if MODDIR="$MODDIR" apply_mix "$_cjk" "$_latin" "$_digit"; then
        _finished=$(date +%s)
        _message='完整复合字体已准备，完整重启后生效'
        [ "$COMPOSITE_CACHE_HIT" = true ] && _message='已使用验证缓存准备字体组合，完整重启后生效'
        write_task "$_task" success "$_message" "$_cjk" "$_latin" "$_digit" "$_started" "$_finished"
        command -v cmd >/dev/null 2>&1 && cmd notification post -t 洛书 luoshu-mix "字体组合已准备，请完整重启手机。" >/dev/null 2>&1 || true
    else
        _rc=$?; _finished=$(date +%s)
        _failure="${LAST_MIX_ERROR:-}"
        [ -n "$_failure" ] || _failure=$(tail -n1 "$CONFIG_DIR/mix_last_error.txt" 2>/dev/null | tr -d '\r')
        [ -n "$_failure" ] || _failure="字体组合失败（阶段代码 $_rc）"
        write_task "$_task" failed "$_failure" "$_cjk" "$_latin" "$_digit" "$_started" "$_finished"
    fi
    if type luoshu_clear_task_pid >/dev/null 2>&1; then luoshu_clear_task_pid "$CONFIG_DIR/mix_worker.pid" "$_task"
    else rm -f "$CONFIG_DIR/mix_worker.pid" 2>/dev/null || true
    fi
}

'''
          if marker not in s: raise SystemExit('font_mix status marker not found')
          s = s.replace(marker, worker_fn + marker, 1)
          start = s.index('        (\n            echo "[$(date')
          end = s.index('        printf \'{"status":"ok","data":{"task":"%s"}}\\n\'', start)
          old_block = s[start:end]
          new_block = '''        if type luoshu_start_detached >/dev/null 2>&1; then
            luoshu_start_detached "$CONFIG_DIR/mix_worker.pid" "$_task" "$LOG_FILE" sh "$0" worker "$_task" "$_cjk" "$_latin" "$_digit" "$_started" || {
                write_task "$_task" failed '无法启动独立后台任务' "$_cjk" "$_latin" "$_digit" "$_started" "$(date +%s)"
                printf '{"status":"error","message":"无法启动独立后台任务"}\\n'
                exit 0
            }
        else
            ( trap '' HUP; MODDIR="$MODDIR" sh "$0" worker "$_task" "$_cjk" "$_latin" "$_digit" "$_started" ) </dev/null >>"$LOG_FILE" 2>&1 &
            printf '%s\\n' "$!" >"$CONFIG_DIR/mix_worker.pid" 2>/dev/null || true
        fi
'''
          s = s[:start] + new_block + s[end:]
          s = s.replace('''    status) status_json ;;
    recover)''', '''    worker) mix_worker "$2" "$3" "$4" "$5" "$6" ;;
    status) status_json ;;
    recover)''')
          p.write_text(s, encoding='utf-8')

          p = Path('common/v14_mix.sh')
          s = p.read_text(encoding='utf-8')
          s = s.replace('''        start)
            precheck_mix "$2" "$3" "$4" || exit 0
            _cjk_mode=fixed
''', '''        start)
            _cjk_mode=fixed
''')
          p.write_text(s, encoding='utf-8')

          p = Path('common/font_role_check.sh')
          s = p.read_text(encoding='utf-8')
          s = s.replace('CHECKER="$MODDIR/common/font_role_check.py"\n', 'CHECKER="$MODDIR/common/font_role_check.py"\nROLE_CACHE="$MODDIR/cache/font-role-v1"\n')
          old = '''        _last=$(PYTHONHOME="$PYROOT" \\
            PYTHONPATH="$PYROOT/lib/python3.14:$PYROOT/lib/python3.14/site-packages" \\
            LD_LIBRARY_PATH="$PYROOT/lib:$PYROOT/lib/python3.14/lib-dynload${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \\
            "$PYBIN" "$CHECKER" "$_font" "$_role" 2>/dev/null)
        [ "$?" -eq 0 ] && { printf '%s\\n' "$_last"; return 0; }
'''
          new = '''        _stat=$(stat -c '%d:%i:%s:%Y:%Z' "$_font" 2>/dev/null)
        [ -n "$_stat" ] || _stat=$(stat -c '%s:%Y' "$_font" 2>/dev/null)
        _key=$(printf '%s|%s|%s' "$_font" "$_stat" "$_role" | { if command -v sha256sum >/dev/null 2>&1; then sha256sum; elif command -v toybox >/dev/null 2>&1; then toybox sha256sum; else cksum; fi; } | awk '{print $1}')
        mkdir -p "$ROLE_CACHE" 2>/dev/null || true
        _cached="$ROLE_CACHE/${_key}.ok"
        if [ -s "$_cached" ]; then cat "$_cached"; return 0; fi
        _last=$(PYTHONHOME="$PYROOT" \\
            PYTHONPATH="$PYROOT/lib/python3.14:$PYROOT/lib/python3.14/site-packages" \\
            LD_LIBRARY_PATH="$PYROOT/lib:$PYROOT/lib/python3.14/lib-dynload${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \\
            "$PYBIN" "$CHECKER" "$_font" "$_role" 2>/dev/null)
        if [ "$?" -eq 0 ]; then
            printf '%s\\n' "$_last" >"$_cached" 2>/dev/null || true
            chmod 0644 "$_cached" 2>/dev/null || true
            printf '%s\\n' "$_last"
            return 0
        fi
'''
          if old not in s: raise SystemExit('role check block not found')
          s = s.replace(old, new)
          p.write_text(s, encoding='utf-8')

          test = r'''#!/bin/sh
set -eu
ROOT=$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)
TMP=$(mktemp -d)
trap 'rm -rf "$TMP"' EXIT HUP INT TERM
mkdir -p "$TMP/module/common" "$TMP/module/config" "$TMP/module/logs"
cp "$ROOT/common/background_task.sh" "$TMP/module/common/background_task.sh"
cat >"$TMP/module/common/dummy_worker.sh" <<'EOS'
#!/bin/sh
trap '' HUP
[ "$1" = worker ]
printf 'started\n' >"$DUMMY_STATE"
sleep 2
printf 'finished\n' >"$DUMMY_STATE"
EOS
chmod 0755 "$TMP/module/common/dummy_worker.sh"
(
  MODDIR="$TMP/module"
  DUMMY_STATE="$TMP/state"; export DUMMY_STATE
  . "$TMP/module/common/background_task.sh"
  luoshu_start_detached "$TMP/module/config/dummy.pid" dummy-task "$TMP/module/logs/dummy.log" sh "$TMP/module/common/dummy_worker.sh" worker dummy-task
)
for _n in 1 2 3 4 5; do [ "$(cat "$TMP/state" 2>/dev/null)" = finished ] && break; sleep 1; done
[ "$(cat "$TMP/state" 2>/dev/null)" = finished ]
grep -q 'nohup setsid\|toybox nohup toybox setsid' "$ROOT/common/background_task.sh"
grep -q 'luoshu_start_detached.*worker' "$ROOT/common/v142_weighted_mix.sh"
grep -q 'luoshu_start_detached.*worker' "$ROOT/common/v143_auto_multiweight_mix.sh"
grep -q 'luoshu_start_detached.*worker' "$ROOT/common/font_mix.sh"
! sed -n '/if \[ -f "$WEIGHTED" \]/,/^fi$/p' "$ROOT/common/v14_mix.sh" | grep -q 'precheck_mix "$2" "$3" "$4"'
echo 'Detached root font workers survive their submitting shell.'
'''
          Path('scripts/background_mix_worker_test.sh').write_text(test, encoding='utf-8')

          p = Path('scripts/check.sh')
          s = p.read_text(encoding='utf-8')
          needle = 'sh "$ROOT/scripts/auto_multiweight_engine_test.sh"\n'
          if needle not in s: raise SystemExit('check insertion point not found')
          s = s.replace(needle, needle + 'sh "$ROOT/scripts/background_mix_worker_test.sh"\n')
          p.write_text(s, encoding='utf-8')
          PY
          chmod 0755 common/background_task.sh scripts/background_mix_worker_test.sh
      - name: Validate detached worker patch
        shell: bash
        run: |
          sh -n common/background_task.sh
          sh -n common/v142_weighted_mix.sh
          sh -n common/v143_auto_multiweight_mix.sh
          sh -n common/font_mix.sh
          sh -n common/font_role_check.sh
          sh scripts/background_mix_worker_test.sh
          sh scripts/auto_multiweight_engine_test.sh
      - name: Commit patch
        shell: bash
        run: |
          rm -f .github/workflows/apply-detached-mix-worker.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: keep font synthesis running after app exit"
          git push origin HEAD:fix/background-mix-worker
