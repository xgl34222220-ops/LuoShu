name: Commit switch performance stage one

on:
  push:
    branches:
      - fix/v2.2.1-switch-timeout-status
    paths:
      - .github/workflows/apply-switch-performance-stage1-commit.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v2.2.1-switch-timeout-status
          fetch-depth: 0

      - name: Extract and run reviewed patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-switch-performance-stage1.yml').read_text().splitlines()
          collecting = False
          lines = []
          for line in source:
              stripped = line.strip()
              if not collecting and stripped.startswith("python3 - <<'PY'"):
                  collecting = True
                  continue
              if collecting and stripped == 'PY':
                  break
              if collecting:
                  lines.append(line[10:] if line.startswith('          ') else line)
          if not lines:
              raise SystemExit('embedded stage-one patch was not found')
          Path('/tmp/stage1.py').write_text('\n'.join(lines) + '\n')
          PY
          python3 /tmp/stage1.py
          chmod 0755 scripts/font_switch_performance_test.sh
          sh -n common/rom_adapters.sh
          sh -n common/font_safety.sh
          sh -n common/font_switch_task.sh
          sh -n common/font_manager.sh
          sh scripts/font_switch_performance_test.sh
          sh scripts/font_switch_task_test.sh

      - name: Commit performance changes
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f docs/switch-performance-stage1-error.log
          git add common/rom_adapters.sh common/font_safety.sh common/font_switch_task.sh common/font_manager.sh \
            scripts/font_switch_performance_test.sh scripts/check.sh
          git add -u docs/switch-performance-stage1-error.log 2>/dev/null || true
          git commit -m 'perf: remove repeated full-font reads from switch path'
          git push origin HEAD:fix/v2.2.1-switch-timeout-status
