name: Android build diagnostic
on:
  pull_request:
    branches:
      - main
    paths:
      - android-app/**
      - module.prop
      - .github/workflows/android-build-diagnostic.yml
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Run App unit tests
        id: gradle
        working-directory: android-app
        shell: bash
        run: |
          set +e
          log="$RUNNER_TEMP/luoshu-android-diagnostic.log"
          gradle --no-daemon --stacktrace :app:testDebugUnitTest >"$log" 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"
      - name: Post failed test details to PR
        if: failure() && steps.gradle.outputs.code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          report="$RUNNER_TEMP/gradle-comment.md"
          python3 - <<'PY' > "$RUNNER_TEMP/test-failures.txt"
          import glob
          import os
          import xml.etree.ElementTree as ET

          paths = glob.glob('android-app/app/build/test-results/testDebugUnitTest/*.xml')
          count = 0
          for path in sorted(paths):
              try:
                  root = ET.parse(path).getroot()
              except Exception as exc:
                  print(f'无法解析 {path}: {exc}')
                  continue
              for case in root.iter('testcase'):
                  problems = list(case.findall('failure')) + list(case.findall('error'))
                  for problem in problems:
                      count += 1
                      cls = case.attrib.get('classname', '')
                      name = case.attrib.get('name', '')
                      message = problem.attrib.get('message', '')
                      body = (problem.text or '').strip()
                      print(f'[{count}] {cls}.{name}')
                      if message:
                          print(message)
                      if body:
                          print('\n'.join(body.splitlines()[:30]))
                      print()
                      if count >= 20:
                          raise SystemExit
          if count == 0:
              print('没有找到可解析的失败测试 XML。')
          PY
          {
            echo '### Android 单元测试失败诊断'
            echo
            echo '```text'
            cat "$RUNNER_TEMP/test-failures.txt"
            echo
            echo 'Gradle 输出末尾：'
            tail -n 60 "$RUNNER_TEMP/luoshu-android-diagnostic.log"
            echo '```'
          } > "$report"
          gh pr comment "$PR_NUMBER" --body-file "$report"
