name: Export source once

on:
  push:
    branches:
      - agent/font-baseline-consistency-v2
    paths:
      - .github/workflows/export-source-once.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Pack repository source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=android-app/.gradle --exclude=android-app/app/build -czf /tmp/luoshu-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: luoshu-source-${{ github.run_id }}
          path: /tmp/luoshu-source.tar.gz
          retention-days: 1
