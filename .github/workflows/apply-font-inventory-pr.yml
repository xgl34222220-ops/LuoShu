name: Apply font inventory source
on:
  pull_request:
    branches:
      - main
    paths:
      - .font-inventory-implementation.tar.gz
      - .github/workflows/apply-font-inventory-pr.yml
permissions:
  contents: write
jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply runtime and tests
        shell: bash
        run: |
          set -euo pipefail
          test -s .font-inventory-implementation.tar.gz
          tar -xzf .font-inventory-implementation.tar.gz -C . \
            --exclude='.github/workflows/font-inventory-tests.yml'
          rm -f .font-inventory-implementation.tar.gz
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git diff --cached --quiet && exit 0
          git commit -m 'refactor: discover device font inventory before overlay'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
