name: Apply font inventory source
on:
  pull_request:
    branches:
      - main
    paths:
      - .font-inventory-implementation.tar.gz
      - .github/workflows/apply-font-inventory-pr.yml
permissions:
  contents: write
jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Export source archive for diagnosis
        uses: actions/upload-artifact@v4
        with:
          name: font-inventory-source-archive
          path: .font-inventory-implementation.tar.gz
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 2
      - name: Verify source archive
        run: |
          test -s .font-inventory-implementation.tar.gz
          echo '28b487b9ad4863b855e621a58cbea7346e410e59eae1ef63f30071b875bff86c  .font-inventory-implementation.tar.gz' | sha256sum -c -
          gzip -t .font-inventory-implementation.tar.gz
          tar -tzf .font-inventory-implementation.tar.gz >/tmp/font-inventory-files.txt
          grep -qx 'common/font_inventory.py' /tmp/font-inventory-files.txt
          grep -qx 'scripts/font_inventory_test.py' /tmp/font-inventory-files.txt
      - name: Extract runtime and tests
        run: |
          tar --exclude='.github/workflows/font-inventory-tests.yml' \
            -xzf .font-inventory-implementation.tar.gz -C .
          rm -f .font-inventory-implementation.tar.gz
      - name: Validate source diff
        run: |
          git add -A
          git diff --cached --stat
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
      - name: Commit source changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'refactor: discover device font inventory before overlay'
      - name: Push source changes
        run: git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
