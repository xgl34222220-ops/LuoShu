name: Materialize final v14.1 source
on:
  push:
    branches: [release/v14.1]
    paths:
      - scripts/materialize_part*.py
      - .github/workflows/materialize-v141-final.yml
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: materialize-v141-final
  cancel-in-progress: true
jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v14.1
          fetch-depth: 0
      - name: Apply audited source files
        shell: bash
        run: |
          set -euo pipefail
          for file in scripts/materialize_part1.py scripts/materialize_part2.py scripts/materialize_part3.py scripts/materialize_part4.py; do
            python3 "$file"
          done
          chmod 0755 customize.sh post-fs-data.sh service.sh uninstall.sh common/*.sh common/*.py scripts/*.sh
          rm -f scripts/materialize_part*.py .github/workflows/materialize-v141-final.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'release: materialize audited LuoShu v14.1 source'
          git push origin HEAD:release/v14.1
