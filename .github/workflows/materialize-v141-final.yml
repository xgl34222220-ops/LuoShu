name: Materialize final v14.1 source
on:
  push:
    branches: [release/v14.1]
    paths:
      - scripts/materialize_part*.py
      - .github/workflows/materialize-v141-final.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/materialize_part*.py
      - .github/workflows/materialize-v141-final.yml
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: materialize-v141-final
  cancel-in-progress: true
jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v14.1
          fetch-depth: 0
      - name: Apply audited source files
        shell: bash
        run: |
          set -u
          rm -f materialize-final-result.txt
          python3 - <<'PY'
          from pathlib import Path
          for path in sorted(Path('scripts').glob('materialize_part*.py')):
              text=path.read_text(encoding='utf-8')
              text=text.replace('gzip.decompress(base64.b64decode(enc))', "gzip.decompress(base64.b64decode(enc + '=' * (-len(enc) % 4)))")
              path.write_text(text, encoding='utf-8')
          PY
          result=success
          for file in scripts/materialize_part1.py scripts/materialize_part2.py scripts/materialize_part3.py scripts/materialize_part4.py; do
            echo "== $file ==" >> materialize-final-result.txt
            if ! python3 "$file" >> materialize-final-result.txt 2>&1; then
              result=failed
              break
            fi
          done
          if [ "$result" = success ]; then
            chmod 0755 customize.sh post-fs-data.sh service.sh uninstall.sh common/*.sh common/*.py scripts/*.sh
            rm -f scripts/materialize_part*.py .github/workflows/materialize-v141-final.yml materialize-final-result.txt
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if ! git diff --cached --quiet; then
            git commit -m 'release: materialize audited LuoShu v14.1 source'
            git push origin HEAD:release/v14.1
          fi
          test "$result" = success
