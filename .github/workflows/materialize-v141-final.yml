name: Materialize final v14.1 source
on:
  push:
    branches: [release/v14.1]
    paths:
      - scripts/materialize_*.py
      - .github/workflows/materialize-v141-final.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/materialize_*.py
      - .github/workflows/materialize-v141-final.yml
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: materialize-v141-final
  cancel-in-progress: true
jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v14.1
          fetch-depth: 0
      - name: Apply audited source files
        shell: bash
        run: |
          set -u
          rm -f materialize-final-result.txt
          result=success
          for file in \
            scripts/materialize_part1.py \
            scripts/materialize_font_mix.py \
            scripts/materialize_composite_py.py \
            scripts/materialize_composite_sh.py \
            scripts/materialize_v14_js.py \
            scripts/materialize_index.py \
            scripts/materialize_part4.py; do
            echo "== $file ==" >> materialize-final-result.txt
            if ! python3 "$file" >> materialize-final-result.txt 2>&1; then
              result=failed
              break
            fi
          done
          if [ "$result" = success ]; then
            chmod 0755 customize.sh post-fs-data.sh service.sh uninstall.sh common/*.sh common/*.py scripts/*.sh
            rm -f scripts/materialize_*.py .github/workflows/materialize-v141-final.yml materialize-final-result.txt
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if ! git diff --cached --quiet; then
            git commit -m 'release: materialize audited LuoShu v14.1 source'
            git push origin HEAD:release/v14.1
          fi
          test "$result" = success
