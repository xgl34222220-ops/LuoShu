name: Finalize no-hook runtime integration

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/no-hook-runtime-integration.yml

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'refactor/v14.5-no-hook-font-engine'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/v14.5-no-hook-font-engine
          fetch-depth: 0

      - name: Connect default restore and correct rollback test
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          manager = Path('common/font_manager.sh')
          text = manager.read_text(encoding='utf-8')
          source_anchor = '[ -f "$MODULE_DIR/common/font_library_cache.sh" ] && . "$MODULE_DIR/common/font_library_cache.sh"\n'
          source_insert = (
              source_anchor
              + '[ -f "$MODULE_DIR/common/font_config_runtime.sh" ] && . "$MODULE_DIR/common/font_config_runtime.sh"\n'
              + '[ -f "$MODULE_DIR/common/font_config_weights.sh" ] && . "$MODULE_DIR/common/font_config_weights.sh"\n'
          )
          if 'common/font_config_runtime.sh' not in text:
              if source_anchor not in text:
                  raise SystemExit('font manager source anchor missing')
              text = text.replace(source_anchor, source_insert, 1)

          clear_anchor = '    rm -rf "$SYSTEM_FONTS_DIR/.luoshu-font-store" 2>/dev/null || true\n}\n'
          clear_insert = (
              '    rm -rf "$SYSTEM_FONTS_DIR/.luoshu-font-store" 2>/dev/null || true\n'
              '    type font_config_disable >/dev/null 2>&1 && font_config_disable\n'
              '}\n'
          )
          if 'type font_config_disable >/dev/null 2>&1 && font_config_disable' not in text:
              if clear_anchor not in text:
                  raise SystemExit('font manager clear anchor missing')
              text = text.replace(clear_anchor, clear_insert, 1)
          manager.write_text(text, encoding='utf-8')

          test = Path('scripts/font_config_runtime_test.sh')
          source = test.read_text(encoding='utf-8')
          old = "# A missing or truncated referenced font must disable every generated XML before boot.\n: > \"$MOD/product/fonts/LuoShu-500.ttf\"\n"
          new = "# A missing partition alias must disable every generated XML before boot.\nrm -f \"$MOD/product/fonts/LuoShu-500.ttf\"\n"
          if old not in source:
              raise SystemExit('runtime test corruption anchor missing')
          test.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

          sh -n common/font_manager.sh
          sh -n common/font_config_runtime.sh
          python3 scripts/font_config_overlay_test.py
          sh scripts/font_config_runtime_test.sh
          rm -f .github/workflows/no-hook-runtime-integration.yml

      - name: Commit verified integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(font): make no-Hook rollback and default restore transactional'
          git push origin HEAD:refactor/v14.5-no-hook-font-engine
