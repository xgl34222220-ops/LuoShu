name: Integrate no-hook runtime

on:
  push:
    branches:
      - refactor/v14.5-no-hook-font-engine
    paths:
      - .github/workflows/no-hook-runtime-integration.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/v14.5-no-hook-font-engine
          fetch-depth: 0

      - name: Patch runtime integration and tests
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"missing patch anchor in {path}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "common/font_manager.sh",
              '[ -f "$MODULE_DIR/common/font_library_cache.sh" ] && . "$MODULE_DIR/common/font_library_cache.sh"\n',
              '[ -f "$MODULE_DIR/common/font_library_cache.sh" ] && . "$MODULE_DIR/common/font_library_cache.sh"\n'
              '[ -f "$MODULE_DIR/common/font_config_runtime.sh" ] && . "$MODULE_DIR/common/font_config_runtime.sh"\n',
          )
          replace_once(
              "common/font_manager.sh",
              '    rm -rf "$SYSTEM_FONTS_DIR/.luoshu-font-store" 2>/dev/null || true\n}\n',
              '    rm -rf "$SYSTEM_FONTS_DIR/.luoshu-font-store" 2>/dev/null || true\n'
              '    type font_config_disable >/dev/null 2>&1 && font_config_disable\n'
              '}\n',
          )
          replace_once(
              "common/font_config_runtime.sh",
              '        if [ -f "$_lfc_overlay" ] && grep -q \'LuoShu-[1-9][0-9][0-9]\\.ttf\' "$_lfc_overlay" 2>/dev/null; then\n',
              '        if [ -f "$_lfc_overlay" ] && { [ -f "$_lfc_state" ] || grep -q \'LuoShu-[1-9][0-9][0-9]\\.ttf\' "$_lfc_overlay" 2>/dev/null; }; then\n',
          )

          check = Path("scripts/check.sh")
          text = check.read_text(encoding="utf-8")
          text = text.replace(
              '  "$ROOT/common/font_import_probe.py"\n',
              '  "$ROOT/common/font_import_probe.py" \\\n  "$ROOT/common/font_config_overlay.py"\n',
              1,
          )
          text = text.replace(
              '  common/font_role_check.py common/font_metadata.py common/font_extract_faces.py common/font_import_probe.py \\\n',
              '  common/font_role_check.py common/font_metadata.py common/font_extract_faces.py common/font_import_probe.py \\\n'
              '  common/font_config_overlay.py common/font_config_runtime.sh \\\n',
              1,
          )
          text = text.replace(
              '  scripts/font_library_cache_test.sh scripts/app_installer_test.sh scripts/hyperos_global_mapping_test.sh \\\n',
              '  scripts/font_library_cache_test.sh scripts/app_installer_test.sh scripts/hyperos_global_mapping_test.sh \\\n'
              '  scripts/font_config_overlay_test.py scripts/font_config_runtime_test.sh \\\n',
              1,
          )
          text = text.replace(
              '# 禁止重新引入高风险热刷新和系统字体 XML 覆盖。\n',
              '# 禁止高风险热刷新和静态打包字体 XML；设备 XML 只能在切换时事务生成。\n',
              1,
          )
          anchor = '! find "$ROOT/system/etc" -type f \\( -name fonts.xml -o -name font_fallback.xml \\) -print -quit 2>/dev/null | grep -q .\n'
          gates = (
              anchor
              + "grep -q 'font_config_runtime.sh' \"$ROOT/common/font_manager.sh\"\n"
              + "grep -q 'font_config_disable' \"$ROOT/common/font_manager.sh\"\n"
              + "grep -q 'font_config_boot_guard' \"$ROOT/post-fs-data.sh\"\n"
              + "grep -q 'font_config_generate' \"$ROOT/common/hyperos_global.sh\"\n"
              + "grep -q 'PROTECTED_TOKENS' \"$ROOT/common/font_config_overlay.py\"\n"
          )
          if anchor not in text:
              raise SystemExit("missing static XML gate")
          text = text.replace(anchor, gates, 1)
          text = text.replace(
              'sh "$ROOT/scripts/hyperos_global_mapping_test.sh"\n',
              'sh "$ROOT/scripts/hyperos_global_mapping_test.sh"\n'
              'python3 "$ROOT/scripts/font_config_overlay_test.py"\n'
              'sh "$ROOT/scripts/font_config_runtime_test.sh"\n',
              1,
          )
          check.write_text(text, encoding="utf-8")

          test = Path("scripts/font_config_overlay_test.py")
          source = test.read_text(encoding="utf-8")
          source = source.replace(
              '    <font weight="450" style="normal">SysFont-Regular.ttf</font>\n',
              '    <font weight="450" style="normal">SysFont-Regular.ttf</font>\n'
              '    <font weight="400" style="italic">SysFont-Italic.ttf</font>\n',
              1,
          )
          source = source.replace(
              '        assert child_text(sans) == ["LuoShu-100.ttf", "LuoShu-400.ttf"]\n',
              '        assert child_text(sans) == ["LuoShu-100.ttf", "LuoShu-400.ttf", "SysFont-Italic.ttf"]\n',
              1,
          )
          source = source.replace(
              'from font_config_overlay import parse_xml, rewrite_tree\n',
              'from font_config_overlay import parse_xml, rewrite_tree, validate_generated_references\n',
              1,
          )
          source = source.replace(
              '        alias = next(element for element in root if element.tag == "alias")\n',
              '        fonts = Path(directory) / "fonts"\n'
              '        fonts.mkdir()\n'
              '        for weight in (100, 200, 300, 400, 500, 600, 700, 800, 900):\n'
              '            (fonts / f"LuoShu-{weight}.ttf").write_bytes(b"F" * 2048)\n'
              '        assert validate_generated_references(tree, "LuoShu", fonts) == 2\n\n'
              '        alias = next(element for element in root if element.tag == "alias")\n',
              1,
          )
          test.write_text(source, encoding="utf-8")
          PY

          cat > scripts/font_config_runtime_test.sh <<'SH'
          #!/bin/sh
          set -eu
          ROOT=$(mktemp -d)
          trap 'rm -rf "$ROOT"' EXIT HUP INT TERM
          REPO_ROOT=$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)
          MODULE_DIR="$ROOT/module"
          MODDIR="$MODULE_DIR"
          CONFIG_DIR="$MODULE_DIR/config"
          SYSTEM_FONTS_DIR="$MODULE_DIR/system/fonts"
          LUOSHU_SYSTEM_ETC_ROOT="$ROOT/real/system/etc"
          LUOSHU_PYTHON=python3
          export MODULE_DIR MODDIR CONFIG_DIR SYSTEM_FONTS_DIR LUOSHU_SYSTEM_ETC_ROOT LUOSHU_PYTHON

          mkdir -p "$MODULE_DIR/common" "$SYSTEM_FONTS_DIR" "$LUOSHU_SYSTEM_ETC_ROOT"
          cp "$REPO_ROOT/common/font_config_overlay.py" "$MODULE_DIR/common/font_config_overlay.py"
          cp "$REPO_ROOT/common/font_config_runtime.sh" "$MODULE_DIR/common/font_config_runtime.sh"
          cat > "$LUOSHU_SYSTEM_ETC_ROOT/fonts.xml" <<'XML'
          <familyset version="23">
            <family name="sans-serif">
              <font weight="400" style="normal">Roboto-Regular.ttf</font>
              <font weight="700" style="normal">Roboto-Bold.ttf</font>
            </family>
            <family name="monospace"><font weight="400">DroidSansMono.ttf</font></family>
            <family name="material-icons"><font weight="400">MaterialIcons.ttf</font></family>
          </familyset>
          XML
          cat > "$LUOSHU_SYSTEM_ETC_ROOT/font_fallback.xml" <<'XML'
          <familyset version="23">
            <family name="google-sans"><font weight="400">GoogleSans-Regular.ttf</font></family>
            <family lang="und-Arab"><font weight="400">NotoNaskhArabic-Regular.ttf</font></family>
          </familyset>
          XML
          for weight in 100 200 300 400 500 600 700 800 900; do
            head -c 2048 /dev/zero > "$SYSTEM_FONTS_DIR/LuoShu-${weight}.ttf"
          done

          . "$MODULE_DIR/common/font_config_runtime.sh"
          font_config_capture_original
          font_config_generate Demo
          grep -q 'LuoShu-400.ttf' "$MODULE_DIR/system/etc/fonts.xml"
          grep -q 'LuoShu-400.ttf' "$MODULE_DIR/system/etc/font_fallback.xml"
          grep -q 'Roboto-Regular.ttf' "$CONFIG_DIR/font-config-source/system/etc/fonts.xml"
          ! grep -q 'LuoShu-' "$CONFIG_DIR/font-config-source/system/etc/fonts.xml"

          rm -f "$SYSTEM_FONTS_DIR/LuoShu-700.ttf"
          ! font_config_boot_guard Demo
          ! grep -q 'LuoShu-' "$MODULE_DIR/system/etc/fonts.xml"
          grep -q 'Roboto-Regular.ttf' "$MODULE_DIR/system/etc/fonts.xml"

          font_config_disable
          test ! -e "$MODULE_DIR/system/etc/fonts.xml"
          test ! -e "$MODULE_DIR/system/etc/font_fallback.xml"
          printf 'Font configuration runtime tests passed.\n'
          SH
          chmod +x scripts/font_config_runtime_test.sh

          rm -f .github/workflows/no-hook-runtime-integration.yml

      - name: Run source and runtime tests
        run: sh scripts/check.sh

      - name: Commit verified integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(font): integrate transactional no-Hook runtime'
          git push origin HEAD:refactor/v14.5-no-hook-font-engine
