name: Remove empty import command

on:
  push:
    branches:
      - agent/font-consistency-cleanup
    paths:
      - .github/workflows/fix-empty-import-command.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/font-consistency-cleanup
          fetch-depth: 0

      - name: Remove empty command and validate
        shell: bash
        run: |
          set -euo pipefail
          sed -i '/^[[:space:]]*rm -f[[:space:]]*$/d' common/font_import.sh
          sh -n common/font_import.sh
          ! grep -n '^[[:space:]]*rm -f[[:space:]]*$' common/font_import.sh

      - name: Commit source-only fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add common/font_import.sh
          git diff --cached --check
          git commit -m 'chore: remove empty import cleanup command'
          git push origin HEAD:agent/font-consistency-cleanup
