name: PR font consistency follow-up

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finish:
    if: github.head_ref == 'agent/font-consistency-cleanup' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Finish source hygiene
        shell: bash
        run: |
          set +e
          python scripts/font_consistency_followup.py > /tmp/font-consistency-followup.log 2>&1
          code=$?
          grep -RInE 'WebUI|webui_font_list|v13\.|v14\.|Beta|Hotfix' common \
            --exclude=module_update_state.sh --exclude-dir=python > /tmp/font-consistency-residue.txt 2>&1 || true
          cat /tmp/font-consistency-followup.log
          cat /tmp/font-consistency-residue.txt
          exit "$code"

      - name: Upload follow-up diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: font-consistency-followup-${{ github.run_id }}
          path: |
            /tmp/font-consistency-followup.log
            /tmp/font-consistency-residue.txt
          if-no-files-found: error
          retention-days: 2

      - name: Validate consistency changes
        shell: bash
        run: |
          set -euo pipefail
          find common scripts -type f -name '*.sh' -print0 | xargs -0 -n1 sh -n
          python -m py_compile common/*.py
          sh scripts/coloros_consistency_mapping_test.sh
          sh scripts/font_config_variable_weight_test.sh
          sh scripts/v2_source_audit.sh

      - name: Export validated source changes
        uses: actions/upload-artifact@v4
        with:
          name: font-consistency-patched-sources-${{ github.run_id }}
          path: |
            common/util_functions.sh
            common/font_import.sh
          if-no-files-found: error
          retention-days: 2

      - name: Commit ordinary source changes
        id: commit
        shell: bash
        run: |
          set +e
          {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git reset -- .github/workflows/font-consistency-migration.yml .github/workflows/font-consistency-followup.yml .github/workflows/pr-font-consistency-followup.yml scripts/font_consistency_migration.py scripts/font_consistency_followup.py
            git status --short
            git diff --cached --check
            git commit -m 'fix: finish font consistency source hygiene'
            git push origin HEAD:${{ github.head_ref }}
          } > /tmp/font-consistency-commit.log 2>&1
          code=$?
          cat /tmp/font-consistency-commit.log
          exit "$code"

      - name: Upload commit diagnostics
        if: failure() && steps.commit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: font-consistency-commit-${{ github.run_id }}
          path: /tmp/font-consistency-commit.log
          if-no-files-found: error
          retention-days: 2
