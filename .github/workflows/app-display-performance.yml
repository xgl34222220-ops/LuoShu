name: App display performance tests
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - android-app/app/src/main/java/io/github/xgl34222220/luoshu/MainActivity.kt
      - android-app/app/src/main/java/io/github/xgl34222220/luoshu/DisplayPerformanceController.kt
      - android-app/app/src/test/java/io/github/xgl34222220/luoshu/DisplayPerformanceControllerTest.kt
      - .github/workflows/app-display-performance.yml
permissions:
  contents: read
jobs:
  display:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Compile and test display controller
        id: validation
        continue-on-error: true
        working-directory: android-app
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace :app:compileDebugKotlin :app:testDebugUnitTest > "$RUNNER_TEMP/display-performance.log" 2>&1
      - name: Upload display validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: display-performance-log
          path: ${{ runner.temp }}/display-performance.log
          if-no-files-found: error
          retention-days: 2
      - name: Preserve validation result
        if: steps.validation.outcome == 'failure'
        run: exit 1
