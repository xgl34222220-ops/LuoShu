name: Fix Alpha1.3 regression environment
on:
  pull_request:
permissions:
  contents: write
jobs:
  fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'trigger/alpha13-weight-materialize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-alpha1-native-import
          fetch-depth: 0
      - name: Pass bundled FontTools path to host Python
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/native_zip_import_test.sh')
          text = path.read_text(encoding='utf-8')
          old = '''    LUOSHU_IMPORT_PYTHON=python3
              export LUOSHU_IMPORT_PYTHON
          '''
          new = '''    LUOSHU_IMPORT_PYTHON=python3
              PYTHONPATH="$1/common/python/lib/python3.14/site-packages"
              export LUOSHU_IMPORT_PYTHON PYTHONPATH
          '''
          if old not in text:
              raise SystemExit('native ZIP import test environment anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/native_zip_import_test.sh
          git commit -m "fix(test): expose bundled FontTools to weight probe"
          git push origin HEAD:feature/v14.3-alpha1-native-import
