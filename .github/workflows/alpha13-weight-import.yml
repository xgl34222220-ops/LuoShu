name: Apply Alpha1.3 weight metadata upgrade

on:
  push:
    branches:
      - feature/v14.3-alpha1-native-import

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-alpha1-native-import
          fetch-depth: 0

      - name: Apply internal weight metadata upgrade
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')

          def replace(path: str, old: str, new: str) -> None:
              file = root / path
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'missing patch anchor in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          probe = r'''#!/usr/bin/env python3
          """Return import-time font family and real OS/2 weight metadata."""
          from __future__ import annotations

          import argparse
          from pathlib import Path

          from fontTools.ttLib import TTFont


          def clean(value: object, fallback: str = "") -> str:
              text = str(value or fallback).replace("|", " ").replace("\t", " ")
              return " ".join(text.replace("\r", " ").replace("\n", " ").split())


          def debug_name(font: TTFont, name_id: int, fallback: str = "") -> str:
              try:
                  return clean(font["name"].getDebugName(name_id), fallback)
              except Exception:
                  return fallback


          def best_family(font: TTFont) -> str:
              try:
                  return clean(font["name"].getBestFamilyName(), debug_name(font, 1, "ImportedFont"))
              except Exception:
                  return debug_name(font, 1, "ImportedFont")


          def best_subfamily(font: TTFont) -> str:
              try:
                  return clean(font["name"].getBestSubFamilyName(), debug_name(font, 2, "Regular"))
              except Exception:
                  return debug_name(font, 2, "Regular")


          def inspect(path: Path) -> tuple[str, str, int, bool, bool]:
              kwargs = {"lazy": True, "recalcTimestamp": False}
              with path.open("rb") as stream:
                  if stream.read(4) == b"ttcf":
                      kwargs["fontNumber"] = 0
              font = TTFont(str(path), **kwargs)
              try:
                  try:
                      weight = int(font["OS/2"].usWeightClass)
                  except Exception:
                      weight = 400
                  weight = max(1, min(1000, weight))
                  subfamily = best_subfamily(font)
                  try:
                      italic = bool(int(font["head"].macStyle) & 0x02)
                  except Exception:
                      italic = "italic" in subfamily.lower() or "oblique" in subfamily.lower()
                  return best_family(font), subfamily, weight, italic, "fvar" in font
              finally:
                  font.close()


          def main() -> int:
              parser = argparse.ArgumentParser()
              parser.add_argument("font")
              args = parser.parse_args()
              family, subfamily, weight, italic, variable = inspect(Path(args.font))
              print(f"{family}|{subfamily}|{weight}|{str(italic).lower()}|{str(variable).lower()}")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          '''
          (root / 'common/font_import_probe.py').write_text(probe, encoding='utf-8')

          replace(
              'common/font_import.sh',
              'IMPORT_CACHE_DIR="${IMPORT_CACHE_DIR:-${MODULE_DIR:-/data/adb/modules/LuoShu}/cache/import}"\n',
              'IMPORT_CACHE_DIR="${IMPORT_CACHE_DIR:-${MODULE_DIR:-/data/adb/modules/LuoShu}/cache/import}"\n'
              'IMPORT_PROBE="${IMPORT_PROBE:-${MODULE_DIR:-/data/adb/modules/LuoShu}/common/font_import_probe.py}"\n'
              'IMPORT_PYROOT="${IMPORT_PYROOT:-${MODULE_DIR:-/data/adb/modules/LuoShu}/common/python}"\n'
              'IMPORT_PYBIN="${IMPORT_PYBIN:-$IMPORT_PYROOT/bin/luoshu-python}"\n'
          )

          replace(
              'common/font_import.sh',
              '''import_file_hash() {
              if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1" 2>/dev/null | awk '{print $1}'
              elif command -v md5sum >/dev/null 2>&1; then md5sum "$1" 2>/dev/null | awk '{print $1}'
              else wc -c < "$1" 2>/dev/null | tr -d '[:space:]'
              fi
          }
          ''',
              '''import_file_hash() {
              if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1" 2>/dev/null | awk '{print $1}'
              elif command -v md5sum >/dev/null 2>&1; then md5sum "$1" 2>/dev/null | awk '{print $1}'
              else wc -c < "$1" 2>/dev/null | tr -d '[:space:]'
              fi
          }

          # 优先读取字体内部 name / OS/2 / head / fvar 表。Android 使用模块内 Python，
          # CI 可通过 LUOSHU_IMPORT_PYTHON=python3 使用宿主 Python。
          import_probe_metadata() {
              _probe_file="$1"
              [ -f "$IMPORT_PROBE" ] || return 1
              _probe_output=""
              if [ -n "${LUOSHU_IMPORT_PYTHON:-}" ]; then
                  _probe_output=$("$LUOSHU_IMPORT_PYTHON" "$IMPORT_PROBE" "$_probe_file" 2>/dev/null)
              elif [ -x "$IMPORT_PYBIN" ]; then
                  _probe_output=$(PYTHONHOME="$IMPORT_PYROOT" \\
                      PYTHONPATH="$IMPORT_PYROOT/lib/python3.14:$IMPORT_PYROOT/lib/python3.14/site-packages" \\
                      LD_LIBRARY_PATH="$IMPORT_PYROOT/lib:$IMPORT_PYROOT/lib/python3.14/lib-dynload${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \\
                      "$IMPORT_PYBIN" "$IMPORT_PROBE" "$_probe_file" 2>/dev/null)
              elif command -v python3 >/dev/null 2>&1; then
                  _probe_output=$(python3 "$IMPORT_PROBE" "$_probe_file" 2>/dev/null)
              fi
              case "$_probe_output" in *'|'*'|'*'|'*'|'*) printf '%s\n' "$_probe_output"; return 0 ;; esac
              return 1
          }
          ''')

          replace(
              'common/font_import.sh',
              '''import_weight_role() {
              _lower=$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')
              case "$_lower" in
                  *thin*|*-w1.*|*_w1.*|*-100.*|*_100.*) echo thin ;;
                  *extralight*|*ultralight*|*light*|*-w2.*|*_w2.*|*-200.*|*_200.*) echo light ;;
                  *regular*|*book*|*normal*|*-w3.*|*_w3.*|*-300.*|*_300.*|*-400.*|*_400.*) echo regular ;;
                  *medium*|*-w4.*|*_w4.*|*-500.*|*_500.*) echo medium ;;
                  *semibold*|*demibold*|*-w5.*|*_w5.*|*-600.*|*_600.*) echo semibold ;;
                  *extrabold*|*ultrabold*|*bold*|*-w6.*|*_w6.*|*-700.*|*_700.*) echo bold ;;
                  *black*|*heavy*|*-w7.*|*_w7.*|*-w8.*|*_w8.*|*-w9.*|*_w9.*|*-800.*|*_800.*|*-900.*|*_900.*) echo black ;;
                  *) echo regular ;;
              esac
          }

          import_weight_label() {
              case "$1" in
                  thin) echo Thin ;; light) echo Light ;; regular) echo Regular ;; medium) echo Medium ;;
                  semibold) echo SemiBold ;; bold) echo Bold ;; black) echo Black ;; *) echo Regular ;;
              esac
          }
          ''',
              '''import_weight_role() {
              _lower=$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')
              case "$_lower" in
                  *thin*|*-w1.*|*_w1.*|*-100.*|*_100.*) echo thin ;;
                  *extralight*|*ultralight*|*extra-light*|*ultra-light*|*-w2.*|*_w2.*|*-200.*|*_200.*) echo extralight ;;
                  *light*|*-w3.*|*_w3.*|*-300.*|*_300.*) echo light ;;
                  *regular*|*book*|*normal*|*-w4.*|*_w4.*|*-400.*|*_400.*) echo regular ;;
                  *medium*|*-w5.*|*_w5.*|*-500.*|*_500.*) echo medium ;;
                  *semibold*|*demibold*|*-w6.*|*_w6.*|*-600.*|*_600.*) echo semibold ;;
                  *extrabold*|*ultrabold*|*extra-bold*|*ultra-bold*|*-w8.*|*_w8.*|*-800.*|*_800.*) echo extrabold ;;
                  *bold*|*-w7.*|*_w7.*|*-700.*|*_700.*) echo bold ;;
                  *black*|*heavy*|*-w9.*|*_w9.*|*-900.*|*_900.*) echo black ;;
                  *) echo regular ;;
              esac
          }

          import_weight_role_from_class() {
              _weight="$1"; _fallback="$2"
              case "$_weight" in ''|*[!0-9]*) import_weight_role "$_fallback"; return ;; esac
              if [ "$_weight" -lt 150 ]; then echo thin
              elif [ "$_weight" -lt 250 ]; then echo extralight
              elif [ "$_weight" -lt 350 ]; then echo light
              elif [ "$_weight" -lt 450 ]; then echo regular
              elif [ "$_weight" -lt 550 ]; then echo medium
              elif [ "$_weight" -lt 650 ]; then echo semibold
              elif [ "$_weight" -lt 750 ]; then echo bold
              elif [ "$_weight" -lt 850 ]; then echo extrabold
              else echo black
              fi
          }

          import_weight_label() {
              case "$1" in
                  thin) echo Thin ;; extralight) echo ExtraLight ;; light) echo Light ;;
                  regular) echo Regular ;; medium) echo Medium ;; semibold) echo SemiBold ;;
                  bold) echo Bold ;; extrabold) echo ExtraBold ;; black) echo Black ;; *) echo Regular ;;
              esac
          }
          ''')

          replace(
              'common/font_import.sh',
              '''        _valid=$((_valid + 1))
                  _family=$(import_detect_family "$_base")
                  _variable="$FONT_CHECK_VARIABLE"
                  _size=$(wc -c < "$_f" 2>/dev/null | tr -d '[:space:]'); case "$_size" in ''|*[!0-9]*) _size=0 ;; esac
                  _class=$(import_name_class "$_base"); _role=$(import_weight_role "$_base")
                  printf '%s|%s|text|%s|%s|%s|%s|%s
          ' "$_family" "$_variable" "$_size" "$_base" "$_f" "$_class" "$_role" >> "$_manifest"
          ''',
              '''        _valid=$((_valid + 1))
                  _probe=$(import_probe_metadata "$_f" 2>/dev/null)
                  _probe_family=""; _probe_subfamily=""; _probe_weight=""; _probe_italic=""; _probe_variable=""
                  if [ -n "$_probe" ]; then
                      IFS='|' read -r _probe_family _probe_subfamily _probe_weight _probe_italic _probe_variable <<EOF_PROBE
          $_probe
          EOF_PROBE
                  fi
                  _family="${_probe_family:-$(import_detect_family "$_base")}"
                  _variable="${_probe_variable:-$FONT_CHECK_VARIABLE}"
                  _size=$(wc -c < "$_f" 2>/dev/null | tr -d '[:space:]'); case "$_size" in ''|*[!0-9]*) _size=0 ;; esac
                  _class=$(import_name_class "$_base")
                  _role=$(import_weight_role_from_class "$_probe_weight" "$_base")
                  _italic="${_probe_italic:-false}"
                  printf '%s|%s|text|%s|%s|%s|%s|%s|%s|%s\n' \
                      "$_family" "$_variable" "$_size" "$_base" "$_f" "$_class" "$_role" "${_probe_weight:-0}" "$_italic" >> "$_manifest"
          ''')

          for old, new in [
              ("while IFS='|' read -r _family _variable _kind _size _base _path _class _role; do\n        [ \"$_kind\" = text ] || continue\n        import_is_italic_name \"$_base\" && continue",
               "while IFS='|' read -r _family _variable _kind _size _base _path _class _role _weight_class _italic; do\n        [ \"$_kind\" = text ] || continue\n        [ \"$_italic\" = true ] && continue\n        import_is_italic_name \"$_base\" && continue"),
              ("while IFS='|' read -r _family _variable _kind _size _base _path _class _role; do\n            [ \"$_kind\" = text ] || continue; [ \"$_family\" = \"$_best_family\" ] || continue\n            import_is_italic_name \"$_base\" && continue",
               "while IFS='|' read -r _family _variable _kind _size _base _path _class _role _weight_class _italic; do\n            [ \"$_kind\" = text ] || continue; [ \"$_family\" = \"$_best_family\" ] || continue\n            [ \"$_italic\" = true ] && continue\n            import_is_italic_name \"$_base\" && continue"),
              ("while IFS='|' read -r _family _variable _kind _size _base _path _class _role; do\n            [ \"$_kind\" = text ] || continue; [ \"$_size\" = \"$_best_size\" ] || continue",
               "while IFS='|' read -r _family _variable _kind _size _base _path _class _role _weight_class _italic; do\n            [ \"$_kind\" = text ] || continue; [ \"$_size\" = \"$_best_size\" ] || continue")
          ]:
              replace('common/font_import.sh', old, new)

          replace(
              'common/util_functions.sh',
              '    case "$result" in *"-Bold") result="${result%-Bold}" ;; esac\n    case "$result" in *"-Light") result="${result%-Light}" ;; esac\n',
              '    case "$result" in *"-ExtraBold") result="${result%-ExtraBold}" ;; esac\n    case "$result" in *"-UltraBold") result="${result%-UltraBold}" ;; esac\n    case "$result" in *"-ExtraLight") result="${result%-ExtraLight}" ;; esac\n    case "$result" in *"-UltraLight") result="${result%-UltraLight}" ;; esac\n    case "$result" in *"-Bold") result="${result%-Bold}" ;; esac\n    case "$result" in *"-Light") result="${result%-Light}" ;; esac\n')
          replace(
              'common/util_functions.sh',
              '    case "$result" in *"-bold") result="${result%-bold}" ;; esac\n    case "$result" in *"-light") result="${result%-light}" ;; esac\n',
              '    case "$result" in *"-extrabold") result="${result%-extrabold}" ;; esac\n    case "$result" in *"-ultrabold") result="${result%-ultrabold}" ;; esac\n    case "$result" in *"-extralight") result="${result%-extralight}" ;; esac\n    case "$result" in *"-ultralight") result="${result%-ultralight}" ;; esac\n    case "$result" in *"-bold") result="${result%-bold}" ;; esac\n    case "$result" in *"-light") result="${result%-light}" ;; esac\n')
          replace(
              'common/util_functions.sh',
              '''    case "$lower" in
                  *thin*|*极细*) echo "thin" ;;
                  *light*|*细体*) echo "light" ;;
                  *medium*|*中等*) echo "medium" ;;
                  *semibold*|*半粗*) echo "semibold" ;;
                  *bold*|*粗体*) echo "bold" ;;
                  *black*|*heavy*|*特粗*|*重体*) echo "black" ;;
                  *) echo "regular" ;;
              esac
          ''',
              '''    case "$lower" in
                  *thin*|*-100.*|*_100.*|*极细*) echo "thin" ;;
                  *extralight*|*ultralight*|*extra-light*|*ultra-light*|*-200.*|*_200.*) echo "extralight" ;;
                  *light*|*-300.*|*_300.*|*细体*) echo "light" ;;
                  *medium*|*-500.*|*_500.*|*中等*) echo "medium" ;;
                  *semibold*|*demibold*|*-600.*|*_600.*|*半粗*) echo "semibold" ;;
                  *extrabold*|*ultrabold*|*extra-bold*|*ultra-bold*|*-800.*|*_800.*) echo "extrabold" ;;
                  *bold*|*-700.*|*_700.*|*粗体*) echo "bold" ;;
                  *black*|*heavy*|*-900.*|*_900.*|*特粗*|*重体*) echo "black" ;;
                  *) echo "regular" ;;
              esac
          ''')
          replace(
              'common/util_functions.sh',
              '''        thin) echo "Thin" ;; light) echo "Light" ;; regular) echo "Regular" ;;
                  medium) echo "Medium" ;; semibold) echo "SemiBold" ;; bold) echo "Bold" ;;
                  black) echo "Black" ;; variable) echo "Variable" ;; *) echo "$1" ;;
          ''',
              '''        thin) echo "Thin" ;; extralight) echo "ExtraLight" ;; light) echo "Light" ;;
                  regular) echo "Regular" ;; medium) echo "Medium" ;; semibold) echo "SemiBold" ;;
                  bold) echo "Bold" ;; extrabold) echo "ExtraBold" ;; black) echo "Black" ;;
                  variable) echo "Variable" ;; *) echo "$1" ;;
          ''')
          replace(
              'common/util_functions.sh',
              '''        thin) echo 1 ;;
                  light) echo 2 ;;
                  regular) echo 3 ;;
                  medium) echo 4 ;;
                  semibold) echo 5 ;;
                  bold) echo 6 ;;
                  black) echo 7 ;;
          ''',
              '''        thin) echo 1 ;;
                  extralight) echo 2 ;;
                  light) echo 3 ;;
                  regular) echo 4 ;;
                  medium) echo 5 ;;
                  semibold) echo 6 ;;
                  bold) echo 7 ;;
                  extrabold) echo 8 ;;
                  black) echo 9 ;;
          ''')
          replace(
              'common/util_functions.sh',
              '    for _role in variable thin light regular medium semibold bold black; do\n',
              '    for _role in variable thin extralight light regular medium semibold bold extrabold black; do\n')

          test = r'''#!/bin/sh
          set -eu
          ROOT=$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)
          TMP=$(mktemp -d)
          trap 'rm -rf "$TMP"' EXIT HUP INT TERM

          FONT=$(find /usr/share/fonts -type f -iname 'DejaVuSans.ttf' -print -quit 2>/dev/null || true)
          if [ ! -s "$FONT" ]; then
              echo 'Native ZIP import test skipped: DejaVu Sans is unavailable.'
              exit 0
          fi
          mkdir -p "$TMP/pkg" "$TMP/public/import" "$TMP/public/fonts" "$TMP/cache" "$TMP/config"

          # 文件名故意不含任何字重提示；导入器必须读取 OS/2.usWeightClass。
          PYTHONPATH="$ROOT/common/python/lib/python3.14/site-packages" python3 -S - "$FONT" "$TMP/pkg/Mystery-A.ttf" 200 <<'PY'
          import sys
          from fontTools.ttLib import TTFont
          font = TTFont(sys.argv[1])
          font['OS/2'].usWeightClass = int(sys.argv[3])
          font.save(sys.argv[2])
          PY
          PYTHONPATH="$ROOT/common/python/lib/python3.14/site-packages" python3 -S - "$FONT" "$TMP/pkg/Mystery-B.ttf" 800 <<'PY'
          import sys
          from fontTools.ttLib import TTFont
          font = TTFont(sys.argv[1])
          font['OS/2'].usWeightClass = int(sys.argv[3])
          font.save(sys.argv[2])
          PY

          test "$(PYTHONPATH="$ROOT/common/python/lib/python3.14/site-packages" python3 -S "$ROOT/common/font_import_probe.py" "$TMP/pkg/Mystery-A.ttf" | cut -d'|' -f3)" = 200
          test "$(PYTHONPATH="$ROOT/common/python/lib/python3.14/site-packages" python3 -S "$ROOT/common/font_import_probe.py" "$TMP/pkg/Mystery-B.ttf" | cut -d'|' -f3)" = 800

          cat > "$TMP/pkg/module.prop" <<'PROP'
          id=luoshu_zip_regression
          name=洛书 ZIP 回归字体
          version=1.0
          versionCode=1
          author=LuoShu CI
          PROP
          (cd "$TMP/pkg" && zip -q -r "$TMP/public/import/regression.zip" .)

          SOURCE_RESULT=$(sh -c '
              zip_path="$1"
              checker="$2"
              set -- "$zip_path"
              . "$checker"
              printf sourced-ok
          ' sh "$TMP/public/import/regression.zip" "$ROOT/common/font_check.sh")
          test "$SOURCE_RESULT" = sourced-ok

          OUTPUT=$(sh -c '
              set -eu
              MODDIR="$1"; MODULE_DIR="$1"; CONFIG_DIR="$2/config"
              LUOSHU_PUBLIC_DIR="$2/public"; USER_FONTS_DIR="$2/public/fonts"
              USER_IMPORT_DIR="$2/public/import"; IMPORT_CACHE_DIR="$2/cache"
              LUOSHU_IMPORT_PYTHON=python3
              export LUOSHU_IMPORT_PYTHON
              json_escape() {
                  printf "%s" "$1" | sed "s/\\\\/\\\\\\\\/g; s/\"/\\\\\"/g" | tr "\n\r" "  "
              }
              . "$1/common/util_functions.sh"
              . "$1/common/font_check.sh"
              . "$1/common/font_import.sh"
              import_zip_package regression.zip
          ' sh "$ROOT" "$TMP")
          printf '%s\n' "$OUTPUT" | grep -q '"status":"ok"'
          printf '%s\n' "$OUTPUT" | grep -q '"mode":"family"'
          printf '%s\n' "$OUTPUT" | grep -q '"importedText":2'
          find "$TMP/public/fonts" -maxdepth 1 -type f -name '*-ExtraLight.ttf' -print -quit | grep -q .
          find "$TMP/public/fonts" -maxdepth 1 -type f -name '*-ExtraBold.ttf' -print -quit | grep -q .
          echo 'Native font-module ZIP import and internal-weight regression test passed.'
          '''
          (root / 'scripts/native_zip_import_test.sh').write_text(test, encoding='utf-8')

          replace(
              'scripts/check.sh',
              '  "$ROOT/common/font_metadata.py" \\\n  "$ROOT/common/font_extract_faces.py"\n',
              '  "$ROOT/common/font_metadata.py" \\\n  "$ROOT/common/font_extract_faces.py" \\\n  "$ROOT/common/font_import_probe.py"\n')
          replace(
              'scripts/check.sh',
              'common/font_metadata.py common/font_extract_faces.py \\\n',
              'common/font_metadata.py common/font_extract_faces.py common/font_import_probe.py \\\n')
          replace(
              'scripts/check.sh',
              "grep -q 'sha256:' \"$ROOT/common/font_metadata.py\"\n",
              "grep -q 'sha256:' \"$ROOT/common/font_metadata.py\"\ngrep -q 'usWeightClass' \"$ROOT/common/font_import_probe.py\"\ngrep -q 'import_probe_metadata' \"$ROOT/common/font_import.sh\"\n")

          module = (root / 'module.prop').read_text(encoding='utf-8')
          module = module.replace('version=v14.3 Alpha1.2', 'version=v14.3 Alpha1.3')
          module = module.replace('versionCode=14312', 'versionCode=14313')
          module = module.replace('description=Android 全局字体管理模块：修复字体预览源绑定与静默回退，支持安全导入、多字重、TTC 字体面和真实可变轴',
                                  'description=Android 全局字体管理模块：多字重模块优先读取字体内部 OS/2 字重，支持安全导入、TTC 字体面和真实可变轴')
          (root / 'module.prop').write_text(module, encoding='utf-8')

          (root / 'config/version_notes.conf').write_text(
              'version=v14.3 Alpha1.3\n'
              'summary=多字重模块读取字体内部真实字重\n'
              'notes=静态字体优先读取 OS/2.usWeightClass 与内部 Family/Italic 信息；即使文件名不含字重，也能正确归类 Thin、ExtraLight、Light、Regular、Medium、SemiBold、Bold、ExtraBold、Black。\n',
              encoding='utf-8')

          notes = '''# 洛书 v14.3 Alpha1.3

          ## 多字重导入升级

          - 字体模块 ZIP 中的静态字体优先读取内部 `OS/2.usWeightClass`，文件名仅作为失败兜底。
          - 使用字体内部 Family 将命名混乱的多字重文件正确归为同一字体族。
          - 支持完整九档角色：Thin、ExtraLight、Light、Regular、Medium、SemiBold、Bold、ExtraBold、Black。
          - 使用字体内部斜体标记过滤 Italic/Oblique，不再只依赖文件名。
          - 新增真实回归测试：两个文件名完全不含字重的字体，内部字重分别为 200 与 800，导入后必须生成 ExtraLight 与 ExtraBold。
          - 保留 Alpha1.2 的预览真实源绑定、失败显式提示，以及 Alpha1.1 的字体模块 ZIP 安全导入修复。

          本版本为开发测试版，不建议作为最终稳定版本长期使用。
          '''
          (root / 'RELEASE_NOTES_v14.3_ALPHA1.md').write_text(notes, encoding='utf-8')

          changelog = (root / 'CHANGELOG.md').read_text(encoding='utf-8')
          marker = '## [Unreleased]\n\n'
          section = '''### v14.3 Alpha1.3

          - 多字重模块优先读取字体内部 `OS/2.usWeightClass`，文件名仅在内部元数据不可读时作为兜底。
          - 使用内部 Family、Italic 与 Variable 信息归类字体；无字重文件名也可正确识别 100–900。
          - 新增 ExtraLight 与 ExtraBold 两档，形成九档静态字重链路。
          - 新增内部 200/800、文件名无字重提示的真实 ZIP 导入回归测试。

          '''
          if section not in changelog:
