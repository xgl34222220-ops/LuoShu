name: Apply font card preview fix

on:
  push:
    branches:
      - fix/font-card-preview-cache
    paths:
      - .github/workflows/apply-font-card-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/font-card-preview-cache
          fetch-depth: 0
      - name: Apply targeted source changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "android-app/app/src/main/java/io/github/xgl34222220/luoshu/ui/font/FontUiSupport.kt",
              '''internal fun fontCapabilityLabel(font: FontItem): String = when {
              font.variable -> "可变字体"
              fontStaticWeights(font).size >= 2 -> "${fontStaticWeights(font).size} 档静态字重"
              else -> "固定 ${fontWeightName(fontFixedWeight(font))}"
          }
          ''',
              '''internal fun fontPreviewWeight(font: FontItem): Int {
              val weights = fontStaticWeights(font)
              return when {
                  font.variable -> 400
                  400 in weights -> 400
                  500 in weights -> 500
                  weights.isEmpty() -> 400
                  else -> weights.minWithOrNull(
                      compareBy<Int> { abs(it - 500) }.thenByDescending { it },
                  ) ?: 400
              }
          }

          internal fun fontCapabilityLabel(font: FontItem): String = when {
              font.variable -> "可变字体"
              fontStaticWeights(font).size >= 2 ->
                  "多字重 · ${fontStaticWeights(font).joinToString(" / ")}"
              else -> "固定 ${fontWeightName(fontFixedWeight(font))}"
          }
          ''',
          )

          replace_once(
              "android-app/app/src/main/java/io/github/xgl34222220/luoshu/NativeFontPreview.kt",
              '''    val requestedWeight = remember(cleanAxes) {
                  (cleanAxes["wght"] ?: 400f).roundToInt().coerceIn(1, 1000)
              }
          ''',
              '''    val requestedWeight = remember(cleanAxes, font?.id, font?.weights) {
                  val fallback = font?.let {
                      io.github.xgl34222220.luoshu.ui.font.fontPreviewWeight(it).toFloat()
                  } ?: 400f
                  (cleanAxes["wght"] ?: fallback).roundToInt().coerceIn(1, 1000)
              }
          ''',
          )

          replace_once(
              "android-app/app/src/main/java/io/github/xgl34222220/luoshu/FontIndexStore.kt",
              'File(context.applicationContext.filesDir, "font-index-v1.json")',
              'File(context.applicationContext.filesDir, "font-index-v2.json")',
          )
          replace_once(
              "android-app/app/src/main/java/io/github/xgl34222220/luoshu/FontIndexStore.kt",
              'const val SCHEMA_VERSION = 1',
              'const val SCHEMA_VERSION = 2',
          )

          replace_once(
              "common/native_import.sh",
              '''invalidate_font_cache() {
              rm -f "$MODDIR/config/webui_font_list.json" \\
                    "$MODDIR/config/webui_font_list.key" \\
                    "$MODDIR/config/recent_fonts.conf" 2>/dev/null || true
          }
          ''',
              '''invalidate_font_cache() {
              rm -f "$MODDIR/config/native_font_index.json" \\
                    "$MODDIR/config/native_font_index.key" \\
                    "$MODDIR/config/webui_font_list.json" \\
                    "$MODDIR/config/webui_font_list.key" \\
                    "$MODDIR/config/recent_fonts.conf" 2>/dev/null || true
          }
          ''',
          )

          replace_once(
              "common/font_manager.sh",
              '_cache_key="native-v1|${_current}|${_fingerprint}"',
              '_cache_key="native-v2|${_current}|${_fingerprint}"',
          )

          stability = Path("scripts/stability_test.sh")
          text = stability.read_text()
          marker = "echo 'LuoShu App-only stability checks passed.'"
          addition = '''# 字体导入必须同时淘汰模块端原生索引；App 索引版本升级后不得继续读取旧卡片元数据。
          grep -q 'native_font_index.json' "$ROOT/common/native_import.sh"
          grep -q 'native_font_index.key' "$ROOT/common/native_import.sh"
          grep -q 'native-v2|' "$ROOT/common/font_manager.sh"
          grep -q 'font-index-v2.json' "$ROOT/android-app/app/src/main/java/io/github/xgl34222220/luoshu/FontIndexStore.kt"
          grep -q 'fontPreviewWeight' "$ROOT/android-app/app/src/main/java/io/github/xgl34222220/luoshu/NativeFontPreview.kt"

          '''
          if text.count(marker) != 1:
              raise SystemExit("stability_test.sh: completion marker mismatch")
          stability.write_text(text.replace(marker, addition + marker, 1))

          test = Path("android-app/app/src/test/java/io/github/xgl34222220/luoshu/ui/font/FontUiSupportTest.kt")
          test.parent.mkdir(parents=True, exist_ok=True)
          test.write_text('''package io.github.xgl34222220.luoshu.ui.font

          import io.github.xgl34222220.luoshu.FontItem
          import org.junit.Assert.assertEquals
          import org.junit.Assert.assertFalse
          import org.junit.Test

          class FontUiSupportTest {
              @Test
              fun incompleteThinBlackFamilyUsesBlackForCardPreview() {
                  val font = font(weights = listOf("thin", "black"))

                  assertEquals(900, fontPreviewWeight(font))
                  assertEquals("多字重 · 100 / 900", fontCapabilityLabel(font))
                  assertFalse(fontCapabilityLabel(font).contains("常规 400"))
              }

              @Test
              fun regularRemainsThePreferredStaticPreview() {
                  val font = font(weights = listOf("thin", "regular", "black"))

                  assertEquals(400, fontPreviewWeight(font))
              }

              private fun font(weights: List<String>) = FontItem(
                  id = "SuperHualunwan",
                  name = "超级花轮丸",
                  format = "TTF",
                  size = "23.0 MB",
                  date = "2026-07-22",
                  variable = false,
                  valid = true,
                  error = "",
                  weights = weights,
              )
          }
          ''')
          PY
      - name: Commit patched sources
        shell: bash
        run: |
          rm -f .github/workflows/apply-font-card-fix.yml
          git config user.name "LuoShu CI"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(app): refresh multiweight card metadata"
          git push origin HEAD:fix/font-card-preview-cache
