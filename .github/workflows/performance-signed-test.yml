name: Build signed performance test

on:
  push:
    branches:
      - feature/v14.3.10-performance

permissions:
  contents: read

concurrency:
  group: luoshu-signed-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Require signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.LUOSHU_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.LUOSHU_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LUOSHU_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LUOSHU_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            [[ -n "${!value}" ]] || { echo "Missing repository secret: LUOSHU_${value}" >&2; exit 3; }
          done
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/luoshu-release.jks"
          keytool -list -keystore "$RUNNER_TEMP/luoshu-release.jks" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null

      - name: Install module build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null

      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}

      - name: Prepare ARM64 composite runtime
        run: |
          if [[ ! -x common/python/bin/luoshu-python ]]; then
            sh scripts/prepare_composite_runtime.sh
          fi

      - name: Run source checks
        run: sh scripts/check.sh

      - name: Build fixed-signed optimized Apps
        working-directory: android-app
        env:
          LUOSHU_KEYSTORE_FILE: ${{ runner.temp }}/luoshu-release.jks
          LUOSHU_KEYSTORE_PASSWORD: ${{ secrets.LUOSHU_KEYSTORE_PASSWORD }}
          LUOSHU_KEY_ALIAS: ${{ secrets.LUOSHU_KEY_ALIAS }}
          LUOSHU_KEY_PASSWORD: ${{ secrets.LUOSHU_KEY_PASSWORD }}
        run: gradle --no-daemon --stacktrace :app:lintRelease :app:testDebugUnitTest :app:assembleRelease :app:assembleDebug

      - name: Verify packages and fixed signer
        shell: bash
        run: |
          set -euo pipefail
          release='android-app/app/build/outputs/apk/release/app-release.apk'
          debug='android-app/app/build/outputs/apk/debug/app-debug.apk'
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n1)"
          aapt="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n1)"
          test -s "$release"; test -s "$debug"; test -x "$apksigner"; test -x "$aapt"
          "$apksigner" verify --verbose --print-certs "$release" | tee "$RUNNER_TEMP/release-cert.txt"
          "$apksigner" verify --verbose --print-certs "$debug" | tee "$RUNNER_TEMP/debug-cert.txt"
          release_digest="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$RUNNER_TEMP/release-cert.txt" | head -n1)"
          debug_digest="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$RUNNER_TEMP/debug-cert.txt" | head -n1)"
          test -n "$release_digest"
          test "$release_digest" = "$debug_digest"
          "$aapt" dump badging "$release" | grep -q "package: name='io.github.xgl34222220.luoshu' versionCode='1433201'"
          "$aapt" dump badging "$debug" | grep -q "package: name='io.github.xgl34222220.luoshu.debug' versionCode='1433201'"
          printf '%s\n' "$release_digest" > "$RUNNER_TEMP/signer.sha256"

      - name: Build signed performance packages
        shell: bash
        run: |
          set -euo pipefail
          . scripts/version.sh
          release='android-app/app/build/outputs/apk/release/app-release.apk'
          debug='android-app/app/build/outputs/apk/debug/app-debug.apk'
          mkdir -p dist
          release_out="dist/LuoShu-App-${LUOSHU_ARTIFACT_VERSION}-Signed.apk"
          debug_out="dist/LuoShu-App-${LUOSHU_ARTIFACT_VERSION}-Debug-Signed.apk"
          cp -f "$release" "$release_out"
          cp -f "$debug" "$debug_out"
          LUOSHU_APP_APK="$release" sh scripts/build.sh
          module="dist/LuoShu-${LUOSHU_ARTIFACT_VERSION}.zip"
          test -s "$module"
          unzip -t "$module" >/dev/null
          ! unzip -Z1 "$module" | grep -qE '(^|/)webroot(/|$)'
          unzip -p "$module" bundled/LuoShu-App.apk > "$RUNNER_TEMP/embedded.apk"
          cmp -s "$release" "$RUNNER_TEMP/embedded.apk"
          cp "$RUNNER_TEMP/signer.sha256" dist/LuoShu-App-Signer-SHA256.txt
          (cd dist && sha256sum "$(basename "$release_out")" > "$(basename "$release_out").sha256")
          (cd dist && sha256sum "$(basename "$debug_out")" > "$(basename "$debug_out").sha256")
          (cd dist && sha256sum -c "$(basename "$module").sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: EXTRACT-FIRST-LuoShu-v14.3.10-Signed-Performance
          path: dist/*
          if-no-files-found: error
          retention-days: 14
