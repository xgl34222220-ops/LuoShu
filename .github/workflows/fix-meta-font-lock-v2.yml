name: Retry composite lock repair

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-meta-font-lock-v2.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Repair lock value
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'agent/meta-module-font-safety';
            const path = 'common/font_mix.sh';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            let text = Buffer.from(current.data.content, 'base64').toString('utf8');
            const oldText = '    echo $ > "$LOCK_FILE"';
            const newText = '    echo "' + '$' + 'PPID" > "$LOCK_FILE"';
            if (!text.includes(oldText)) throw new Error('Broken lock line not found');
            text = text.replace(oldText, newText);
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch, sha: current.data.sha,
              message: 'fix(font): write a valid composite switch lock pid',
              content: Buffer.from(text, 'utf8').toString('base64')
            });

      - name: Remove dispatcher
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.github/workflows/fix-meta-font-lock-v2.yml';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            await github.rest.repos.deleteFile({
              owner, repo, path, branch: 'main', sha: current.data.sha,
              message: 'chore: remove retry composite lock repair [skip ci]'
            });
