name: Dual skin compile debug

on:
  push:
    branches:
      - feature/v14.3-alpha1-native-import
  pull_request:
    branches:
      - fix/v14.2-rc2-stabilization
  workflow_dispatch:

jobs:
  compile-log:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Capture Kotlin compiler output
        shell: bash
        run: |
          set +e
          cd android-app
          chmod +x gradlew
          ./gradlew :app:compileDebugKotlin --stacktrace --no-daemon > ../dual-skin-compile.log 2>&1
          status=$?
          echo "gradle_exit=$status" >> ../dual-skin-compile.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: dual-skin-compile-log
          path: dual-skin-compile.log
          if-no-files-found: error
          retention-days: 1
