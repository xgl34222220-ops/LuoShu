name: One-shot v2 source consolidation

on:
  push:
    branches:
      - agent/v2-source-consolidation
    paths:
      - scripts/v2_source_consolidation.py
      - .github/workflows/v2-source-consolidation.yml

permissions:
  contents: write

jobs:
  consolidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v2-source-consolidation
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply v2 source migration
        run: python scripts/v2_source_consolidation.py

      - name: Validate migrated shell and Python sources
        shell: bash
        run: |
          set -euo pipefail
          find . -type f -name '*.sh' -print0 | xargs -0 -n1 sh -n
          python -m py_compile \
            common/composite_font.py \
            common/font_instance.py \
            common/font_config_overlay.py \
            common/font_config_targets.py
          sh scripts/font_library_ui_layout_test.sh
          sh scripts/auto_multiweight_mode_test.sh
          sh scripts/background_mix_worker_test.sh
          sh scripts/nested_mix_task_handoff_test.sh

      - name: Commit consolidated source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'refactor: consolidate v2 runtime source namespace'
          git push origin HEAD:agent/v2-source-consolidation
