name: Hook App diagnostic
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - android-app/**
      - .github/workflows/hook-diagnostic.yml
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Run Android validation and capture log
        id: validation
        continue-on-error: true
        working-directory: android-app
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace :app:compileDebugKotlin :app:testDebugUnitTest :app:lintDebug :app:assembleDebug > "$RUNNER_TEMP/hook-validation.log" 2>&1
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hook-validation-log
          path: ${{ runner.temp }}/hook-validation.log
          if-no-files-found: error
          retention-days: 2
      - name: Preserve validation result
        if: steps.validation.outcome == 'failure'
        run: exit 1
