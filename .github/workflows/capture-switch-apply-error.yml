name: Capture switch patch failure

on:
  push:
    branches:
      - fix/v2.2.1-switch-timeout-status
    paths:
      - .github/workflows/capture-switch-apply-error.yml

permissions:
  contents: write
  actions: read

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v2.2.1-switch-timeout-status
      - name: Capture failed job log
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          mkdir -p docs
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/89428710752/logs" \
            -o /tmp/job.log
          rc=$?
          {
            echo "curl_rc=$rc"
            file /tmp/job.log 2>&1 || true
            echo "--- last 220 lines ---"
            tail -n 220 /tmp/job.log 2>&1 || true
          } > docs/switch-performance-apply-error.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/switch-performance-apply-error.log
          git commit -m 'chore: capture switch performance patch error'
          git push origin HEAD:fix/v2.2.1-switch-timeout-status
