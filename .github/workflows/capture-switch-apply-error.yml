name: Capture switch patch failure

on:
  push:
    branches:
      - fix/v2.2.1-switch-timeout-status
    paths:
      - .github/workflows/capture-switch-apply-error.yml

permissions:
  contents: write
  actions: read

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v2.2.1-switch-timeout-status
      - name: Capture failed job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${GITHUB_REPOSITORY}/actions/jobs/89428710752/logs > /tmp/job.log
          tail -n 160 /tmp/job.log > docs/switch-performance-apply-error.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/switch-performance-apply-error.log
          git commit -m 'chore: capture switch performance patch error'
          git push origin HEAD:fix/v2.2.1-switch-timeout-status
