name: Finalize Alpha3 branch push
on:
  push:
    branches: [feature/v14.2-alpha3-async-full-axes]
permissions:
  contents: write
jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.2-alpha3-async-full-axes
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply Alpha3 finalization
        run: |
          python3 scripts/alpha3_finalize.py
          find . -type f -name '*.sh' -print | while IFS= read -r file; do sh -n "$file"; done
          python3 -m py_compile common/font_instance.py common/composite_font.py
          for file in webroot/environment.js webroot/mix_state_guard.js webroot/workbench_bridge.js webroot/workbench.js webroot/workbench_weight_extension.js; do cp "$file" "/tmp/$(basename "${file%.js}").mjs"; node --check "/tmp/$(basename "${file%.js}").mjs"; done
          git diff --check
      - name: Commit finalized source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: finalize Alpha3 async full-axis UI' || exit 0
          git push origin HEAD:feature/v14.2-alpha3-async-full-axes
