name: Report completed v14.3 App materializer

on:
  workflow_run:
    workflows: [Materialize v14.3 App-only font features]
    types: [completed]

permissions:
  actions: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-24.04
    steps:
      - name: Report completed run to trigger PR
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_BRANCH: ops/v14.3-app-features-trigger
        shell: bash
        run: |
          set -euo pipefail
          pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$HEAD_BRANCH" --json number --jq 'first.number')"
          [[ -n "$pr" && "$pr" != null ]] || exit 0
          status="$(gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --json databaseId,status,conclusion,event,headBranch,headSha,url,createdAt,updatedAt)"
          gh pr comment "$pr" --repo "$GITHUB_REPOSITORY" --body "V14_3_APP_MATERIALIZER_COMPLETED

\`\`\`json
$status
\`\`\`"
