name: Alpha1.5 compiler diagnostic
on:
  push:
    branches:
      - feature/v14.3-alpha1-native-import
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'
      - name: Compile and capture output
        shell: bash
        run: |
          set +e
          cd android-app
          gradle --no-daemon --stacktrace :app:compileDebugKotlin > ../alpha15-compiler.log 2>&1
          printf '%s\n' "$?" > ../alpha15-compiler.exit
          tail -n 240 ../alpha15-compiler.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: Alpha15-compiler-diagnostic
          path: |
            alpha15-compiler.log
            alpha15-compiler.exit
          if-no-files-found: error
      - name: Enforce compiler result
        run: test "$(cat alpha15-compiler.exit)" = 0
