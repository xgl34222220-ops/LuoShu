name: Apply no-Hook integration patch
on:
  push:
    branches:
      - refactor/v14.5-no-hook-font-engine
    paths:
      - .github/workflows/patch-no-hook-integration.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/v14.5-no-hook-font-engine
      - name: Patch HyperOS and composite commit paths
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          hyper = Path('common/hyperos_global.sh')
          text = hyper.read_text(encoding='utf-8')
          old = '''    config_count=0
              if [ "$config_weight_count" -eq 9 ] && type font_config_generate >/dev/null 2>&1; then
                  if font_config_generate "$font_family"; then
                      config_count=1
                  else
                      _log_step '  字体 XML 未安全启用，已继续使用 MiSans 文件槽回退'
                  fi
              fi
          '''.replace('              ', '    ')
          new = '''    config_count=0
              if [ "$config_weight_count" -eq 9 ] && type font_config_enable_for_payload >/dev/null 2>&1; then
                  if font_config_enable_for_payload "$font_family"; then
                      config_count=1
                  else
                      _log_step '  字体身份或 XML 未安全启用，已继续使用 MiSans 文件槽回退'
                  fi
              fi
          '''.replace('              ', '    ')
          if text.count(old) != 1:
              raise SystemExit('HyperOS config block not found exactly once')
          hyper.write_text(text.replace(old, new), encoding='utf-8')

          mix = Path('common/font_mix.sh')
          text = mix.read_text(encoding='utf-8')
          old = '''    if [ "$IS_COLOROS" = "true" ]; then
                  sync_secondary_coloros_dirs || echo '警告：ColorOS 辅助分区字体同步未完全成功，主字体负载已保留' >&2
              fi
              type luoshu_sync_mount_payload >/dev/null 2>&1 && luoshu_sync_mount_payload 2>/dev/null || true
          '''.replace('              ', '    ')
          new = '''    if [ "$IS_COLOROS" = "true" ]; then
                  sync_secondary_coloros_dirs || echo '警告：ColorOS 辅助分区字体同步未完全成功，主字体负载已保留' >&2
              fi
              if type font_config_enable_for_payload >/dev/null 2>&1; then
                  if font_config_enable_for_payload mix; then
                      sed -i 's/^xmlOverlay=false$/xmlOverlay=true/' "$MIX_CONF" 2>/dev/null || true
                  else
                      echo '警告：无 Hook XML 未安全启用，已保留文件槽映射' >&2
                  fi
              fi
              type luoshu_sync_mount_payload >/dev/null 2>&1 && luoshu_sync_mount_payload 2>/dev/null || true
          '''.replace('              ', '    ')
          if text.count(old) != 1:
              raise SystemExit('Composite commit block not found exactly once')
          mix.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit integration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add common/hyperos_global.sh common/font_mix.sh
          git commit -m 'refactor(font): commit no-Hook XML with every font payload'
          git push origin HEAD:refactor/v14.5-no-hook-font-engine
