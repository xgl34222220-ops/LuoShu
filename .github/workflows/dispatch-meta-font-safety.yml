name: Dispatch meta-module font safety refactor

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/dispatch-meta-font-safety.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/meta-module-font-safety
          fetch-depth: 0

      - name: Apply and validate refactor
        id: validation
        continue-on-error: true
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/meta-font-safety.log"
          {
            set -x
            python3 scripts/apply_meta_font_safety_refactor.py
            chmod 0755 common/font_safety.sh common/mount_compat.sh scripts/font_safety_test.sh scripts/meta_module_sync_test.sh
            chmod 0644 common/font_config_targets.py scripts/font_config_targets_test.py
            python3 -m py_compile common/font_config_overlay.py common/font_config_targets.py scripts/font_config_targets_test.py
            sh -n common/font_config_runtime.sh
            sh -n common/font_config_partitions.sh
            sh -n common/font_safety.sh
            sh -n common/mount_compat.sh
            sh -n post-fs-data.sh
            sh -n service.sh
            sh -n common/font_manager.sh
            sh -n common/font_mix.sh
            python3 scripts/font_config_overlay_test.py
            python3 scripts/font_config_targets_test.py
            sh -x scripts/font_safety_test.sh
            sh -x scripts/meta_module_sync_test.sh
            sh -x scripts/font_config_runtime_test.sh
            sh -x scripts/no_hook_bootstrap_test.sh
            ! grep -RInE 'IXposedHookLoadPackage|XposedBridge|LSPosed|lspatch' common post-fs-data.sh service.sh 2>/dev/null
          } >"$LOG" 2>&1
          RC=$?
          if [ "$RC" -ne 0 ]; then
            git reset --hard "origin/agent/meta-module-font-safety"
            git clean -fd
            {
              echo '# Meta font safety validation failure'
              echo
              echo "Exit code: $RC"
              echo
              echo '```text'
              tail -n 240 "$LOG"
              echo '```'
            } > META_FONT_SAFETY_FAILURE.md
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add META_FONT_SAFETY_FAILURE.md
            git commit -m 'test: record meta font safety failure' || true
            git push origin HEAD:agent/meta-module-font-safety
            exit "$RC"
          fi
          rm -f .github/workflows/agent-meta-font-safety.yml scripts/apply_meta_font_safety_refactor.py META_FONT_SAFETY_FAILURE.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'refactor: harden all meta-module font payloads'
          git push origin HEAD:agent/meta-module-font-safety

      - name: Remove dispatcher from main
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.github/workflows/dispatch-meta-font-safety.yml';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            await github.rest.repos.deleteFile({
              owner,
              repo,
              path,
              branch: 'main',
              sha: current.data.sha,
              message: 'chore: remove one-shot meta font safety dispatcher [skip ci]'
            });

      - name: Preserve validation status
        if: steps.validation.outcome == 'failure'
        run: exit 1
