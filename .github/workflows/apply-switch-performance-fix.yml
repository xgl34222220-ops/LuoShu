name: Apply switch performance refactor

on:
  push:
    branches:
      - fix/v2.2.1-switch-timeout-status
    paths:
      - .github/workflows/apply-switch-performance-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v2.2.1-switch-timeout-status
          fetch-depth: 0

      - name: Apply performance changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')

          def replace_once(path: str, old: str, new: str) -> None:
              p = root / path
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:80]!r}')
              p.write_text(text.replace(old, new, 1))

          validation_cache = r'''#!/system/bin/sh
          # LuoShu validated-font cache. Reuses the App-side full coverage result only while the
          # exact source inode/size/timestamps are unchanged; changed files always run the full gate.
          set +e

          luoshu_font_validation_cache_path() {
              _lfvcp_module="${MODULE_DIR:-${MODDIR:-/data/adb/modules/LuoShu}}"
              printf '%s/config/font-validation-cache.conf\n' "$_lfvcp_module"
          }

          luoshu_font_validation_identity() {
              _lfvi_file="$1"
              if command -v stat >/dev/null 2>&1; then
                  stat -c '%d:%i:%s:%Y:%Z' "$_lfvi_file" 2>/dev/null && return 0
              fi
              if command -v toybox >/dev/null 2>&1; then
                  toybox stat -c '%d:%i:%s:%Y:%Z' "$_lfvi_file" 2>/dev/null && return 0
              fi
              return 1
          }

          luoshu_font_validation_read() {
              _lfvr_key="$1"
              _lfvr_cache="$(luoshu_font_validation_cache_path)"
              sed -n "s/^${_lfvr_key}=//p" "$_lfvr_cache" 2>/dev/null | head -n1 | tr -d '\r\n'
          }

          luoshu_font_validation_cache_restore() {
              _lfvcr_file="$1"
              _lfvcr_cache="$(luoshu_font_validation_cache_path)"
              [ -s "$_lfvcr_cache" ] || return 1
              [ "$(luoshu_font_validation_read valid)" = true ] || return 1
              [ "$(luoshu_font_validation_read path)" = "$_lfvcr_file" ] || return 1
              _lfvcr_now="$(luoshu_font_validation_identity "$_lfvcr_file")" || return 1
              [ -n "$_lfvcr_now" ] && [ "$_lfvcr_now" = "$(luoshu_font_validation_read identity)" ] || return 1

              FONT_CHECK_FORMAT="$(luoshu_font_validation_read format)"
              FONT_CHECK_SIZE="$(luoshu_font_validation_read bytes)"
              FONT_CHECK_VARIABLE="$(luoshu_font_validation_read variable)"
              FONT_CHECK_COLOR="$(luoshu_font_validation_read color)"
              FONT_CHECK_WARNING="$(luoshu_font_validation_read warning)"
              FONT_CHECK_COVERAGE="$(luoshu_font_validation_read coverage)"
              FONT_CHECK_ERROR=''
              LUOSHU_FONT_VALIDATION_CACHE_HIT=true
              export LUOSHU_FONT_VALIDATION_CACHE_HIT
              return 0
          }

          luoshu_font_validation_cache_store() {
              _lfvcs_file="$1"
              _lfvcs_identity="$(luoshu_font_validation_identity "$_lfvcs_file")" || return 1
              _lfvcs_cache="$(luoshu_font_validation_cache_path)"
              _lfvcs_tmp="${_lfvcs_cache}.tmp.$$"
              mkdir -p "${_lfvcs_cache%/*}" 2>/dev/null || return 1
              {
                  printf 'valid=true\n'
                  printf 'path=%s\n' "$(printf '%s' "$_lfvcs_file" | tr '\n\r' '  ')"
                  printf 'identity=%s\n' "$_lfvcs_identity"
                  printf 'format=%s\n' "${FONT_CHECK_FORMAT:-UNKNOWN}"
                  printf 'bytes=%s\n' "${FONT_CHECK_SIZE:-0}"
                  printf 'variable=%s\n' "${FONT_CHECK_VARIABLE:-false}"
                  printf 'color=%s\n' "${FONT_CHECK_COLOR:-false}"
                  printf 'warning=%s\n' "$(printf '%s' "${FONT_CHECK_WARNING:-}" | tr '\n\r' '  ')"
                  printf 'coverage=%s\n' "$(printf '%s' "${FONT_CHECK_COVERAGE:-}" | tr '\n\r' '  ')"
                  printf 'time=%s\n' "$(date +%s 2>/dev/null || echo 0)"
              } > "$_lfvcs_tmp" 2>/dev/null || return 1
              mv -f "$_lfvcs_tmp" "$_lfvcs_cache" 2>/dev/null || return 1
              chmod 0644 "$_lfvcs_cache" 2>/dev/null || true
          }

          luoshu_font_validate_global_cached() {
              _lfvgc_file="$1"
              LUOSHU_FONT_VALIDATION_CACHE_HIT=false
              export LUOSHU_FONT_VALIDATION_CACHE_HIT
              if luoshu_font_validation_cache_restore "$_lfvgc_file"; then
                  return 0
              fi
              type font_validate_global >/dev/null 2>&1 || return 127
              font_validate_global "$_lfvgc_file" || return $?
              luoshu_font_validation_cache_store "$_lfvgc_file" >/dev/null 2>&1 || true
              return 0
          }
          '''
          # Remove workflow indentation from the raw string.
          validation_cache = '\n'.join(line[10:] if line.startswith('          ') else line for line in validation_cache.splitlines()) + '\n'
          (root / 'common/font_validation_cache.sh').write_text(validation_cache)

          fm = root / 'common/font_manager.sh'
          text = fm.read_text()
          text = text.replace(
              '[ -f "$MODULE_DIR/common/font_check.sh" ] && . "$MODULE_DIR/common/font_check.sh"\n',
              '[ -f "$MODULE_DIR/common/font_check.sh" ] && . "$MODULE_DIR/common/font_check.sh"\n'
              '[ -f "$MODULE_DIR/common/font_validation_cache.sh" ] && . "$MODULE_DIR/common/font_validation_cache.sh"\n',
              1,
          )
          marker = '''json_escape() {
              printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g' | tr '\\n\\r' '  '
          }
          '''
          if marker not in text:
              raise SystemExit('font_manager: json_escape marker missing')
          perf = marker + r'''

          luoshu_switch_perf_begin() {
              LUOSHU_SWITCH_PERF_START="$(date +%s 2>/dev/null || echo 0)"
              LUOSHU_SWITCH_PERF_MARK="$LUOSHU_SWITCH_PERF_START"
          }

          luoshu_switch_perf_mark() {
              _lsp_stage="$1"
              _lsp_now="$(date +%s 2>/dev/null || echo 0)"
              case "$LUOSHU_SWITCH_PERF_START:$LUOSHU_SWITCH_PERF_MARK:$_lsp_now" in
                  *[!0-9:]*|'') return 0 ;;
              esac
              _lsp_stage_seconds=$((_lsp_now - LUOSHU_SWITCH_PERF_MARK))
              _lsp_total_seconds=$((_lsp_now - LUOSHU_SWITCH_PERF_START))
              printf '[PERF] switch stage=%s stageSeconds=%s totalSeconds=%s\n' \
                  "$_lsp_stage" "$_lsp_stage_seconds" "$_lsp_total_seconds"
              LUOSHU_SWITCH_PERF_MARK="$_lsp_now"
          }
          '''
          perf = '\n'.join(line[10:] if line.startswith('          ') else line for line in perf.splitlines()) + '\n'
          text = text.replace(marker, perf, 1)
          text = text.replace(
              "    trap 'type luoshu_payload_transaction_abort >/dev/null 2>&1 && luoshu_payload_transaction_abort; rm -f \"$MODULE_DIR/.font_switch.lock\" 2>/dev/null' EXIT HUP INT TERM\n",
              "    trap 'type luoshu_payload_transaction_abort >/dev/null 2>&1 && luoshu_payload_transaction_abort; rm -f \"$MODULE_DIR/.font_switch.lock\" 2>/dev/null' EXIT HUP INT TERM\n    luoshu_switch_perf_begin\n",
              1,
          )
          old_validation = '''        if type font_validate_global >/dev/null 2>&1; then
              font_validate_global "$_source" || { echo "错误：$FONT_CHECK_ERROR" >&2; return 4; }
          elif type font_validate >/dev/null 2>&1; then
              font_validate "$_source" text || { echo "错误：$FONT_CHECK_ERROR" >&2; return 4; }
          fi
              fi
          
              if ! type luoshu_payload_transaction_begin >/dev/null 2>&1 || ! luoshu_payload_transaction_begin; then
          '''
          new_validation = '''        if type luoshu_font_validate_global_cached >/dev/null 2>&1; then
              luoshu_font_validate_global_cached "$_source" || { echo "错误：$FONT_CHECK_ERROR" >&2; return 4; }
          elif type font_validate_global >/dev/null 2>&1; then
              font_validate_global "$_source" || { echo "错误：$FONT_CHECK_ERROR" >&2; return 4; }
          elif type font_validate >/dev/null 2>&1; then
              font_validate "$_source" text || { echo "错误：$FONT_CHECK_ERROR" >&2; return 4; }
          fi
              fi
              luoshu_switch_perf_mark validation
          
              if ! type luoshu_payload_transaction_begin >/dev/null 2>&1 || ! luoshu_payload_transaction_begin; then
          '''
          if old_validation not in text:
              # Match the repository's exact indentation without relying on visual whitespace.
              pattern = re.compile(r'''        if type font_validate_global >/dev/null 2>&1; then\n            font_validate_global "\$_source" \|\| \{ echo "错误：\$FONT_CHECK_ERROR" >&2; return 4; \}\n        elif type font_validate >/dev/null 2>&1; then\n            font_validate "\$_source" text \|\| \{ echo "错误：\$FONT_CHECK_ERROR" >&2; return 4; \}\n        fi\n    fi\n\n    if ! type luoshu_payload_transaction_begin''')
              repl = '''        if type luoshu_font_validate_global_cached >/dev/null 2>&1; then
              luoshu_font_validate_global_cached "$_source" || { echo "错误：$FONT_CHECK_ERROR" >&2; return 4; }
          elif type font_validate_global >/dev/null 2>&1; then
              font_validate_global "$_source" || { echo "错误：$FONT_CHECK_ERROR" >&2; return 4; }
          elif type font_validate >/dev/null 2>&1; then
              font_validate "$_source" text || { echo "错误：$FONT_CHECK_ERROR" >&2; return 4; }
          fi
              fi
              luoshu_switch_perf_mark validation
          
              if ! type luoshu_payload_transaction_begin'''
              text, n = pattern.subn(repl, text, count=1)
              if n != 1:
                  raise SystemExit('font_manager: validation block missing')
          else:
              text = text.replace(old_validation, new_validation, 1)

          text = text.replace(
              "    clear_managed_text_fonts\n",
              "    luoshu_switch_perf_mark transaction_snapshot\n    clear_managed_text_fonts\n",
              1,
          )
          text = text.replace(
              "    if ! type luoshu_payload_validate_current >/dev/null 2>&1 || ! luoshu_payload_validate_current \"$_font_id\"; then\n",
              "    luoshu_switch_perf_mark map_slots\n    if ! type luoshu_payload_validate_current >/dev/null 2>&1 || ! luoshu_payload_validate_current \"$_font_id\"; then\n",
              1,
          )
          text = text.replace(
              "fi\nprintf '%s\\n' \"$_font_id\" > \"$ACTIVE_FONT_CONF\" || {\n",
              "fi\nluoshu_switch_perf_mark payload_validate\nprintf '%s\\n' \"$_font_id\" > \"$ACTIVE_FONT_CONF\" || {\n",
              1,
          )
          text = text.replace(
              "if ! luoshu_payload_transaction_commit \"$_font_id\"; then\n",
              "luoshu_switch_perf_mark mount_sync\nif ! luoshu_payload_transaction_commit \"$_font_id\"; then\n",
              1,
          )
          text = text.replace(
              "fi\n# Downloadable Fonts",
              "fi\nluoshu_switch_perf_mark transaction_commit\n# Downloadable Fonts",
              1,
          )
          text = text.replace(
              "    invalidate_font_index_cache\n    return 0\n}\n\nwrite_switch_task()",
              "    invalidate_font_index_cache\n    luoshu_switch_perf_mark complete\n    return 0\n}\n\nwrite_switch_task()",
              1,
          )

          new_validate_function = r'''validate_font_json() {
              _font_id="$1"
              _file="$(find_text_font_file "$_font_id")"
              [ -f "$_file" ] || { printf '{"status":"error","message":"未找到字体"}\n'; return 0; }
              if type luoshu_font_validate_global_cached >/dev/null 2>&1; then
                  if luoshu_font_validate_global_cached "$_file"; then
                      printf '{"status":"ok","data":{"valid":true,"format":"%s","bytes":%s,"variable":%s,"color":%s,"cached":%s,"warning":"%s"}}\n' \
                          "$(json_escape "$FONT_CHECK_FORMAT")" "${FONT_CHECK_SIZE:-0}" "${FONT_CHECK_VARIABLE:-false}" "${FONT_CHECK_COLOR:-false}" \
                          "${LUOSHU_FONT_VALIDATION_CACHE_HIT:-false}" "$(json_escape "$FONT_CHECK_WARNING")"
                  else
                      printf '{"status":"ok","data":{"valid":false,"format":"%s","bytes":%s,"variable":%s,"color":%s,"cached":false,"error":"%s"}}\n' \
                          "$(json_escape "$FONT_CHECK_FORMAT")" "${FONT_CHECK_SIZE:-0}" "${FONT_CHECK_VARIABLE:-false}" "${FONT_CHECK_COLOR:-false}" "$(json_escape "$FONT_CHECK_ERROR")"
                  fi
              elif type font_validate_global >/dev/null 2>&1; then
                  if font_validate_global "$_file"; then
                      printf '{"status":"ok","data":{"valid":true,"format":"%s","bytes":%s,"variable":%s,"color":%s,"cached":false,"warning":"%s"}}\n' \
                          "$(json_escape "$FONT_CHECK_FORMAT")" "${FONT_CHECK_SIZE:-0}" "${FONT_CHECK_VARIABLE:-false}" "${FONT_CHECK_COLOR:-false}" "$(json_escape "$FONT_CHECK_WARNING")"
                  else
                      printf '{"status":"ok","data":{"valid":false,"format":"%s","bytes":%s,"variable":%s,"color":%s,"cached":false,"error":"%s"}}\n' \
                          "$(json_escape "$FONT_CHECK_FORMAT")" "${FONT_CHECK_SIZE:-0}" "${FONT_CHECK_VARIABLE:-false}" "${FONT_CHECK_COLOR:-false}" "$(json_escape "$FONT_CHECK_ERROR")"
                  fi
              elif type font_check_json >/dev/null 2>&1; then
                  _check="$(font_check_json "$_file" text 2>/dev/null | tr -d '\n')"
                  [ -n "$_check" ] || _check='{"valid":false,"error":"字体验证器未返回结果"}'
                  printf '{"status":"ok","data":%s}\n' "$_check"
              else
                  printf '{"status":"error","message":"字体验证器不可用"}\n'
              fi
          }
          '''
          new_validate_function = '\n'.join(line[10:] if line.startswith('          ') else line for line in new_validate_function.splitlines()) + '\n'
          text, n = re.subn(r'validate_font_json\(\) \{.*?\n\}\n\nstart_switch_task\(\)', new_validate_function + '\nstart_switch_task()', text, count=1, flags=re.S)
          if n != 1:
              raise SystemExit('font_manager: validate_font_json function replacement failed')
          fm.write_text(text)

          ra = root / 'common/rom_adapters.sh'
          text = ra.read_text()
          new_verify = r'''_font_file_size_fast() {
              _ffsf_file="$1"
              if command -v stat >/dev/null 2>&1; then
                  stat -c '%s' "$_ffsf_file" 2>/dev/null && return 0
              fi
              if command -v toybox >/dev/null 2>&1; then
                  toybox stat -c '%s' "$_ffsf_file" 2>/dev/null && return 0
              fi
              wc -c < "$_ffsf_file" 2>/dev/null | tr -d '[:space:]'
          }

          _verify_font_copy() {
              f="$1"
              if [ ! -s "$f" ]; then
                  _log_step "  警告：$(basename "$f") 复制后为空或不存在，可能导致相关文字渲染异常"
                  return 1
              fi
              fsize="$(_font_file_size_fast "$f")"
              case "$fsize" in ''|*[!0-9]*) fsize=0 ;; esac
              if [ "$fsize" -lt 1024 ]; then
                  _log_step "  警告：$(basename "$f") 只有 ${fsize} 字节，明显小于正常字体文件，可能已损坏"
                  return 1
              fi
              return 0
          }
          '''
          new_verify = '\n'.join(line[10:] if line.startswith('          ') else line for line in new_verify.splitlines()) + '\n'
          text, n = re.subn(r'_verify_font_copy\(\) \{.*?\n\}\n\n# 为同一份字体', new_verify + '\n# 为同一份字体', text, count=1, flags=re.S)
          if n != 1:
              raise SystemExit('rom_adapters: verify function replacement failed')

          new_token = r'''_font_inventory_cache_token() {
              _fict_module="${MODULE_DIR:-${MODDIR:-/data/adb/modules/LuoShu}}"
              _fict_inventory="$_fict_module/config/device_font_inventory.json"
              _fict_current=''
              if command -v getprop >/dev/null 2>&1; then
                  _fict_current=$(getprop ro.build.fingerprint 2>/dev/null || true)
                  [ -n "$_fict_current" ] || _fict_current=$(getprop ro.build.display.id 2>/dev/null || true)
              fi
              _fict_recorded=$(sed -n 's/^[[:space:]]*"buildKey":[[:space:]]*"\([^"]*\)".*/\1/p' "$_fict_inventory" 2>/dev/null | head -n1)
              if [ -n "$_fict_current" ] && [ "$_fict_current" != "$_fict_recorded" ]; then
                  printf '%s\n' fallback
                  return 0
              fi
              if [ -s "$_fict_inventory" ] && \
                 grep -q '"schema": "device-font-inventory-v1"' "$_fict_inventory" 2>/dev/null && \
                 grep -q '"state": "ready"' "$_fict_inventory" 2>/dev/null; then
                  if command -v stat >/dev/null 2>&1; then
                      _fict_token=$(stat -c '%s-%Y' "$_fict_inventory" 2>/dev/null)
                  elif command -v toybox >/dev/null 2>&1; then
                      _fict_token=$(toybox stat -c '%s-%Y' "$_fict_inventory" 2>/dev/null)
                  fi
                  [ -n "$_fict_token" ] && { printf '%s\n' "$_fict_token"; return 0; }
              fi
              printf '%s\n' fallback
          }
          '''
          new_token = '\n'.join(line[10:] if line.startswith('          ') else line for line in new_token.splitlines()) + '\n'
          text, n = re.subn(r'_font_inventory_cache_token\(\) \{.*?\n\}\n\n_font_anchor_cache_lookup', new_token + '\n_font_anchor_cache_lookup', text, count=1, flags=re.S)
          if n != 1:
              raise SystemExit('rom_adapters: inventory token replacement failed')

          text = text.replace(
              '''_font_anchor_cache_lookup() {
              _facl_src="$1"
              _facl_key="$2"
              command -v sha256sum >/dev/null 2>&1 || return 1
              _facl_sha=$(sha256sum "$_facl_src" 2>/dev/null | awk '{print $1}')
          ''',
              '''_font_anchor_cache_lookup() {
              _facl_src="$1"
              _facl_key="$2"
              _facl_sha="${3:-}"
              if [ -z "$_facl_sha" ]; then
                  if command -v sha256sum >/dev/null 2>&1; then
                      _facl_sha=$(sha256sum "$_facl_src" 2>/dev/null | awk '{print $1}')
                  elif command -v busybox >/dev/null 2>&1; then
                      _facl_sha=$(busybox sha256sum "$_facl_src" 2>/dev/null | awk '{print $1}')
                  fi
              fi
          ''',
              1,
          )
          text = text.replace(
              '''    normalizer="$module/common/font_metrics_normalize.py"
              rm -f "$anchor" 2>/dev/null || true
          
              # 命中缓存则直接硬链接，跳过 Python 归一化
              if _fa_cached=$(_font_anchor_cache_lookup "$src" "$key"); then
          ''',
              '''    normalizer="$module/common/font_metrics_normalize.py"
              _fa_sha=''
              if command -v sha256sum >/dev/null 2>&1; then
                  _fa_sha=$(sha256sum "$src" 2>/dev/null | awk '{print $1}')
              elif command -v busybox >/dev/null 2>&1; then
                  _fa_sha=$(busybox sha256sum "$src" 2>/dev/null | awk '{print $1}')
              fi
              rm -f "$anchor" 2>/dev/null || true
          
              # 命中缓存则直接硬链接，跳过 Python 归一化
              if _fa_cached=$(_font_anchor_cache_lookup "$src" "$key" "$_fa_sha"); then
          ''',
              1,
          )
          old_cache_write = '''    # 写入归一化缓存，供下次切换同字体秒切
              if command -v sha256sum >/dev/null 2>&1; then
                  _fa_sha=$(sha256sum "$src" 2>/dev/null | awk '{print $1}')
                  if [ -n "$_fa_sha" ]; then
                      _fa_cache="$module/config/metrics_cache"
                      mkdir -p "$_fa_cache" 2>/dev/null || true
                      _fa_inventory=$(_font_inventory_cache_token)
                      [ -n "$_fa_inventory" ] || _fa_inventory=fallback
                      _fa_cached="$_fa_cache/${_fa_sha}_${key}_v${LUOSHU_NORMALIZER_VERSION}_${_fa_inventory}.font"
                      ln "$anchor" "$_fa_cached" 2>/dev/null || cp -f "$anchor" "$_fa_cached" 2>/dev/null || true
                  fi
              fi
          '''
          new_cache_write = '''    # 写入归一化缓存，供下次切换同字体秒切；复用本次已计算的源 SHA。
              if [ -n "$_fa_sha" ]; then
                  _fa_cache="$module/config/metrics_cache"
                  mkdir -p "$_fa_cache" 2>/dev/null || true
                  _fa_inventory=$(_font_inventory_cache_token)
                  [ -n "$_fa_inventory" ] || _fa_inventory=fallback
                  _fa_cached="$_fa_cache/${_fa_sha}_${key}_v${LUOSHU_NORMALIZER_VERSION}_${_fa_inventory}.font"
                  ln "$anchor" "$_fa_cached" 2>/dev/null || cp -f "$anchor" "$_fa_cached" 2>/dev/null || true
              fi
          '''
          if old_cache_write not in text:
              raise SystemExit('rom_adapters: cache write block missing')
          text = text.replace(old_cache_write, new_cache_write, 1)

          new_entries = r'''_device_font_inventory_entries() {
              _dfie_module="$(_device_font_inventory_module)"
              _dfie_json="$_dfie_module/config/device_font_inventory.json"
              _dfie_cache="$_dfie_module/config/device_font_inventory.tsv"
              _dfie_json_mtime=0
              _dfie_cache_mtime=0
              if command -v stat >/dev/null 2>&1; then
                  _dfie_json_mtime=$(stat -c '%Y' "$_dfie_json" 2>/dev/null || echo 0)
                  _dfie_cache_mtime=$(stat -c '%Y' "$_dfie_cache" 2>/dev/null || echo 0)
              elif command -v toybox >/dev/null 2>&1; then
                  _dfie_json_mtime=$(toybox stat -c '%Y' "$_dfie_json" 2>/dev/null || echo 0)
                  _dfie_cache_mtime=$(toybox stat -c '%Y' "$_dfie_cache" 2>/dev/null || echo 0)
              fi
              case "$_dfie_json_mtime" in ''|*[!0-9]*) _dfie_json_mtime=0 ;; esac
              case "$_dfie_cache_mtime" in ''|*[!0-9]*) _dfie_cache_mtime=0 ;; esac
              if [ -s "$_dfie_cache" ] && [ "$_dfie_cache_mtime" -ge "$_dfie_json_mtime" ] 2>/dev/null; then
                  cat "$_dfie_cache"
                  return 0
              fi
              _dfie_tmp="${_dfie_cache}.tmp.$$"
              if _device_font_inventory_exec --list --output "$_dfie_json" > "$_dfie_tmp" 2>/dev/null && [ -s "$_dfie_tmp" ]; then
                  mv -f "$_dfie_tmp" "$_dfie_cache" 2>/dev/null || { rm -f "$_dfie_tmp"; return 1; }
                  chmod 0644 "$_dfie_cache" 2>/dev/null || true
                  cat "$_dfie_cache"
                  return 0
              fi
              rm -f "$_dfie_tmp" 2>/dev/null || true
              return 1
          }
          '''
          new_entries = '\n'.join(line[10:] if line.startswith('          ') else line for line in new_entries.splitlines()) + '\n'
          text, n = re.subn(r'_device_font_inventory_entries\(\) \{.*?\n\}\n\n_device_font_inventory_target', new_entries + '\n_device_font_inventory_target', text, count=1, flags=re.S)
          if n != 1:
              raise SystemExit('rom_adapters: inventory entries replacement failed')
          ra.write_text(text)

          fs = root / 'common/font_safety.sh'
          text = fs.read_text()
          text = text.replace('_ldt_size=$(wc -c < "$_ldt_dest" 2>/dev/null | tr -d \'[:space:]\')', '_ldt_size=$(_luoshu_filesize "$_ldt_dest")')
          text = text.replace('_lpv_size=$(wc -c < "$_lpv_file" 2>/dev/null | tr -d \'[:space:]\')', '_lpv_size=$(_luoshu_filesize "$_lpv_file")')
          if 'wc -c < "$_ldt_dest"' in text or 'wc -c < "$_lpv_file"' in text:
              raise SystemExit('font_safety: full-read size checks remain')
          fs.write_text(text)

          fst = root / 'common/font_switch_task.sh'
          text = fst.read_text()
          text = text.replace(
              '# 首次处理大型 CJK 字体时，度量归一化和本机清单映射可能合理超过 45 秒。\n'
              '# 保留硬超时保护，但给真实准备流程留出足够时间；App 观察窗口仍为 120 秒。\n'
              'TIMEOUT_SECONDS="${LUOSHU_SWITCH_TIMEOUT_SECONDS:-105}"\n'
              'case "$TIMEOUT_SECONDS" in \'\'|*[!0-9]*) TIMEOUT_SECONDS=105 ;; esac',
              '# 单字体切换的性能回归门槛保持 45 秒；正常目标为约 10–20 秒。\n'
              '# 超时仍强制终止并由事务层恢复上一套有效字体。\n'
              'TIMEOUT_SECONDS="${LUOSHU_SWITCH_TIMEOUT_SECONDS:-45}"\n'
              'case "$TIMEOUT_SECONDS" in \'\'|*[!0-9]*) TIMEOUT_SECONDS=45 ;; esac',
              1,
          )
          text = text.replace('正在校准并映射系统字体槽，首次应用可能较慢', '正在验证并快速映射系统字体槽')
          fst.write_text(text)

          customize = root / 'customize.sh'
          text = customize.read_text()
          text = text.replace(
              '''if [ ! -s "$FONT_INVENTORY_OUTPUT" ] && [ -s "$OLD_MOD/config/device_font_inventory.json" ]; then
              cp -f "$OLD_MOD/config/device_font_inventory.json" "$FONT_INVENTORY_OUTPUT" 2>/dev/null || true
          fi
          ''',
              '''if [ ! -s "$FONT_INVENTORY_OUTPUT" ] && [ -s "$OLD_MOD/config/device_font_inventory.json" ]; then
              cp -f "$OLD_MOD/config/device_font_inventory.json" "$FONT_INVENTORY_OUTPUT" 2>/dev/null || true
              [ ! -s "$OLD_MOD/config/device_font_inventory.tsv" ] || \
                  cp -f "$OLD_MOD/config/device_font_inventory.tsv" "$MODPATH/config/device_font_inventory.tsv" 2>/dev/null || true
          fi
          ''',
              1,
          )
          text = text.replace(
              '''    if [ "$_inventory_rc" -eq 0 ]; then
              _inventory_files=$(printf '%s' "$_inventory_result" | sed -n 's/.*"stockFontFileCount"[[:space:]]*:[[:space:]]*\\([0-9][0-9]*\\).*/\\1/p' | tail -n1)
          ''',
              '''    if [ "$_inventory_rc" -eq 0 ]; then
              _inventory_list_script="$MODPATH/common/font_inventory.py"
              _inventory_list_output="$MODPATH/config/device_font_inventory.tsv"
              _inventory_list_tmp="${_inventory_list_output}.tmp.$$"
              if [ -f "$_inventory_list_script" ]; then
                  PYTHONHOME="$_inventory_pyroot" \
                  PYTHONPATH="$_inventory_pyroot/lib/python3.14:$_inventory_pyroot/lib/python3.14/site-packages:$MODPATH/common" \
                  LD_LIBRARY_PATH="$_inventory_pyroot/lib:$_inventory_pyroot/lib/python3.14/lib-dynload${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \
                      "$FONT_INVENTORY_PYTHON" "$_inventory_list_script" --list --output "$FONT_INVENTORY_OUTPUT" \
                      > "$_inventory_list_tmp" 2>> "$FONT_INVENTORY_LOG" && [ -s "$_inventory_list_tmp" ] && \
                      mv -f "$_inventory_list_tmp" "$_inventory_list_output" 2>/dev/null || rm -f "$_inventory_list_tmp" 2>/dev/null
                  chmod 0644 "$_inventory_list_output" 2>/dev/null || true
              fi
              _inventory_files=$(printf '%s' "$_inventory_result" | sed -n 's/.*"stockFontFileCount"[[:space:]]*:[[:space:]]*\\([0-9][0-9]*\\).*/\\1/p' | tail -n1)
          ''',
              1,
          )
          customize.write_text(text)

          manifest = root / 'scripts/module_payload_manifest.txt'
          text = manifest.read_text()
          text = text.replace('common/font_safety.sh\ncommon/font_switch_task.sh\n', 'common/font_safety.sh\ncommon/font_validation_cache.sh\ncommon/font_switch_task.sh\n', 1)
          manifest.write_text(text)

          test_script = r'''#!/bin/sh
          set -eu
          ROOT="$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)"
          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT

          export MODULE_DIR="$TMP/module"
          export MODDIR="$MODULE_DIR"
          export CONFIG_DIR="$MODULE_DIR/config"
          mkdir -p "$CONFIG_DIR"

          . "$ROOT/common/font_validation_cache.sh"
          calls="$TMP/validator.calls"
          font_validate_global() {
              printf 'call\n' >> "$calls"
              FONT_CHECK_FORMAT=TTF
              FONT_CHECK_SIZE=8192
              FONT_CHECK_VARIABLE=false
              FONT_CHECK_COLOR=false
              FONT_CHECK_WARNING=''
              FONT_CHECK_COVERAGE=ok
              FONT_CHECK_ERROR=''
              return 0
          }

          source_font="$TMP/source.ttf"
          dd if=/dev/zero of="$source_font" bs=4096 count=2 status=none
          luoshu_font_validate_global_cached "$source_font"
          [ "${LUOSHU_FONT_VALIDATION_CACHE_HIT:-false}" = false ]
          luoshu_font_validate_global_cached "$source_font"
          [ "${LUOSHU_FONT_VALIDATION_CACHE_HIT:-false}" = true ]
          [ "$(wc -l < "$calls" | tr -d ' ')" -eq 1 ]
          printf 'x' >> "$source_font"
          luoshu_font_validate_global_cached "$source_font"
          [ "${LUOSHU_FONT_VALIDATION_CACHE_HIT:-false}" = false ]
          [ "$(wc -l < "$calls" | tr -d ' ')" -eq 2 ]

          . "$ROOT/common/rom_adapters.sh"
          alias_font="$TMP/alias.font"
          dd if=/dev/zero of="$alias_font" bs=1048576 count=8 status=none
          i=1
          while [ "$i" -le 24 ]; do
              ln "$alias_font" "$TMP/alias-$i.ttf"
              _verify_font_copy "$TMP/alias-$i.ttf"
              i=$((i + 1))
          done
          verify_body="$(awk '/^_verify_font_copy\(\)/,/^}/' "$ROOT/common/rom_adapters.sh")"
          printf '%s\n' "$verify_body" | grep -q '_font_file_size_fast'
          ! printf '%s\n' "$verify_body" | grep -q 'wc -c'

          printf '{"state":"ready"}\n' > "$CONFIG_DIR/device_font_inventory.json"
          sleep 1
          printf '/system/fonts/Roboto-Regular.ttf\tRoboto-Regular.ttf\tsystem\tTTF\t400\tnormal\txml\n' > "$CONFIG_DIR/device_font_inventory.tsv"
          inventory_exec_calls="$TMP/inventory.calls"
          _device_font_inventory_exec() { printf 'called\n' >> "$inventory_exec_calls"; return 1; }
          inventory_lines="$(_device_font_inventory_entries)"
          printf '%s\n' "$inventory_lines" | grep -q 'Roboto-Regular.ttf'
          [ ! -e "$inventory_exec_calls" ]

          safety_validate="$(awk '/^luoshu_payload_validate_current\(\)/,/^}/' "$ROOT/common/font_safety.sh")"
          ! printf '%s\n' "$safety_validate" | grep -q 'wc -c'
          grep -q 'LUOSHU_SWITCH_TIMEOUT_SECONDS:-45' "$ROOT/common/font_switch_task.sh"
          grep -q 'luoshu_switch_perf_mark complete' "$ROOT/common/font_manager.sh"

          echo 'font_switch_performance_test: PASS'
          '''
          test_script = '\n'.join(line[10:] if line.startswith('          ') else line for line in test_script.splitlines()) + '\n'
          (root / 'scripts/font_switch_performance_test.sh').write_text(test_script)

          check = root / 'scripts/check.sh'
          text = check.read_text()
          text = text.replace('common/font_provider_cache.sh \\\n', 'common/font_provider_cache.sh common/font_validation_cache.sh \\\n', 1)
          text = text.replace('scripts/auto_multiweight_mode_test.sh scripts/auto_multiweight_engine_test.sh scripts/mix_finalize_performance_test.sh scripts/font_library_ui_layout_test.sh scripts/v2_source_audit.sh \\\n',
                              'scripts/auto_multiweight_mode_test.sh scripts/auto_multiweight_engine_test.sh scripts/mix_finalize_performance_test.sh scripts/font_switch_performance_test.sh scripts/font_library_ui_layout_test.sh scripts/v2_source_audit.sh \\\n', 1)
          text = text.replace('sh "$ROOT/scripts/mix_finalize_performance_test.sh"\n', 'sh "$ROOT/scripts/mix_finalize_performance_test.sh"\nsh "$ROOT/scripts/font_switch_performance_test.sh"\n', 1)
          check.write_text(text)
          PY

          chmod 0755 common/font_validation_cache.sh scripts/font_switch_performance_test.sh
          sh -n common/font_validation_cache.sh
          sh -n common/font_manager.sh
          sh -n common/rom_adapters.sh
          sh -n common/font_safety.sh
          sh -n common/font_switch_task.sh
          sh -n customize.sh
          sh scripts/font_switch_performance_test.sh
          sh scripts/font_switch_task_test.sh

      - name: Commit changes
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add common/font_validation_cache.sh common/font_manager.sh common/rom_adapters.sh common/font_safety.sh \
            common/font_switch_task.sh customize.sh scripts/module_payload_manifest.txt scripts/check.sh \
            scripts/font_switch_performance_test.sh
          git commit -m 'perf: restore fast single-font switching'
          git push origin HEAD:fix/v2.2.1-switch-timeout-status
