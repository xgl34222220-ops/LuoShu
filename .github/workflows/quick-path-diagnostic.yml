name: Quick path diagnostic
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - common/device_font_payload_policy.sh
      - scripts/device_font_foreground_quick_test.sh
      - .github/workflows/quick-path-diagnostic.yml
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Capture quick-path trace
        shell: bash
        run: |
          set +e
          bash -x scripts/device_font_foreground_quick_test.sh > /tmp/quick-path.log 2>&1
          printf '%s\n' "$?" > /tmp/quick-path.rc
          cat /tmp/quick-path.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quick-path-diagnostic
          path: |
            /tmp/quick-path.log
            /tmp/quick-path.rc
          if-no-files-found: error
          retention-days: 2
      - name: Enforce result
        if: always()
        run: test "$(cat /tmp/quick-path.rc)" = 0
