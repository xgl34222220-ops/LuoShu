name: Remove merged meta font safety branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/delete-meta-font-safety-branch.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'agent/meta-module-font-safety';
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
              core.info(`Deleted ${branch}`);
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) throw error;
              core.info(`${branch} was already absent`);
            }

      - name: Remove this one-shot workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.github/workflows/delete-meta-font-safety-branch.yml';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            await github.rest.repos.deleteFile({
              owner,
              repo,
              path,
              branch: 'main',
              sha: current.data.sha,
              message: 'chore: remove one-shot merged branch cleanup [skip ci]'
            });
