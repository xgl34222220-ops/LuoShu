name: Build hybrid app

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - android-app/**
      - webroot/**
      - common/app_bridge.sh
      - .github/workflows/build-hybrid-app.yml
  push:
    branches:
      - feature/v14.2-hybrid-app-alpha1
    paths:
      - android-app/**
      - webroot/**
      - common/app_bridge.sh
      - .github/workflows/build-hybrid-app.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Build debug APK
        working-directory: android-app
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Verify APK
        run: |
          apk='android-app/app/build/outputs/apk/debug/app-debug.apk'
          test -s "$apk"
          unzip -t "$apk" >/dev/null
          sha256sum "$apk" > "$apk.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: LuoShu-v14.2-Hybrid-Alpha1
          path: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/debug/app-debug.apk.sha256
          if-no-files-found: error
          retention-days: 14
