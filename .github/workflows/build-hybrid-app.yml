name: Build App-only integrated artifacts

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches:
      - feature/v14.2-hybrid-app-alpha5-miuix

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Install module build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null

      - uses: actions/cache@v4
        with:
          path: common/python
          key: luoshu-arm64-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare_composite_runtime.sh') }}

      - name: Prepare ARM64 composite runtime
        shell: bash
        run: |
          if [[ ! -x common/python/bin/luoshu-python ]]; then
            sh ./scripts/prepare_composite_runtime.sh
          fi

      - name: Build isolated debug App
        working-directory: android-app
        shell: bash
        run: gradle --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee gradle-build.log

      - name: Build and verify single App-only package
        shell: bash
        run: |
          set -euo pipefail
          . ./scripts/version.sh
          apk='android-app/app/build/outputs/apk/debug/app-debug.apk'
          test -s "$apk"
          mkdir -p dist
          app="dist/LuoShu-App-${LUOSHU_ARTIFACT_VERSION}-Debug.apk"
          cp -f "$apk" "$app"
          (cd dist && sha256sum "$(basename "$app")" > "$(basename "$app").sha256")
          LUOSHU_APP_APK="$apk" sh ./scripts/build.sh
          module="dist/LuoShu-${LUOSHU_ARTIFACT_VERSION}.zip"
          test -s "$module"
          unzip -t "$module" >/dev/null
          unzip -Z1 "$module" | grep -qx 'bundled/LuoShu-App.apk'
          ! unzip -Z1 "$module" | grep -qE '(^|/)webroot(/|$)'
          unzip -p "$module" bundled/LuoShu-App.apk > "$RUNNER_TEMP/embedded.apk"
          cmp -s "$apk" "$RUNNER_TEMP/embedded.apk"
          (cd dist && sha256sum -c "$(basename "$module").sha256")
          (cd dist && sha256sum -c "$(basename "$app").sha256")

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LuoShu-App-Only-Gradle-Log
          path: android-app/gradle-build.log
          if-no-files-found: warn
          retention-days: 3

      - name: Upload App-only artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EXTRACT-FIRST-LuoShu-App-Only
          path: dist/*
          if-no-files-found: error
          retention-days: 14
