name: Finalize App Font Import UI

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/app-realweight-materialize.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feature/v14.3-app-auto-multiweight-import'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v14.3-app-auto-multiweight-import
          fetch-depth: 0

      - name: Patch App import UI
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('android-app/app/src/main/java/io/github/xgl34222220/luoshu/LuoShuApp.kt')
          lines = path.read_text(encoding='utf-8').splitlines()

          # Allow selecting Magisk/KernelSU/APatch font-module ZIPs.
          if not any('"application/zip"' in line for line in lines):
              index = next(i for i, line in enumerate(lines) if '"application/vnd.ms-opentype"' in line)
              indent = lines[index][: len(lines[index]) - len(lines[index].lstrip())]
              lines.insert(index + 1, f'{indent}"application/zip",')

          # Wire the installed-module scanner into the Library page call.
          if not any('onScanModules = viewModel::importInstalledFontModules' in line for line in lines):
              start = next(i for i, line in enumerate(lines) if 'AppPage.Library -> LibraryPage(' in line)
              end = next(i for i in range(start, min(start + 80, len(lines))) if 'modifier = Modifier.padding(padding)' in lines[i])
              indent = lines[end][: len(lines[end]) - len(lines[end].lstrip())]
              lines.insert(end, f'{indent}onScanModules = viewModel::importInstalledFontModules,')

          # Add the callback to LibraryPage's signature.
          if not any('onScanModules: () -> Unit' in line for line in lines):
              start = next(i for i, line in enumerate(lines) if line.strip() == 'private fun LibraryPage(')
              index = next(i for i in range(start, start + 20) if lines[i].strip() == 'onImport: () -> Unit,')
              indent = lines[index][: len(lines[index]) - len(lines[index].lstrip())]
              lines.insert(index + 1, f'{indent}onScanModules: () -> Unit,')

          # Replace the old single import button with file and installed-module actions.
          if not any('Text("扫描模块")' in line for line in lines):
              close = next(i for i, line in enumerate(lines) if ') { Text("选择字体") }' in line)
              start = close
              while start >= 0 and lines[start].strip() != 'Button(':
                  start -= 1
              if start < 0:
                  raise SystemExit('cannot locate import button')
              indent = lines[start][: len(lines[start]) - len(lines[start].lstrip())]
              child = indent + '    '
              replacement = [
                  f'{indent}Column(horizontalAlignment = Alignment.End, verticalArrangement = Arrangement.spacedBy(8.dp)) {{',
                  f'{child}Button(',
                  f'{child}    onClick = onImport,',
                  f'{child}    enabled = !viewModel.operationBusy && !viewModel.mixState.busy,',
                  f'{child}    shape = RoundedCornerShape(16.dp),',
                  f'{child}) {{ Text("选择文件") }}',
                  f'{child}OutlinedButton(',
                  f'{child}    onClick = onScanModules,',
                  f'{child}    enabled = !viewModel.operationBusy && !viewModel.mixState.busy,',
                  f'{child}    shape = RoundedCornerShape(16.dp),',
                  f'{child}) {{ Text("扫描模块") }}',
                  f'{indent}}}',
              ]
              lines[start : close + 1] = replacement

          text = '\n'.join(lines) + '\n'
          text = text.replace(
              '从系统文件选择器导入 TTF / OTF / TTC；可多选，同字体族会自动归组。',
              '导入 TTF / OTF / TTC 或 Magisk 字体模块 ZIP；按内部字体族和真实字重自动归组。',
          )
          text = text.replace(
              '点击上方“选择字体”导入，或手动放入 /sdcard/LuoShu/fonts/',
              '选择字体文件或 Magisk 模块 ZIP，也可扫描当前已安装的字体模块。',
          )
          text = text.replace(
              '默认使用 APP 专属多字重，自动生成 300 / 400 / 500 / 600 / 700 五档；需要固定粗细时再切换到手动字重。WebUI 不提供这些入口。',
              '默认读取字体内部 OS/2 / fvar 信息：单字重只生成自身一档，静态家族使用实际文件档位，可变字体使用自身命名实例或轴范围；需要固定粗细时再切换到手动字重。WebUI 不提供这些入口。',
          )

          required = [
              '"application/zip"',
              'onScanModules = viewModel::importInstalledFontModules',
              'onScanModules: () -> Unit',
              'Text("扫描模块")',
              'Magisk 字体模块 ZIP',
              '单字重只生成自身一档',
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f'UI patch incomplete: {missing}')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify implementation
        shell: bash
        run: |
          set -euo pipefail
          sh -n common/app_bridge.sh
          sh -n common/app_font_import.sh
          sh -n common/app_multiweight_mix.sh
          sh -n common/app_multiweight_real.sh
          sh -n common/font_check.sh
          sh -n common/font_metadata_runtime.sh
          sh -n common/rom_adapters.sh
          python3 -m py_compile common/font_metadata.py common/font_package_import.py common/font_family_rewrite.py common/font_instance.py
          sh scripts/check_app_only_features.sh

      - name: Commit final implementation and cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/realweight-fix .github/realweight-source
          rm -f .github/workflows/app-realweight-materialize.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'feat(app): recognize fonts inside Magisk modules'
          git push origin HEAD:feature/v14.3-app-auto-multiweight-import
