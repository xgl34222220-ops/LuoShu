name: v2.2 payload runtime guard
on:
  pull_request:
    branches:
      - main
    paths:
      - common/device_font_payload_runtime.sh
      - common/device_font_payload_bridge.sh
      - common/font_provider_cache.sh
      - common/module_update_state.sh
      - customize.sh
      - scripts/device_font_payload_runtime_test.sh
      - scripts/module_update_state_test.sh
      - scripts/check.sh
      - .github/workflows/v22-runtime-guard.yml
permissions:
  contents: read
jobs:
  runtime-guard:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install source-check dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends curl unzip zip file python3-venv fonts-noto-cjk fonts-dejavu-core >/dev/null
      - name: Prepare ARM64 font runtime
        run: sh scripts/prepare_composite_runtime.sh
      - name: Capture payload, migration and source guards
        shell: bash
        run: |
          set +e
          mkdir -p diagnostic
          sh -x scripts/device_font_payload_runtime_test.sh > diagnostic/runtime.log 2>&1
          printf '%s\n' "$?" > diagnostic/runtime-rc.txt
          sh -x scripts/module_update_state_test.sh > diagnostic/update.log 2>&1
          printf '%s\n' "$?" > diagnostic/update-rc.txt
          sh -x scripts/check.sh > diagnostic/source.log 2>&1
          printf '%s\n' "$?" > diagnostic/source-rc.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v22-runtime-guard
          path: diagnostic
          if-no-files-found: error
      - name: Enforce payload, migration and source guards
        run: |
          test "$(cat diagnostic/runtime-rc.txt)" = 0
          test "$(cat diagnostic/update-rc.txt)" = 0
          test "$(cat diagnostic/source-rc.txt)" = 0
