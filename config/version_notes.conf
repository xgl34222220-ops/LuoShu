version=v2.2.0 Alpha 5
summary=设备字体清单、真实本机度量基准与 inventory-first ROM 映射测试版
notes=v2.2.0 Alpha 5 在 Alpha 4 单字重前台快速硬链接切换、45 秒超时回滚与后台设备对齐基础上，新增安装阶段原厂设备字体清单：在模块 Overlay 生效前扫描 system、system_ext、product、my_product、vendor，解析 fonts.xml 与 font_fallback.xml 的 family、alias、字重、样式及 TTC 索引，并对 MiSans、SysFont、SysSans、OPPO/OPlus、Google Sans、Roboto、DIN 等隐藏槽位做保守探测与现有字体格式校验；每个槽位记录真实路径、分区、UPEM、hhea 和 OS/2 度量。系统指纹相同时复用清单，OTA 指纹变化时自动失效重扫。字体度量归一化与 ROM 映射优先采用真机 inventory，缺失、损坏、过期或扫描失败时继续使用旧静态清单和固定比例回退，不伪装成设备对齐已生效。模块 versionCode 20195，Debug App versionCode 2019501。本版本仅供 HyperOS 3、ColorOS 16 真机覆盖与位置验证，不是正式版。
