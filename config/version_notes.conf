notes=v2.1.0 聚焦 App 界面：字体库卡片左上角 Aa 图标改为用字体本身实时渲染（可变字体按 400 字重），一眼认出字体气质；Material 风格底部导航新增弹簧动画滑动选中指示器，与 Miuix 一致；补全两套排版的 headlineSmall/titleSmall/bodyLarge/bodySmall/labelSmall 档位，全 App 文字层级更统一。无字体引擎行为变更。模块 versionCode 20100，正式 App versionCode 2010001。
