version=v2.2.0
summary=全机原厂字体自适应、快速当前字重组合与组合页布局修复
notes=v2.2.0 正式版整合 Alpha 8 与 Alpha 9 的核心改进：revision 3 扫描器按设备独立读取 system、system_ext、product、my_product、vendor 及受支持的 OEM 字体与 XML 来源，分别统计原厂字体路径、物理唯一文件和安全可替换 UI 槽位，并把主题字体和活动覆盖作为独立诊断信息，避免误算或跨 ROM 套用固定模板。组合引擎恢复静态多字重字体的快速当前字重模式，不再因为检测到多个静态字重就默认生成 100–900 九档大型 CJK 复合；真正包含 wght 设计轴的可变字体仍保留完整自动多字重能力。原生 App 修复组合页长能力标签挤压标题与说明文字的问题，能力摘要改为紧凑档位数量，完整字重继续由下方控件展示。后台任务守护、字体切换回滚、缓存复用、原生 App 内置与固定签名发布流程继续保留。模块 versionCode 20200，正式 App versionCode 2020001。当前已针对 HyperOS 3 与 ColorOS 16 进行重点验证，其他 ROM 使用设备自适应清单，不宣称所有设备具有相同槽位数量。