notes=v2.2.0 Alpha 2 修复 App 将残留 axes_task.conf 的 queued/running 状态误判为后台仍在组合的问题：任务状态现在必须同时匹配存活 PID、任务 sidecar 和 Worker 命令行；启动瞬间保留 20 秒安全窗口，失效任务会自动标记失败并清理，不再阻止普通字体应用。继续包含逐设备原厂槽位、系统/OEM XML、动态 Google Sans 只读配置视图与安全回退。模块 versionCode 20192，Debug App versionCode 2019201。
