version=v14.3.1
summary=正式版发布修订：修复签名 Release 测试任务门禁
notes=洛书 v14.3.1 保持 v14.3 的 Material 3 Glass / Miuix 双皮肤、字体库本地索引秒开、轻量目录指纹、真实可变轴、静态多字重、中文/英文/数字复合、字形覆盖诊断与安全导入能力不变；本修订仅修复正式签名发布工作流错误调用不存在的 testReleaseUnitTest，改为执行项目实际存在且已长期用于验证的 testDebugUnitTest，再继续 lintRelease、assembleRelease、证书校验及 Full/Lite 成品发布。Full 模块继续内置并自动安装或更新固定签名 App，Lite 不内置 App。
