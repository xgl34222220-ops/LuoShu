version=v2.2.1
summary=单字体切换性能恢复、验证缓存与失败状态修复
notes=v2.2.1 修复 v2.2.0 真机反馈中的单字体切换性能回退：大型 CJK 字体映射到多个 ROM 槽位时改用 stat 读取元数据，避免对同一硬链接反复完整读取；App 完整验证结果按路径、设备号、inode、大小与时间戳缓存，字体未变化时由后台切换任务安全复用，文件变化后自动重新完整验证；继续保留 45 秒硬超时与事务回滚，不采用 105 秒放宽方案；新增验证、事务快照、槽位映射、负载校验、挂载同步与事务提交的分阶段耗时日志；切换失败或回滚时改为错误提示，不再显示绿色成功勾。所有 ROM 仍优先使用当前设备扫描生成的原厂字体清单。模块 versionCode 20201，正式 App versionCode 2020101。
