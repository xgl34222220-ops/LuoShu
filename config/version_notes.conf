version=v2.2.0 Alpha 1
summary=逐设备原厂字体槽位引擎首个真机候选
notes=v2.2.0 Alpha 1 将字体切换接入逐设备原厂模板：按 UI、时钟、Mono、OEM 与动态 Google Sans 槽分别生成并继承原厂行框、基线和字宽；系统/OEM XML 逐节点映射，完整动态 family 在 FontManagerService 初始化前使用只读 config.xml 视图接管；不再覆盖 /data/fonts/files。该版本仅用于 ColorOS/HyperOS 真机验证，未通过 Play 商店、输入框、时钟和混排验收前不作为正式版发布。模块 versionCode 20191，Debug App versionCode 2019101。
