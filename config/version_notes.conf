version=v2.2.2-alpha1
summary=字体管理、目录监视、配置与字体归档、匿名真机矩阵和预发行门禁
notes=v2.2.2-alpha1 将现有字体分析、设备模板、组合引擎与字体索引完整呈现在原生 App：新增 SHA-256、稳定 ID、TTC 字体面、字形覆盖和可变轴详情；首页增加设备可信状态、脱敏诊断和真机验收；字体工坊增加 A/B 组合预览、快速字重方案、JSON 方案导入导出和 Unicode 字形浏览；字体库增加 Family 分组、收藏、标签、重复与命名冲突提示、SAF 目录监视、配置备份恢复和发布前迁移检查；新增真实字体文件 ZIP 归档与逐文件 SHA-256 manifest；新增不记录设备型号、指纹、序列号、字体名称或路径的匿名真机测试矩阵，以及可生成并强制执行的预发行就绪报告。候选版本不修改字体生成、挂载、度量、事务与回滚核心逻辑。模块 versionCode 20202，App versionCode 2020201。
