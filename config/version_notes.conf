version=v2.2.0 Alpha 7
summary=修复原厂字体探测固定显示 18 槽位，并区分全部字体文件与可替换 UI 槽位
notes=v2.2.0 Alpha 7 修复设备字体清单的统计与分区扫描问题。旧扫描器把 family 名称中的 serif 当作简单子串过滤，导致标准 sans-serif 家族也被误判为衬线字体，XML 主 UI 映射大量被丢弃，最后主要依赖文件名启发式探测，因此 ColorOS 与 HyperOS 很容易都显示相同的 18 个槽位。新版扫描器修正 sans-serif 分类，读取 system、system_ext、product、my_product、vendor 各分区的 fonts*.xml、font_fallback*.xml 与 fonts_customization.xml，并优先在 XML 所属分区解析同名字体。安装输出不再把槽位数冒充为原厂字体总数，而是分别显示全部原厂字体文件数、可替换 UI 槽位数以及 XML/OEM 启发式来源。清单新增 scannerRevision=2 与 scanSummary，旧版同指纹清单会自动升级重扫。Alpha 6 的组合任务身份文件修复、PID 守护、超时回滚和 Alpha 5 的真实度量/后台设备对齐全部保留。模块 versionCode 20197，Debug App versionCode 2019701。本版本仍为 HyperOS 3、ColorOS 16 真机测试版。
