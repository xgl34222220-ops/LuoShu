version=v2.2.0 Alpha 8
summary=扩展全机原厂字体探测，区分路径数、唯一文件、主题覆盖与真实 UI 槽位
notes=v2.2.0 Alpha 8 根据真机字体检测脚本补全诊断范围，但不把主题字体和活动覆盖误算成原厂字体。新版 revision 3 扫描器在 system、system_ext、product、my_product、vendor 主分区之外，补充统计 odm、oem、my_region、hw_product 字体目录，并兼容 /system/product、/system/system_ext、/system/font 等别名路径；同一目录只选择规范路径或别名路径之一，另外通过设备号与 inode 统计物理唯一文件，避免硬链接或分区别名造成重复。/data/system/theme、/data/fonts、ColorOS、vivo 等主题目录和字体挂载单独记录为覆盖证据，不进入原厂 UI 槽位映射。清单新增原厂字体路径数、物理唯一文件数、分区明细、主题覆盖目录、字体挂载目标及 MiSans、SysFont/OPlusSans、Roboto 等 ROM 字体特征。运行时可替换槽位仍只接受安全支持的系统分区与有效 XML/OEM 映射，避免把主题包或无关字体批量覆盖。Alpha 7 的 sans-serif 修复、分区 XML 解析以及 Alpha 6 的组合任务守护全部保留。模块 versionCode 20198，Debug App versionCode 2019801。本版本仍为 HyperOS 3、ColorOS 16 真机测试版。
