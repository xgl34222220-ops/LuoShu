notes=v2.0.9 补上 v2.0.8 未触及的真根因：复合字体构建时 head 包围盒要保存时才重算，归一化读到的 yMax/yMin 是中文基底的陈旧值，导入的英文/数字字形墨迹从未被度量包住。现在归一化遍历全部字形轮廓（BoundsPen，glyf 与 CFF 通吃）取真实墨迹极值，hhea 与 typo 度量真正包住字形。win 度量保持收敛上限不变。负载架构升级 v6，归一化缓存 v5，复合/多字重缓存代际全量递增。模块 versionCode 20009，正式 App versionCode 2000901。
