version=v2.2.3
summary=修复设备字体验证、字体应用超时与任务中心操作按钮对齐
notes=v2.2.3 修复 v2.2.2 正式版的三个主要问题：完整重启后自动执行设备字体加载验证，并在 OEM 系统隐藏 FontManager 明细时使用系统可见挂载文件与 SHA-256 作为明确标注的挂载证据；字体应用前台阶段改为快速格式预检，完整字形、安全与覆盖验证继续在独立 Root 后台事务中执行，任务不再依赖 App 的 su 会话，安全超时提升至 110 秒且仍保留失败回滚；校正 MIUIx 任务中心右上角诊断与刷新按钮的视觉中线。模块 versionCode 20203，App versionCode 2020301。
