version=v2.2.0 Alpha 4
summary=单字重前台快速硬链接映射、45 秒超时回滚与后台设备对齐测试版
notes=v2.2.0 Alpha 4 作废 Alpha 3 的假快速链：单字重字体前台只建立一份源字体锚点，100–900、MiSans、Roboto、Google Sans 与时钟目标仅创建共享 inode 的硬链接，不再在应用按钮中执行度量归一化、变量字重实例化或九档轮廓生成；Meta OverlayFS 内容目录同步优先保留硬链接，避免同一大字体被复制几十份；字体切换统一经过 45 秒硬超时守卫，超时或进程异常会终止任务并由事务恢复上一套负载；任务中心对同一次应用只显示一个实时任务。真实多字重与逐槽位偏移校准继续由后台设备对齐缓存完成，只有开机加载验证通过后才标记已对齐。模块 versionCode 20194，Debug App versionCode 2019401。本版本仅供 HyperOS 3、ColorOS 16 真机验证，不是正式版。
