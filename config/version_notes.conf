summary=typo 度量同步包住字形轮廓，根治标题重叠与标签裁切
notes=v2.0.8 修复酷安标题压热度、QQ 标签少一截的根因：归一化设置了 fsSelection USE_TYPO_METRICS，渲染引擎按 typo 度量排版，此前 typo 保持 0.928/0.244 契约导致 hhea 包轮廓无效。现在 typo 与 hhea 一致包住字形真实轮廓（下限仍为契约），win 度量保持收敛上限，includeFontPadding=true 场景不受影响。负载架构升级 v5，归一化缓存 v4，复合/多字重缓存代际全量递增，应用成功时同步清理重建重试计数。模块 versionCode 20008，正式 App versionCode 2000801。
