version=v2.2.0 Alpha 3
summary=可信原厂模板、后台逐槽位对齐缓存与 FontManager 真实加载验证测试版
notes=v2.2.0 Alpha 3 重构字体对齐主链：原厂模板仅在系统默认字体且无洛书负载时冻结，活动字体状态禁止污染模板；中文、拉丁大小写与下行字母、数字及三类标点分别按原厂槽位契约校准；前台应用不再同步生成九档 UI 与 Mono 字体，缓存未命中时低优先级后台生成并在事务完成后通知重启；开机后结合系统可见路径、文件指纹和 FontManager dump 验证 LuoShuSlot 与动态 family 是否真实加载，证据不足时只显示兼容或未验证。模块 versionCode 20193，Debug App versionCode 2019301。本版本仅供 ColorOS 16、HyperOS 3 真机验证，不是正式版。
