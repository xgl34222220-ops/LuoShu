notes=v2.0.6 修订字体度量契约：hhea ascent/descent 现在包住字形真实轮廓极值（下限仍为 0.928/0.244 契约），修复酷安标题压热度、QQ 标签少一截等 includeFontPadding=false 场景的重叠/裁切；typo 与 win 度量保持契约不变，includeFontPadding=true 的间距与基线不受影响。归一化缓存版本升至 v3，负载架构升级 v4（升级后首次开机自动重建），复合与多字重缓存代际全量递增。模块 versionCode 20006，正式 App versionCode 2000601。
