version=v14.3 Alpha1.11
summary=字体库本地索引秒开与后台增量刷新
notes=原生 App 启动即读取 App 私有目录中的原子字体索引，进入字体库不再等待 Root 全量扫描；后台只读取字体文件名、大小与修改时间生成轻量指纹，指纹未变化时完全跳过字体解析，仅在新增、修改、删除、导入或用户主动完整刷新后重建索引。开机服务会在目录变化时后台预热模块 JSON。字体预览增加进程内 Typeface 缓存、同字体导出并发去重、最多两个 Root 导出任务和更大的持久预览缓存；可变轴元数据也会在进程内复用。后台刷新失败不会清空已经显示的字体列表。Full 模块自动更新 App、双皮肤 UI 和字体底层能力保持不变。
