version=v2.2.0 Alpha 9
summary=修复组合页标题被能力标签挤成竖排，并恢复静态多字重字体的快速当前字重组合
notes=v2.2.0 Alpha 9 修复组合页严重布局回归：完整的“多字重 · 100 / 300 / 400 / 500 / 600 / 700”能力标签会在横向布局中优先占满宽度，把“英文字形”和说明文字压缩到单字宽，最终显示成竖排；本版将能力标签压缩为“多字重 · 6 档”，完整字重仍由下方控件展示。组合性能方面，旧逻辑只要发现静态字体家族包含两个以上字重，就会在默认 400 下无提示生成 100–900 九档输出；六档静态字体实际需要执行多次大体积 CJK 复合，所以比旧版单字重组合慢很多。本版静态多字重字体默认只生成用户当前选择的字重，继续保留所有字重选择按钮；真正包含 wght 设计轴的可变字体在默认轴位置仍可进入完整自动多字重引擎。Alpha 8 的 revision 3 全机原厂字体扫描保持不变：安装时分别统计原厂字体路径、物理唯一文件和可替换 UI 槽位。ColorOS 与 HyperOS 都显示 19 只代表两台设备恰好各有 19 个可替换 UI 文件槽位，不代表使用同一套固定 ROM 模板；实际路径、XML 来源、度量和 ROM 标记仍按每台设备独立生成。模块 versionCode 20199，Debug App versionCode 2019901。本版本仍为 HyperOS 3、ColorOS 16 真机测试版。
