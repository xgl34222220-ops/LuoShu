version=v14.3.2
summary=正式版发布修订：修复 Monet 动态色读取与 Release Lint
notes=洛书 v14.3.2 保持 v14.3 的 Material 3 Glass / Miuix 双皮肤、字体库本地索引秒开、轻量目录指纹、真实可变轴、静态多字重、中文/英文/数字复合、覆盖诊断和安全导入能力；修复主题层通过 LocalContext 查询系统 Monet 色值导致配置变化时可能使用旧颜色的问题，改为由 Compose 的 LocalResources 响应配置更新。正式门禁已分别验证 lintRelease、testDebugUnitTest 与 assembleRelease 全部通过。Full 模块继续内置并自动安装或更新固定签名 App，Lite 不内置 App。
