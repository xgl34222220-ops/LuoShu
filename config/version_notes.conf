version=v2.2.0 Alpha 6
summary=修复组合任务被误判中断，并保留 Alpha 5 设备字体清单能力
notes=v2.2.0 Alpha 6 修复 Alpha 5 的组合字体致命回归：Android /system/bin/sh 的函数变量为全局变量，后台启动器使用通用 _task 变量后又调用清理函数，任务名被意外清空，导致新建 Worker 的 .task 身份文件始终为空；App 在状态同步时因此把仍在运行的组合任务误判为死亡任务，并显示“上次字体组合任务被开机恢复中止”。本版为后台任务各函数使用独立变量前缀，确保 PID、任务身份和 /proc 命令行保持一致，并新增自动化回归测试。Alpha 5 的原厂设备字体清单、真实 UPEM/hhea/OS2 度量、inventory-first ROM 映射、单字重快速切换和后台逐槽位对齐全部保留。模块 versionCode 20196，Debug App versionCode 2019601。本版本仍为 HyperOS 3、ColorOS 16 真机测试版。
