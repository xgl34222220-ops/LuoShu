version=v2.0.7
summary=修复 HyperOS 组合字体数字英文不变：按真实分区镜像负载
notes=v2.0.7 修复 HyperOS 上组合字体"中文变了但数字/英文保持原厂"的问题：数字字重（100-900.ttf）与拉丁 MiSans 文件在部分机型只存在于 /product 或 /system_ext 分区，mix 负载此前只写 system/fonts，无法影子挂载真实文件。现在 mix 应用后按真实分区镜像到 system_ext/product，与单字体链路的分区感知行为一致。模块 versionCode 20007，正式 App versionCode 2000701。
